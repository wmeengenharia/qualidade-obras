<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fichas de Verificação - WME Engenharia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#3f7d3a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FV WME">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root{
  --verde:#5fa744;
  --verde-escuro:#3f7d3a;
  --cinza:#eef0ee;
  --borda:#000;
  --a:#c8e6c9; --a-t:#1b5e20;
  --r:#ffcdd2; --r-t:#b71c1c;
  --ar:#ffe0b2; --ar-t:#e65100;
  --na:#e0e0e0; --na-t:#424242;
}
*{box-sizing:border-box;}
body{font-family:Calibri,Arial,Helvetica,sans-serif;margin:0;background:var(--cinza);color:#000;}
header{background:var(--verde-escuro);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
header h1{font-size:18px;margin:0;}
header .sub{font-size:12px;opacity:.9;}
.toolbar{background:#fff;border-bottom:1px solid #ccc;padding:12px 24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.toolbar label{font-size:13px;font-weight:bold;}
select, input[type=text], input[type=date]{
  font-family:inherit;font-size:13px;padding:6px 8px;border:1px solid #ccc;border-radius:4px;background:#fff;color:#000;
}
select#servicoSelect, select#materialSelect{min-width:340px;}
.modo-toggle{display:flex;gap:6px;}
.modo-btn{background:#fff;color:var(--verde-escuro);}
.modo-btn.ativo{background:var(--verde-escuro);color:#fff;}
button{
  font-family:inherit;font-size:13px;padding:7px 14px;border-radius:4px;border:1px solid var(--verde-escuro);
  background:var(--verde-escuro);color:#fff;cursor:pointer;
}
button.secundario{background:#fff;color:var(--verde-escuro);}
button.perigo{background:#fff;color:#b71c1c;border-color:#b71c1c;}
button:hover{opacity:.88;}
main{max-width:1300px;margin:20px auto;padding:0 16px 60px;}
.empty{text-align:center;color:#888;padding:60px 20px;background:#fff;border:1px solid #ccc;border-radius:6px;}

/* ===== Documento (réplica do layout original) ===== */
.ficha-doc{background:#fff;border:1px solid #999;padding:14px;margin-bottom:24px;font-size:12px;}
.ficha-doc table{width:100%;border-collapse:collapse;}
.ficha-doc td, .ficha-doc th{border:1px solid var(--borda);padding:4px 8px;vertical-align:middle;}

/* cabeçalho estilo formulário original */
.tbl-cabecalho{margin-bottom:10px;}
.tbl-cabecalho col.c1{width:150px;}
.tbl-cabecalho col.c2{width:130px;}
.tbl-cabecalho col.c3{width:auto;}
.tbl-cabecalho col.c4{width:130px;}
.tbl-cabecalho col.c5{width:190px;}
.logo-cell{text-align:center;background:#fff;}
.logo-badge{display:flex;align-items:center;justify-content:center;}
.logo-img{display:block;margin:0 auto;max-width:140px;max-height:70px;width:auto;height:auto;object-fit:contain;}
.logo-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;width:120px;height:60px;border:2px dashed #ccc;border-radius:6px;color:#aaa;font-size:11px;cursor:pointer;gap:2px;}
.logo-placeholder:hover{border-color:var(--verde-escuro);color:var(--verde-escuro);}
@media print{.logo-placeholder{display:none !important;}}
.lbl-mini{font-weight:bold;font-size:11px;text-align:center;background:#fff;white-space:nowrap;}
.titulo-cell{font-weight:bold;font-size:17px;text-align:center;letter-spacing:.5px;}
.servico-nome{font-weight:bold;font-size:13px;text-align:center;text-transform:uppercase;}
.ref-cell{font-weight:bold;font-size:11px;text-align:left;}
.objetivo-texto{font-size:11px;text-align:center;line-height:1.35;}
.val-mini{padding:2px 4px;}
.val-mini input{width:100%;border:none;background:transparent;font-size:12px;font-family:inherit;padding:2px;}
.val-mini input:focus{background:#fff8d6;outline:1px solid var(--verde-escuro);}

/* rótulos de grupo (Verificação / Local da Verificação) */
.grupo-lbl{font-style:italic;font-weight:bold;font-size:11.5px;text-decoration:underline;border:none !important;padding:2px 4px 4px;background:#fff;}

/* tabela de verificação */
.tbl-verificacao th{background:var(--cinza);font-size:11px;font-style:italic;text-align:left;}
.tbl-verificacao td{font-size:11.5px;}
.col-n{width:30px;text-align:center;}
.col-local{width:75px;text-align:center;}
.local-head{display:flex;flex-direction:column;gap:2px;align-items:center;}
.local-head input{width:80px;text-align:center;font-size:10.5px;font-weight:bold;border:none;background:transparent;}
.local-head input:focus{background:#fff8d6;outline:1px solid var(--verde-escuro);}
.tbl-verificacao td input[type=text]{width:100%;border:none;background:transparent;font-size:11.5px;padding:2px;}
.tbl-verificacao td input[type=text]:focus{background:#fff8d6;outline:1px solid var(--verde-escuro);}
.status-btn{
  width:100%;min-height:26px;border:1px solid #999;border-radius:0;cursor:pointer;font-weight:bold;font-size:11.5px;
  background:#fff;color:#aaa;
}
.status-btn.A{background:var(--a);color:var(--a-t);border-color:var(--a-t);}
.status-btn.R{background:var(--r);color:var(--r-t);border-color:var(--r-t);}
.status-btn.AR{background:var(--ar);color:var(--ar-t);border-color:var(--ar-t);}
.status-btn.NA{background:var(--na);color:var(--na-t);border-color:#999;}

.locais-actions{margin:6px 0 10px;font-size:11.5px;color:#666;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

/* não conformidade */
.nc-titulo{font-style:italic;font-weight:bold;text-decoration:underline;font-size:12px;margin:14px 0 6px;}
.tbl-nc{table-layout:fixed;}
.tbl-nc th{font-style:italic;font-size:11px;text-align:left;background:#fff;}
.tbl-nc td{padding:3px 6px;}
.tbl-nc input{width:100%;height:22px;box-sizing:border-box;border:none;background:transparent;font-size:11.5px;padding:2px 4px;font-family:inherit;}
.tbl-nc input:focus{background:#fff8d6;outline:1px solid var(--verde-escuro);}
.tbl-nc input[type=date]{appearance:auto;-webkit-appearance:auto;}
.nc-row-rm{background:#fff;color:#b71c1c;border-color:#b71c1c;padding:3px 8px;font-size:10.5px;}
.nc-vazio{text-align:center;color:#999;font-style:italic;}
.nc-actions{margin:8px 0 4px;}

/* rodapé / aprovação */
.rodape{margin-top:14px;}
.rodape-duplo{display:flex;gap:16px;}
.rodape-metade{flex:1;min-width:0;}
.rodape-bloco{display:flex;justify-content:space-between;font-size:11px;font-style:italic;margin-bottom:2px;}
.rodape-linha{display:flex;border:1px solid var(--borda);margin-bottom:10px;}
.rodape-linha .nome{flex:1;border-right:1px solid var(--borda);padding:6px 8px;}
.rodape-linha .data{width:140px;padding:6px 8px;}
.rodape-linha input{width:100%;border:none;background:transparent;font-size:12px;font-family:inherit;}
.rodape-linha input:focus{background:#fff8d6;outline:1px solid var(--verde-escuro);}
.consideracoes{font-size:10.5px;font-weight:bold;margin:6px 0;}
.norma-tec{font-size:11px;font-weight:bold;margin:4px 0 10px;}
.legenda-final{display:flex;justify-content:space-between;align-items:flex-end;font-size:10.5px;flex-wrap:wrap;gap:6px;border-top:1px solid #ccc;padding-top:6px;}
.legenda-final .itens{display:flex;gap:14px;flex-wrap:wrap;}
.legenda-final .itens b{font-style:normal;}
.codigo-doc{font-size:10.5px;color:#333;}

/* ===== Fichas Salvas ===== */
.salvas-topo{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.salvas-topo h2{font-size:16px;margin:0;color:var(--verde-escuro);}
.salvas-filtro{display:flex;gap:8px;flex-wrap:wrap;}
.salvas-filtro button{font-size:12px;padding:5px 12px;}
.salvas-grid{display:flex;flex-wrap:wrap;gap:16px;}
.ficha-card{background:#fff;border:1px solid #ccc;border-radius:6px;padding:14px 16px;width:280px;cursor:pointer;transition:box-shadow .15s,border-color .15s;}
.ficha-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.15);border-color:var(--verde-escuro);}
.ficha-card .card-badge{font-size:10.5px;font-weight:bold;background:var(--verde-escuro);color:#fff;padding:2px 8px;border-radius:3px;display:inline-block;margin-bottom:8px;}
.ficha-card .card-badge.fvm{background:#1565c0;}
.ficha-card .card-titulo{font-weight:bold;font-size:13px;margin-bottom:8px;line-height:1.3;}
.ficha-card .card-info{font-size:11.5px;color:#555;margin-bottom:3px;}
.ficha-card .card-info span{font-weight:bold;color:#333;}
.ficha-card .card-progress-txt{font-size:11px;color:#555;margin-top:8px;}
.progress-bar{height:5px;background:#eee;border-radius:3px;margin-top:4px;}
.progress-fill{height:5px;background:var(--verde);border-radius:3px;transition:width .3s;}
.progress-fill.parcial{background:#fb8c00;}
.progress-fill.vazio{background:#e0e0e0;}
.salvas-vazio{text-align:center;color:#888;padding:60px 20px;background:#fff;border:1px solid #ccc;border-radius:6px;width:100%;}

/* ===== Ficha de Material (FVM) ===== */
.tbl-mat th{background:var(--cinza);font-size:11px;font-style:italic;text-align:left;}
.tbl-mat td{font-size:11.5px;}
.col-resultado{width:190px;text-align:center;}
.resultado-btn{width:100%;min-height:26px;border:1px solid #999;cursor:pointer;font-weight:bold;font-size:11px;background:#fff;color:#aaa;}
.resultado-btn.C{background:var(--a);color:var(--a-t);border-color:var(--a-t);}
.resultado-btn.NC{background:var(--r);color:var(--r-t);border-color:var(--r-t);}

.tbl-receb{margin:10px 0;}
.tbl-receb td{padding:3px 6px;}
.tbl-receb input{width:100%;border:none;background:transparent;font-size:12px;font-family:inherit;padding:2px;}
.tbl-receb input:focus{background:#fff8d6;outline:1px solid var(--verde-escuro);}
.lbl-receb{font-weight:bold;font-size:10.5px;text-align:center;background:var(--cinza);white-space:nowrap;}

.tbl-lotes{margin:10px 0;}
.tbl-lotes td{font-size:11px;vertical-align:top;padding:6px 8px;}
.tbl-lotes .lbl-lotes{font-weight:bold;font-style:italic;background:var(--cinza);text-align:center;}

.cubic-box{font-size:11px;border:1px solid var(--borda);padding:8px;margin:10px 0;}
.cubic-box .grupo-lbl2{font-weight:bold;font-style:italic;text-decoration:underline;display:block;margin-bottom:6px;}
.cubic-box label{display:inline-block;margin-right:10px;margin-bottom:4px;}
.cubic-box input{width:60px;border:1px solid #ccc;border-radius:3px;padding:2px 4px;font-size:11px;font-family:inherit;}
.cubic-result{font-weight:bold;margin-top:4px;}

/* ===== Ficha Bloqueada ===== */
.ficha-bloqueada{position:relative;}
.ficha-bloqueada .bloquear-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;z-index:10;cursor:not-allowed;
}
.aprov-section{position:relative;z-index:11;}
.ficha-bloqueada .status-btn,.ficha-bloqueada .resultado-btn{cursor:not-allowed;opacity:.85;}
.banner-bloqueado{
  display:flex;align-items:center;gap:8px;
  background:#e8f5e9;border:1px solid #4caf50;border-radius:4px;
  padding:8px 14px;margin-bottom:10px;font-size:12.5px;font-weight:bold;color:#2e7d32;
}
.banner-reprovado{background:#ffebee;border-color:#ef5350;color:#c62828;}

/* ===== Aprovação ===== */
.aprov-section{margin-top:14px;border:1px solid var(--borda);border-radius:4px;overflow:hidden;}
.aprov-header{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--cinza);flex-wrap:wrap;gap:8px;}
.aprov-header strong{font-size:12px;}
.aprov-badge{font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.aprov-badge.pendente{background:#fff3e0;color:#e65100;border:1px solid #fb8c00;}
.aprov-badge.aprovado{background:#e8f5e9;color:#2e7d32;border:1px solid #4caf50;}
.aprov-badge.reprovado{background:#ffebee;color:#c62828;border:1px solid #ef5350;}
.aprov-badge.submetido{background:#e3f2fd;color:#1565c0;border:1px solid #1976d2;}
.aprov-badge.rascunho{background:#ede7f6;color:#5e35b1;border:1px solid #9575cd;}
.rascunho-toggle{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#4527a0;background:#f3effa;border:1px solid #d1c4e9;border-radius:6px;padding:8px 11px;margin-bottom:8px;cursor:pointer;}
.rascunho-toggle input{width:16px;height:16px;cursor:pointer;}
.aprov-aviso.rascunho{background:#ede7f6;border-color:#9575cd;color:#4527a0;}
.aprov-body{padding:10px 12px;font-size:12px;}
.aprov-acoes{display:flex;gap:8px;margin-top:8px;}
.btn-aprovar{background:#2e7d32;border-color:#2e7d32;color:#fff;}
.btn-reprovar{background:#c62828;border-color:#c62828;color:#fff;}
.btn-submeter{background:#1565c0;border-color:#1565c0;color:#fff;}
.btn-aprovar:disabled,.btn-submeter:disabled{background:#bdbdbd;border-color:#bdbdbd;color:#f0f0f0;cursor:not-allowed;opacity:.8;}
.aprov-aviso{background:#fff8e1;border:1px solid #ffb300;border-radius:5px;padding:8px 11px;font-size:12px;color:#7a5c00;margin-bottom:8px;}
.aprov-registro{font-size:11.5px;color:#333;line-height:1.8;}

/* ===== Fotos ===== */
.fotos-section{margin-top:14px;}
.fotos-titulo{font-style:italic;font-weight:bold;text-decoration:underline;font-size:12px;margin-bottom:8px;}
.fotos-grid{display:flex;flex-wrap:wrap;gap:10px;}
.foto-item{position:relative;width:160px;}
.foto-item img{width:160px;height:120px;object-fit:cover;border:1px solid #ccc;border-radius:4px;display:block;}
.foto-item input{width:100%;border:none;border-top:1px solid #eee;font-size:11px;padding:3px 4px;font-family:inherit;background:#fafafa;}
.foto-item input:focus{background:#fff8d6;outline:none;}
.foto-rm{position:absolute;top:3px;right:3px;background:rgba(183,28,28,.85);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;}
.fotos-add{margin-top:8px;}

/* ===== Fotos por item de inspeção ===== */
.cel-foto{margin-top:3px;text-align:center;}
.foto-cel-btn{background:none;border:1px dashed #ccc;border-radius:4px;cursor:pointer;font-size:14px;padding:2px 4px;color:#999;display:block;width:100%;margin:0 auto;line-height:1.4;}
.foto-cel-btn.foto-req{border-color:#e53935;color:#e53935;background:#fff8f8;}
.foto-cel-thumb{width:100%;max-height:54px;object-fit:cover;border:1px solid #bbb;border-radius:3px;display:block;cursor:pointer;}
.foto-cel-rm{background:rgba(183,28,28,.82);color:#fff;border:none;border-radius:50%;width:15px;height:15px;font-size:9px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;line-height:1;vertical-align:middle;margin-left:2px;}
.nc-foto-cel{text-align:center;vertical-align:middle;width:70px;}
/* Seção de fotos por local (impressão e tela) */
.fotos-locais-section{margin-top:14px;}
.fotos-local-group{margin-bottom:10px;}
.fotos-local-nome{font-weight:bold;font-size:11px;text-transform:uppercase;border-bottom:1px solid #ccc;padding-bottom:2px;margin-bottom:6px;}
.fotos-grid-local{display:flex;flex-wrap:wrap;gap:8px;}
.foto-local-item{width:140px;}
.foto-local-item .foto-label{font-size:10px;color:#555;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.foto-local-item img{width:140px;height:95px;object-fit:cover;border:1px solid #ccc;border-radius:3px;display:block;}

/* ===== Modal ===== */
#modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:9000;display:none;align-items:center;justify-content:center;}
#modal-overlay.ativo{display:flex;}
#modal-box{background:#fff;border-radius:8px;padding:26px 28px;min-width:340px;max-width:460px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.3);}
#modal-box h3{margin:0 0 14px;font-size:15px;color:var(--verde-escuro);}
#modal-box label{display:block;font-size:12.5px;font-weight:bold;margin-bottom:4px;}
#modal-box input[type=text],#modal-box input[type=password]{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px;font-family:inherit;margin-bottom:12px;box-sizing:border-box;}
#modal-box input:focus{outline:1px solid var(--verde-escuro);border-color:var(--verde-escuro);}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;}
.modal-msg{font-size:12px;color:#c62828;margin-bottom:8px;min-height:16px;}

@media print{
  .aprov-acoes,.fotos-add,.foto-rm,.foto-cel-btn,.foto-cel-rm{display:none !important;}
  .foto-item img,.foto-local-item{page-break-inside:avoid;}
  .fotos-locais-section{margin-top:10px;}
}

@media print{
  header, .toolbar, .locais-actions, .nc-actions, button{display:none !important;}
  .status-btn, .resultado-btn{display:block !important;}
  input.print-hidden{display:none !important;}
  .print-val{
    display:block;white-space:pre-wrap;word-break:break-word;
    font-family:inherit;font-size:inherit;padding:2px 4px;
    width:100%;box-sizing:border-box;
    height:22px;overflow:hidden;
  }
  /* campos de NC: altura livre para caber o texto inteiro */
  .tbl-nc .print-val{height:auto;overflow:visible;min-height:22px;}
  /* campos do rodapé são um pouco maiores */
  .rodape-linha .print-val{height:28px;}
  /* campos do cabeçalho: altura livre para o texto não ser cortado */
  .val-mini .print-val{height:auto;min-height:20px;overflow:visible;}
  /* Remover scroll horizontal em print */
  .scroll-wrapper{overflow:visible !important;}
  /* Fixar larguras de colunas para manter alinhamento */
  .tbl-cabecalho, .tbl-verificacao, .tbl-nc, .tbl-mat, .tbl-receb, .tbl-lotes{
    table-layout:fixed !important;width:100% !important;
  }
  body{background:#fff;}
  main{margin:0;padding:0;max-width:100%;}
  .ficha-doc{border:none;overflow:visible;}
  @page{size:A4 landscape;margin:8mm;}
}

/* ===== Login / Autenticação ===== */
.login-screen{max-width:400px;margin:60px auto;background:#fff;border:1px solid #ccc;border-radius:8px;padding:36px 32px;box-shadow:0 4px 20px rgba(0,0,0,.12);}
.login-screen h2{margin:0 0 6px;font-size:18px;color:var(--verde-escuro);}
.login-screen label{display:block;font-size:12.5px;font-weight:bold;margin-bottom:4px;margin-top:12px;}
.login-screen input[type=email],.login-screen input[type=password],.login-screen input[type=text]{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px;font-family:inherit;box-sizing:border-box;}
.login-screen input:focus{outline:1px solid var(--verde-escuro);border-color:var(--verde-escuro);}
.login-btn{width:100%;margin-top:18px;padding:10px;font-size:14px;}
.login-erro{color:#c62828;font-size:12px;margin-top:10px;min-height:16px;}
.login-titulo{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
/* Barra de usuário no header */
.user-badge{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.user-badge .u-nome{font-size:12px;opacity:.9;}
.perfil-tag{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:bold;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);}
.user-badge button{font-size:11px;padding:3px 10px;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4);color:#fff;}
.user-badge button:hover{background:rgba(255,255,255,.28);}
/* Sino / Pendências de aprovação */
#btnPendencias{position:relative;}
#btnPendencias.tem-pend{background:#ffb300;color:#3b2f00;border-color:#e0a000;font-weight:bold;animation:pendPulse 1.8s infinite;}
#btnPendencias.tem-pend:hover{background:#ffc233;}
.pend-badge{position:absolute;top:-7px;right:-7px;background:#c62828;color:#fff;border-radius:10px;font-size:10px;font-weight:bold;min-width:17px;height:17px;line-height:17px;text-align:center;padding:0 4px;box-shadow:0 0 0 2px var(--verde-escuro);}
@keyframes pendPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,179,0,.55);}50%{box-shadow:0 0 0 6px rgba(255,179,0,0);}}
/* Lista de pendências no modal */
.pend-obra{font-size:12px;font-weight:bold;color:var(--verde-escuro);margin:12px 0 4px;border-bottom:1px solid #e0e0e0;padding-bottom:3px;}
.pend-obra:first-child{margin-top:0;}
.pend-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid #e0e0e0;border-radius:5px;margin-bottom:6px;cursor:pointer;background:#fff;transition:background .12s;}
.pend-item:hover{background:#fff8e1;border-color:#ffb300;}
.pend-item .pend-tag{font-size:10px;font-weight:bold;padding:2px 7px;border-radius:4px;background:#1565c0;color:#fff;white-space:nowrap;}
.pend-item .pend-tag.fvm{background:#6a1b9a;}
.pend-item .pend-corpo{flex:1;min-width:0;}
.pend-item .pend-tit{font-size:12.5px;font-weight:bold;color:#222;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pend-item .pend-sub{font-size:11px;color:#666;}
.pend-item .pend-ir{font-size:11px;color:#1565c0;white-space:nowrap;}
/* Filtros de fichas por status (lista da obra) */
.aprov-alerta{background:#fff8e1;border:1px solid #ffb300;border-radius:6px;padding:9px 14px;margin:10px 0;font-size:13px;color:#7a5c00;}
.filtros-bar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 16px;}
.filtro-chip{font-size:12px;padding:6px 12px;border-radius:18px;border:1px solid #cfcfcf;background:#fff;color:#444;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .12s;}
.filtro-chip:hover{border-color:#5fa744;}
.filtro-chip.ativo{background:var(--verde-escuro);color:#fff;border-color:var(--verde-escuro);font-weight:bold;}
.filtro-chip.destaque{border-color:#ffb300;box-shadow:0 0 0 2px rgba(255,179,0,.25);}
.filtro-chip.destaque.ativo{background:#e65100;border-color:#e65100;box-shadow:none;}
.filtro-chip .chip-n{font-size:11px;font-weight:bold;background:rgba(0,0,0,.08);border-radius:10px;padding:0 7px;min-width:18px;text-align:center;}
.filtro-chip.ativo .chip-n{background:rgba(255,255,255,.25);}
.aprov-alerta.reprov{background:#ffebee;border-color:#e57373;color:#b71c1c;}
.agrupar-toggle{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:#444;cursor:pointer;user-select:none;}
.agrupar-toggle input{width:auto;cursor:pointer;}
.filtros-linha2{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 14px;}
.filtro-serv-lbl{font-size:12.5px;font-weight:bold;color:#444;}
.filtro-serv-sel{font-size:12.5px;padding:6px 8px;border:1px solid #ccc;border-radius:6px;background:#fff;max-width:330px;}
.grupo-serv{margin-bottom:18px;}
.grupo-serv-h{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:bold;color:var(--verde-escuro);border-bottom:2px solid #e0e0e0;padding-bottom:5px;margin-bottom:10px;}
.grupo-serv-h .grupo-serv-n{font-size:11px;font-weight:bold;background:var(--verde);color:#fff;border-radius:11px;min-width:20px;text-align:center;padding:1px 7px;}
/* ===== Cronograma / Gantt ===== */
.salvas-acoes{display:flex;gap:8px;flex-wrap:wrap;}
/* Wizard de criação de obra */
.wiz-stepper{display:flex;justify-content:space-between;gap:4px;margin:0 0 16px;}
.wiz-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;}
.wiz-step:not(:last-child)::after{content:"";position:absolute;top:14px;left:50%;width:100%;height:2px;background:#e0e0e0;z-index:0;}
.wiz-step.feito:not(:last-child)::after{background:var(--verde);}
.wiz-bola{width:28px;height:28px;border-radius:50%;background:#e0e0e0;color:#777;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;z-index:1;}
.wiz-step.atual .wiz-bola{background:var(--verde-escuro);color:#fff;box-shadow:0 0 0 4px rgba(95,167,68,.25);}
.wiz-step.feito .wiz-bola{background:var(--verde);color:#fff;}
.wiz-lbl{font-size:10.5px;color:#777;text-align:center;line-height:1.2;}
.wiz-step.atual .wiz-lbl{color:var(--verde-escuro);font-weight:bold;}
.wiz-corpo{min-height:120px;}
.wiz-campo-lbl{font-size:12px;font-weight:bold;color:#444;display:block;margin-bottom:5px;}
.wiz-input{width:100%;padding:9px 11px;border:1px solid #ccc;border-radius:6px;font-size:15px;box-sizing:border-box;}
/* Contraste: garante texto escuro legível nos campos (wizard, modal e ficha de cronograma) */
.wiz-input,#modal-box input,#modal-box select,#modal-box textarea,.cf-grid input,.cf-grid select,.cf-nc input,.ficha-doc textarea{color:#1b1b1b !important;background:#fff;}
.wiz-input::placeholder{color:#9e9e9e;}
.wiz-txt{font-size:13px;color:#555;line-height:1.5;margin:0 0 14px;}
.wiz-upload{width:100%;padding:18px;border:2px dashed #bdbdbd;border-radius:10px;background:#fafafa;font-size:14px;font-weight:bold;color:#555;cursor:pointer;}
.wiz-upload:hover{border-color:var(--verde);background:#f1f8e9;color:var(--verde-escuro);}
.wiz-erro{margin-top:12px;background:#ffebee;border:1px solid #ef9a9a;color:#b71c1c;border-radius:6px;padding:9px 12px;font-size:12.5px;}
.wiz-up-acoes{display:flex;flex-direction:column;gap:8px;}
.wiz-modelo{width:100%;padding:10px;font-size:13px;font-weight:600;cursor:pointer;}
.wiz-erro-estrut{text-align:left;line-height:1.5;}
.wiz-erro-estrut .we-tit{font-size:13.5px;font-weight:bold;margin-bottom:2px;}
.wiz-erro-estrut .we-sub{color:#7a1414;margin-bottom:8px;}
.wiz-erro-estrut .we-bloco{margin-top:6px;}
.wiz-erro-estrut .we-bloco ul{margin:3px 0 0 0;padding-left:20px;}
.wiz-erro-estrut .we-bloco b{font-size:12.5px;}
.wiz-erro-estrut .we-rev{margin-top:10px;font-size:12px;color:#7a1414;}
.wiz-load{display:flex;flex-direction:column;align-items:center;gap:14px;padding:24px 0;color:#555;font-size:13px;}
.wiz-spin{width:38px;height:38px;border:4px solid #e0e0e0;border-top-color:var(--verde-escuro);border-radius:50%;animation:appSpin .9s linear infinite;}
.wiz-ok{font-size:14px;font-weight:bold;color:#2e7d32;margin-bottom:10px;}
.wiz-resumo{list-style:none;padding:0;margin:0;font-size:13px;color:#333;line-height:2;}
.wiz-usr{display:flex;align-items:center;gap:8px;font-size:13px;color:#333;padding:5px 2px;cursor:pointer;}
.wiz-usr input{width:auto;}
.wiz-livre{background:#f1f8e9;border:1px solid #c5e1a5;border-radius:6px;padding:8px 10px;margin-bottom:8px;}
.wiz-usr-lista{max-height:200px;overflow-y:auto;border:1px solid #eee;border-radius:6px;padding:6px 10px;}
.wiz-rev{font-size:13px;color:#333;}
.wiz-rev>div{display:flex;justify-content:space-between;gap:12px;padding:9px 2px;border-bottom:1px solid #f0f0f0;}
.wiz-rev>div span{color:#777;}
/* % por fase (dashboard cronograma) */
.crono-fases{margin:4px 0 12px;background:#fff;border:1px solid #e6e6e6;border-radius:8px;padding:12px;}
.crono-fases .cf-tit{font-size:12px;font-weight:bold;color:#444;margin-bottom:8px;}
.cf-fase{display:flex;align-items:center;gap:10px;font-size:12.5px;margin-bottom:6px;}
.cf-fase .cf-fase-n{flex:0 0 200px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#333;}
.cf-fase .cf-fase-bar{flex:1;height:9px;background:#e8e8e8;border-radius:5px;overflow:hidden;}
.cf-fase .cf-fase-bar span{display:block;height:100%;background:#43a047;}
.gbar.gbar-aberta{outline:1px dashed rgba(0,0,0,.25);outline-offset:-1px;}
@media(max-width:700px){ .cf-fase .cf-fase-n{flex-basis:120px;max-width:120px;} }
/* Seletor de atividade do cronograma (Nova ficha) */
.crono-pick{max-height:50vh;overflow-y:auto;border:1px solid #eee;border-radius:8px;padding:6px;}
.cp-grupo{font-size:11px;font-weight:bold;text-transform:uppercase;color:#37474f;background:#eceff1;border-radius:4px;padding:6px 8px;margin:8px 0 4px;}
.cp-atv{display:flex;align-items:flex-start;gap:9px;width:100%;text-align:left;border:1px solid #e0e0e0;background:#fff;border-radius:7px;padding:10px 12px;margin-bottom:6px;cursor:pointer;font-size:13px;color:#1b1b1b;}
.cp-atv:hover{border-color:var(--verde);background:#f1f8e9;}
.cp-atv .cp-ic{font-size:17px;flex:0 0 auto;line-height:1.2;}
.cp-atv .cp-info{display:flex;flex-direction:column;min-width:0;}
.cp-atv .cp-nome{font-weight:600;color:#1b1b1b;line-height:1.3;}
.cp-atv .cp-datas{font-size:11px;color:#777;margin-top:2px;}
.cp-atv .cp-cont{color:#e65100;font-size:11px;font-weight:bold;margin-top:1px;}
.cp-atv-off{cursor:default;opacity:.7;background:#fafafa;border-style:dashed;}
.cp-atv-off:hover{border-color:#e0e0e0;background:#fafafa;}
.cp-semform{color:#9a7b00 !important;font-style:italic;}
/* Ficha genérica de cronograma */
.cf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.cf-grid label,.cf-lbl{font-size:12px;font-weight:bold;color:#444;display:block;margin-bottom:3px;}
.cf-grid input,.cf-grid select{width:100%;box-sizing:border-box;padding:7px 9px;border:1px solid #ccc;border-radius:6px;font-size:14px;}
.cf-nc{border:1px solid #eee;border-radius:6px;padding:8px;margin-bottom:6px;display:flex;flex-direction:column;gap:5px;}
.cf-nc-h{font-size:12px;font-weight:bold;color:#b71c1c;}
.cf-nc input{padding:6px 8px;border:1px solid #ccc;border-radius:5px;font-size:13px;}
.card-badge.crono{background:#455a64;color:#fff;}
@media(max-width:700px){ .cf-grid{grid-template-columns:1fr;} }
.btn-cronograma{font-size:13px;font-weight:bold;padding:9px 14px;background:#37474f;color:#fff;border:none;border-radius:6px;cursor:pointer;}
.btn-cronograma:hover{background:#263238;}
.crono-topo{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:6px;}
.crono-topo h2{margin:0;font-size:16px;color:var(--verde-escuro);}
.crono-dash{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0;}
.cd-card{flex:1;min-width:120px;background:#fff;border:1px solid #e6e6e6;border-radius:8px;padding:12px;text-align:center;}
.cd-card.cd-geral{flex:1.5;min-width:170px;background:#f1f8e9;border-color:#c5e1a5;}
/* Workspace / Landing da obra */
.ws-topo{margin:6px 0 18px;}
.ws-topo h2{font-size:22px;margin:0 0 4px;color:var(--verde-escuro);}
.ws-topo p{font-size:13px;color:#777;margin:0;}
.ws-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:1140px;}
@media(max-width:1000px){ .ws-grid{grid-template-columns:1fr;} }
.ws-final:hover{border-color:#a5d6a7;}
.ws-btn-final{background:var(--verde-escuro);} .ws-btn-final:hover{background:#2e5e2a;}
.ws-card{background:#fff;border:1px solid #e6e6e6;border-radius:14px;padding:22px;cursor:pointer;transition:box-shadow .15s,transform .15s,border-color .15s;display:flex;flex-direction:column;}
.ws-card:hover{box-shadow:0 10px 28px rgba(0,0,0,.12);transform:translateY(-3px);}
.ws-crono:hover{border-color:#90caf9;}
.ws-fichas:hover{border-color:#ffe082;}
.ws-ic{font-size:38px;line-height:1;margin-bottom:10px;}
.ws-tit{font-size:18px;font-weight:bold;color:#222;}
.ws-desc{font-size:12.5px;color:#777;margin:4px 0 12px;}
.ws-prog{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.ws-prog-bar{flex:1;height:10px;background:#e8e8e8;border-radius:6px;overflow:hidden;}
.ws-prog-bar span{display:block;height:100%;background:#43a047;}
.ws-prog b{font-size:15px;color:var(--verde-escuro);}
.ws-stats{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:16px;}
.ws-mini{display:flex;flex-direction:column;line-height:1.2;}
.ws-mini b{font-size:18px;color:#333;}
.ws-mini span{font-size:11px;color:#888;}
.ws-sem{font-size:12.5px;color:#999;background:#fafafa;border:1px dashed #ddd;border-radius:8px;padding:12px;margin-bottom:16px;}
.ws-btn{margin-top:auto;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:bold;color:#fff;cursor:pointer;}
.ws-btn-crono{background:#1565c0;} .ws-btn-crono:hover{background:#0d47a1;}
.ws-btn-fichas{background:#ffca28;color:#5d4037;} .ws-btn-fichas:hover{background:#ffb300;}
@media(max-width:700px){ .ws-grid{grid-template-columns:1fr;} .ws-topo h2{font-size:18px;} }
.cd-card.cd-click{cursor:pointer;transition:box-shadow .12s,transform .12s,border-color .12s;}
.cd-card.cd-click:hover{box-shadow:0 4px 14px rgba(0,0,0,.12);transform:translateY(-2px);border-color:#bdbdbd;}
/* Modal grande (drill-down) */
#modal-box.modal-xl{max-width:1040px;width:80vw;padding:0;overflow:hidden;}
#modal-box h3:empty{display:none;margin:0;}
#modal-box.modal-xl #modal-corpo{padding:0;}
#modal-box.modal-xl .modal-footer{padding:12px 18px;border-top:1px solid #eee;}
.dr-head{display:flex;align-items:center;gap:10px;padding:16px 20px;font-size:16px;font-weight:bold;}
.dr-head .dr-ic{font-size:20px;}
.dr-filtros{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 18px;border-bottom:1px solid #eee;}
.dr-filtros .dr-busca{flex:1;min-width:160px;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;color:#1b1b1b;}
.dr-filtros select{padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:#fff;color:#1b1b1b;}
.dr-filtros .dr-export{background:#2e7d32;color:#fff;border:none;border-radius:6px;padding:8px 12px;font-size:13px;font-weight:bold;cursor:pointer;}
.dr-filtros .dr-export:hover{background:#1b5e20;}
.dr-tbwrap{max-height:52vh;overflow:auto;}
.dr-tabela{width:100%;border-collapse:collapse;font-size:12.5px;}
.dr-tabela thead th{position:sticky;top:0;background:#fafafa;text-align:left;padding:9px 12px;color:#555;font-size:11px;text-transform:uppercase;border-bottom:1px solid #e6e6e6;white-space:nowrap;z-index:1;}
.dr-tabela tbody td{padding:9px 12px;border-bottom:1px solid #f2f2f2;color:#333;}
.dr-tabela tbody tr{cursor:pointer;}
.dr-tabela tbody tr:hover{background:#f6f9f4;}
.dr-tabela .dr-nome{min-width:180px;}
.dr-badge{display:inline-block;font-size:11px;font-weight:bold;padding:2px 9px;border-radius:12px;white-space:nowrap;}
.dr-badge.dr-concluida{background:#e8f5e9;color:#2e7d32;}
.dr-badge.dr-andamento{background:#e3f2fd;color:#1565c0;}
.dr-badge.dr-atrasada{background:#ffebee;color:#c62828;}
.dr-badge.dr-futura{background:#eeeeee;color:#616161;}
.dr-indisp{display:inline-block;background:#fff8e1;color:#8a6d00;border:1px solid #ffd54f;border-radius:12px;font-size:11px;font-weight:bold;padding:3px 9px;white-space:nowrap;}
.dr-row-off{cursor:not-allowed;opacity:.75;}
.dr-row-off:hover{background:#fff !important;}
.dr-cod-off{color:#bbb;}
.ficha-destaque{background:#e8f5e9;border:1px solid #66bb6a;color:#2e7d32;border-radius:8px;padding:9px 14px;margin-bottom:10px;font-size:13px;font-weight:bold;}
.ficha-doc-dest{box-shadow:0 0 0 3px rgba(67,160,71,.35);border-radius:6px;animation:destPulse 1.6s ease-out 1;}
@keyframes destPulse{0%{box-shadow:0 0 0 6px rgba(67,160,71,.5);}100%{box-shadow:0 0 0 3px rgba(67,160,71,.35);}}
.dr-ver{background:none;border:1px solid #cfcfcf;border-radius:5px;color:#1565c0;font-size:11px;padding:3px 8px;cursor:pointer;white-space:nowrap;}
.dr-ver:hover{border-color:#1565c0;background:#e3f2fd;}
.dr-vazio{text-align:center;color:#999;padding:28px;}
.dr-rodape{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;padding:10px 18px;font-size:12px;color:#666;}
.dr-pags{display:flex;gap:4px;flex-wrap:wrap;}
.dr-pg{min-width:28px;height:28px;border:1px solid #ddd;background:#fff;border-radius:6px;cursor:pointer;font-size:12px;color:#444;}
.dr-pg.atual{background:var(--verde-escuro);color:#fff;border-color:var(--verde-escuro);font-weight:bold;}
@media(max-width:700px){ #modal-box.modal-xl{width:96vw;max-width:96vw;} .dr-tbwrap{max-height:60vh;} }
.cd-num{font-size:24px;font-weight:bold;color:#333;line-height:1.1;font-variant-numeric:tabular-nums;}
.cd-num.cd-verde{color:#2e7d32;} .cd-num.cd-amarelo{color:#f9a825;} .cd-num.cd-azul{color:#1565c0;} .cd-num.cd-vermelho{color:#c62828;} .cd-num.cd-cinza{color:#777;} .cd-num.cd-data{font-size:16px;color:#37474f;}
.cd-lbl{font-size:11.5px;color:#666;margin-top:3px;}
.cd-bar{height:8px;background:#e0e0e0;border-radius:5px;margin-top:9px;overflow:hidden;}
.cd-bar-fill{height:100%;background:#43a047;transition:width .6s cubic-bezier(.22,.61,.36,1);}
/* Card "Próximas atividades" */
.crono-prox-card{background:#fff;border:1px solid #e6eaf1;border-radius:12px;padding:12px 14px;margin:4px 0 12px;box-shadow:0 1px 3px rgba(20,28,40,.05);}
.px-tit{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#8b94a7;margin-bottom:8px;}
.px-lista{display:flex;flex-direction:column;gap:4px;}
.px-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#fafbfc;border:1px solid #eef1f5;border-radius:9px;padding:8px 10px;cursor:pointer;transition:background .12s,border-color .12s;}
.px-item:hover{background:#f1f6ff;border-color:#cfe0f5;}
.px-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
.px-info{display:flex;flex-direction:column;min-width:0;flex:1;}
.px-nome{font-size:13px;font-weight:600;color:#1f2a3d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.px-meta{font-size:11px;color:#8b94a7;margin-top:1px;}
.px-go{color:#b0b8c4;font-size:18px;font-weight:bold;flex:0 0 auto;}
.px-vazio{font-size:12.5px;color:#2e7d32;padding:6px 2px;}
.crono-aviso{font-size:12px;color:#b26a00;background:#fff8e1;border:1px solid #ffcc80;border-radius:6px;padding:7px 11px;margin-bottom:8px;}
.crono-legenda{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:#555;margin:6px 0 10px;}
.crono-legenda i.lg{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:middle;}
.crono-legenda i.lg-marco{color:#7e57c2;background:none;width:auto;font-style:normal;}
/* Gantt — timeline compacta */
.gantt{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #e6eaf1;border-radius:10px;background:#fff;}
.g-row{display:flex;border-bottom:1px solid #f3f5f7;min-height:40px;cursor:pointer;}
.g-row:hover{background:#f8fafc;}
.g-row.g-head,.g-row.g-head:hover{background:#fafbfc;position:sticky;top:0;z-index:3;cursor:default;}
.g-name{flex:0 0 250px;width:250px;position:sticky;left:0;background:#fff;z-index:2;padding:5px 10px;display:flex;align-items:center;gap:5px;border-right:1px solid #eef1f5;}
.g-row:hover .g-name{background:#f8fafc;}
.g-row.g-head .g-name{background:#fafbfc;font-weight:bold;align-items:center;}
.g-name-head{color:#37474f;font-size:12px;text-transform:uppercase;letter-spacing:.4px;}
.gn-caret{width:14px;flex:0 0 auto;text-align:center;color:#9aa3b0;font-size:10px;cursor:pointer;}
.gn-caret.gn-vazio{color:transparent;}
.gn-main{display:flex;flex-direction:column;min-width:0;flex:1;}
.gn-l1{display:flex;align-items:center;gap:6px;min-width:0;}
.gn-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
.gn-nome{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12.5px;color:#26303f;}
.gn-meta{font-size:10.5px;color:#9aa3b0;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gn-st{font-weight:700;}

/* ===== SIDE PANEL (Drawer) do cronograma ===== */

#cronoPanelBody{display:flex;flex-direction:column;height:100%;}
.cp-head{position:relative;padding:18px 46px 14px 18px;border-bottom:1px solid #e3e7ee;flex:0 0 auto;}

.cp-item{display:flex;gap:9px;align-items:flex-start;}

.cp-i-val{font-size:13px;font-weight:600;color:#1f2a3d;word-break:break-word;line-height:1.35;}

.cp-rel{display:flex;flex-direction:column;gap:11px;}

.cp-rel-l .cp-i-txt{flex:1 1 auto;}
.cp-rel-act{flex:0 0 auto;}
.cp-indisp{display:inline-block;font-size:11px;font-weight:700;color:#8a6d00;background:#fff8e1;border:1px solid #ffe082;border-radius:14px;padding:2px 9px;}
.cp-count{display:inline-block;min-width:18px;text-align:center;font-size:11px;font-weight:700;color:#1565c0;background:#e3f2fd;border-radius:10px;padding:1px 7px;margin-left:4px;}
.cp-addficha{margin-bottom:10px;width:100%;}
.cp-subtit{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#8b94a7;margin:12px 0 8px;}
.cp-coments{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;max-height:260px;overflow-y:auto;}

.cp-ficha-nome{font-size:12.5px;font-weight:600;color:#1f2a3d;line-height:1.35;}
.cp-ficha-meta{font-size:11px;color:#8b94a7;margin-top:3px;}
.cp-ficha-abrir{margin-top:8px;width:100%;}
.cp-timeline{display:flex;flex-direction:column;gap:0;position:relative;padding-left:6px;}

.cp-tl-dt{font-size:11px;color:#9aa3b4;margin-top:1px;}
.cp-foot{flex:0 0 auto;display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;padding:12px 14px;border-top:1px solid #e3e7ee;background:#fff;}

.cp-btn-sec{background:#fff;border-color:#cfd6e2;color:#1565c0;}

function _supabaseOk(){ return SUPABASE.URL && SUPABASE.KEY && SUPABASE.URL.indexOf("http")===0; }
function _ehBase64(v){ return typeof v==="string" && v.indexOf("data:image")===0; }

// Backup automático (best-effort) dos dados de texto no Supabase.
// Grava 2 linhas via upsert: "current" (último estado) e a data de hoje (histórico diário).
function backupSupabase(){
  if(!_supabaseOk()) return;
  try{
    var payload = _dbParaNuvem();           // sem base64 (fotos já são URLs)
    var ts = new Date().toISOString();
    var hoje = ts.slice(0,10);              // YYYY-MM-DD
    var corpo = JSON.stringify([
      {id:"current", dados:payload, criado_em:ts},
      {id:hoje,      dados:payload, criado_em:ts}
    ]);
    fetch(SUPABASE.URL+"/rest/v1/app_backup?on_conflict=id", {
      method:"POST",
      headers:{
        "apikey":SUPABASE.KEY,
        "Authorization":"Bearer "+SUPABASE.KEY,
        "Content-Type":"application/json",
        "Prefer":"resolution=merge-duplicates"
      },
      body: corpo
    }).catch(function(){});                 // falha de backup nunca atrapalha o app
  }catch(e){}
}

// Converte dataURL (base64) em Blob para upload
function _dataURLparaBlob(dataURL){
  var arr=dataURL.split(","), mime=((arr[0].match(/:(.*?);/))||[])[1]||"image/jpeg";
  var bstr=atob(arr[1]), n=bstr.length, u8=new Uint8Array(n);
  while(n--) u8[n]=bstr.charCodeAt(n);
  return new Blob([u8],{type:mime});
}

// Sobe uma foto (base64) para o Storage e devolve a URL pública (Promise)
function subirFotoStorage(dataURL){
  if(!_supabaseOk()) return Promise.reject(new Error("supabase off"));
  var nome=Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,9)+".jpg";
  return fetch(SUPABASE.URL+"/storage/v1/object/"+SUPABASE.BUCKET+"/"+nome,{
    method:"POST",
    headers:{"apikey":SUPABASE.KEY,"Authorization":"Bearer "+SUPABASE.KEY,"Content-Type":"image/jpeg","x-upsert":"true"},
    body:_dataURLparaBlob(dataURL)
  }).then(function(r){
    if(!r.ok) throw new Error("upload HTTP "+r.status);
    return SUPABASE.URL+"/storage/v1/object/public/"+SUPABASE.BUCKET+"/"+nome;
  });
}

// Recebe uma foto nova (base64): tenta subir; se falhar (offline) guarda base64
// localmente e devolve o base64 (será reenviado depois). cb(valorParaGuardar)
function processarFotoNova(dataURL, cb){
  subirFotoStorage(dataURL).then(function(url){
    cb(url);
  }).catch(function(){
    mostrarStatus("⚠️ Foto salva no aparelho (enviada à nuvem quando houver internet)");
    cb(dataURL); // mantém base64 local; reenviarFotosPendentes() sobe depois
  });
}

// Versão do DB para enviar ao JSONBin: troca base64 de FICHAS por placeholder
// (logos ficam, são pequenos). Mantém o payload bem abaixo de 100KB.
function _dbParaNuvem(){
  function _ph(v){ return _ehBase64(v) ? FOTO_PLACEHOLDER : v; }
  var clone=JSON.parse(JSON.stringify(DB));
  var f=clone.fichas||{};
  Object.keys(f).forEach(function(obra){
    var o=f[obra]||{};
    Object.keys(o).forEach(function(fid){
      var e=o[fid]; if(!e||typeof e!=="object") return;
      if(Array.isArray(e.fotosItens)) e.fotosItens=e.fotosItens.map(function(row){ return Array.isArray(row)?row.map(_ph):row; });
      if(Array.isArray(e.fotosNc)) e.fotosNc=e.fotosNc.map(_ph);
      if(Array.isArray(e.fotos)) e.fotos=e.fotos.map(function(p){ return (p&&typeof p==="object")?{base64:_ph(p.base64),legenda:p.legenda}:p; });
    });
  });
  return clone;
}

// Ao receber dados da nuvem, repõe as fotos locais onde a nuvem só tem placeholder
// (fotos ainda não enviadas). Sem base64 local, vira null (mostra "sem foto").
function _restaurarFotos(novo, antigo){
  if(!novo) return novo;
  var nf=novo.fichas||{}, af=(antigo&&antigo.fichas)||{};
  Object.keys(nf).forEach(function(obra){
    var no=nf[obra]||{}, ao=af[obra]||{};
    Object.keys(no).forEach(function(fid){
      var ne=no[fid], ae=ao[fid]||{}; if(!ne||typeof ne!=="object") return;
      if(Array.isArray(ne.fotosItens)) ne.fotosItens.forEach(function(row,ri){
        if(Array.isArray(row)) row.forEach(function(v,li){
          if(v===FOTO_PLACEHOLDER){ var l=ae.fotosItens&&ae.fotosItens[ri]&&ae.fotosItens[ri][li]; row[li]=(l&&l!==FOTO_PLACEHOLDER)?l:null; }
        });
      });
      if(Array.isArray(ne.fotosNc)) ne.fotosNc.forEach(function(v,ni){
        if(v===FOTO_PLACEHOLDER){ var l=ae.fotosNc&&ae.fotosNc[ni]; ne.fotosNc[ni]=(l&&l!==FOTO_PLACEHOLDER)?l:null; }
      });
      if(Array.isArray(ne.fotos)) ne.fotos.forEach(function(p,i){
        if(p&&p.base64===FOTO_PLACEHOLDER){ var l=ae.fotos&&ae.fotos[i]&&ae.fotos[i].base64; p.base64=(l&&l!==FOTO_PLACEHOLDER)?l:""; }
      });
    });
  });
  return novo;
}

// Procura fotos ainda em base64 no DB local e as envia ao Storage, trocando por URL
var _reenviando=false;
function reenviarFotosPendentes(){
  if(!_supabaseOk() || _reenviando) return;
  var tarefas=[];
  var f=DB.fichas||{};
  Object.keys(f).forEach(function(obra){
    var o=f[obra]||{};
    Object.keys(o).forEach(function(fid){
      var e=o[fid]; if(!e||typeof e!=="object") return;
      (e.fotosItens||[]).forEach(function(row,ri){ if(Array.isArray(row)) row.forEach(function(v,li){ if(_ehBase64(v)) tarefas.push({val:v,set:function(u){ e.fotosItens[ri][li]=u; }}); }); });
      (e.fotosNc||[]).forEach(function(v,ni){ if(_ehBase64(v)) tarefas.push({val:v,set:function(u){ e.fotosNc[ni]=u; }}); });
      (e.fotos||[]).forEach(function(p,i){ if(p&&_ehBase64(p.base64)) tarefas.push({val:p.base64,set:function(u){ e.fotos[i].base64=u; }}); });
    });
  });
  if(!tarefas.length) return;
  _reenviando=true;
  mostrarStatus("⏳ Enviando "+tarefas.length+" foto(s) para a nuvem...");
  var chain=Promise.resolve(), ok=0;

    _reenviando=false;
    if(ok>0){ salvarDB(); renderAtual(); mostrarStatus("🟢 "+ok+" foto(s) enviada(s) para a nuvem"); }
  });
}

function _novoEventoId(){ return "EV"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function registrarEvento(tipo, opts){
  opts=opts||{};
  if(!DB.auditoria) DB.auditoria=[];
  var ev={
    id:_novoEventoId(),
    ts:new Date().toISOString(),
    usuario: sessao?sessao.nome:"?",
    usuarioId: sessao?sessao.id:"",
    obra: (opts.obra!==undefined?opts.obra:obraAtual)||"",
    tipo: tipo,
    entidade: opts.entidade||"",          // "obra" | "ficha" | "cronograma" | "atividade" | "finalizacao" | "usuario"
    entidadeId: (opts.entidadeId!=null?String(opts.entidadeId):""),
    antes: (opts.antes!==undefined?opts.antes:null),
    depois: (opts.depois!==undefined?opts.depois:null),
    origem: opts.origem||"app",            // "app" | "cronograma" | "ficha" | "wizard" | "sync" | "import"
    detalhe: opts.detalhe||""
  };
  DB.auditoria.push(ev);
  if(DB.auditoria.length>5000) DB.auditoria=DB.auditoria.slice(-5000);
  return ev;
}
// Eventos de uma obra (mais recentes primeiro) — opcionalmente filtrados por entidade/id
function eventosDaObra(obra, filtro){
  obra=obra||obraAtual; filtro=filtro||{};
  return (DB.auditoria||[]).filter(function(e){
    if(e.obra!==obra) return false;
    if(filtro.entidade && e.entidade!==filtro.entidade) return false;
    if(filtro.entidadeId!=null && String(e.entidadeId)!==String(filtro.entidadeId)) return false;
    return true;
  }).sort(function(a,b){ return b.ts.localeCompare(a.ts); });
}
function registrarHistorico(fichaId, acao, detalhe){

// Lista todas as fichas SUBMETIDAS que o usuário atual pode aprovar,
// respeitando o acesso por obra (admin vê todas; demais só as autorizadas).
function listarPendenciasAprovacao(){
  var res=[];
  if(!sessao || !podeAprovar()) return res;
  var fichas=DB.fichas||{};
  var obras=DB.obras||[];
  obras.forEach(function(obra){
    if(!ehAdmin()){
      var acesso=DB.obraAcessos && DB.obraAcessos[obra];
      if(acesso && acesso.indexOf(sessao.id)<0) return; // sem acesso a esta obra
    }
    var of=fichas[obra]||{};
    Object.keys(of).forEach(function(id){
      var est=of[id];
      if(!est || !est.aprovacao || est.aprovacao.status!=="submetido") return;
      if(est.tipo==="cronograma"){
        res.push({obra:obra,tipo:"cronograma",id:id,badge:"CRONO",badgeCls:"crono",titulo:est.nome||"Atividade",
                  por:(est.aprovacao.por||"—"),data:(est.aprovacao.data||"—")});
        return;
      }
      var servicoId = est.servicoId || ((String(id).indexOf("#")>=0)?String(id).split("#")[0]:id);
      var serv=SERVICOS.find(function(s){return s.id===servicoId;});
      var tipo,badge,badgeCls,titulo;
      if(serv){ tipo="servico"; badge="FVS "+servicoId; badgeCls=""; titulo=serv.titulo; }
      else{
        var mat=MATERIAIS.find(function(m){return m.id===servicoId;});
        if(!mat) return;
        tipo="material"; badge="FVM "+String(servicoId).replace("M",""); badgeCls="fvm"; titulo=mat.material;
      }
      res.push({obra:obra,tipo:tipo,id:id,badge:badge,badgeCls:badgeCls,titulo:titulo,
                por:(est.aprovacao.por||"—"),data:(est.aprovacao.data||"—")});
    });
  });
  // Finalizações de serviço pendentes (governança) — somente admin aprova
  if(ehAdmin()){
    var finz=DB.finalizacoes||{};
    obras.forEach(function(obra){
      var fo=finz[obra]||{};
      Object.keys(fo).forEach(function(tid){
        var fin=fo[tid]; if(!fin||fin.status!=="pendente") return;
        res.push({kind:"finalizacao", obra:obra, id:tid, titulo:(fin.servicoNome||"Serviço"), fase:(fin.fase||""),
                  por:(fin.por||"—"), data:(fin.data||"—"), observacoes:(fin.observacoes||"")});
      });
    });
  }
  return res;
}

function enviarFinalizacao(taskId){
  var tarefas=_cronoTemFilhos(_cronoTarefasObra());
  var t=null,idx=-1; for(var i=0;i<tarefas.length;i++){ if(tarefas[i].id===taskId){t=tarefas[i];idx=i;break;} }
  if(!t) return;
  var obs=((document.getElementById("fin-obs")||{}).value||"").trim();

    status:"pendente", por:(sessao?sessao.nome:""), porId:(sessao?sessao.id:""),
    data:new Date().toLocaleDateString("pt-BR"), observacoes:obs, comentarios:com,
    fase:_cronoFaseDe(tarefas,idx), servicoNome:t.nome
  };

function _setFinStatus(obra,taskId,status){
  if(!ehAdmin()){ alert("Apenas administradores podem aprovar/rejeitar finalizações."); return false; }
  var fo=DB.finalizacoes&&DB.finalizacoes[obra]; var fin=fo&&fo[taskId]; if(!fin) return false;
  var _antes={status:fin._statusAnterior||"pendente"};
  fin.status=status; fin.aprovadoPor=(sessao?sessao.nome:""); fin.aprovadoData=new Date().toLocaleDateString("pt-BR");
  registrarLog("finalizacao-"+status,{obra:obra,tarefa:taskId});
  registrarEvento(status==="aprovado"?"finalizacao_aprovada":"finalizacao_rejeitada",{obra:obra,entidade:"finalizacao",entidadeId:taskId,origem:"cronograma",antes:_antes,depois:{status:status,por:fin.aprovadoPor},detalhe:"Finalização "+(status==="aprovado"?"aprovada":"rejeitada")+": "+(fin.servicoNome||taskId)});
  salvarDB(); atualizarBadgePendencias();
  return true;
}

function migrarDB(){
  if(!DB.fichas)      DB.fichas      = {};
  if(!DB.obras)       DB.obras       = [];
  if(!DB.obraAcessos) DB.obraAcessos = {};
  if(!DB.obraLogos)   DB.obraLogos   = {};
  if(!DB.obraServicos) DB.obraServicos = {}; // {obra:{servicos:[ids],materiais:[ids]}} — ausente = todos (retrocompat)
  if(!DB.cronogramaPct) DB.cronogramaPct = {}; // {obra:{taskId:pct}} — progresso manual das atividades do cronograma
  if(!DB.obraCronograma) DB.obraCronograma = {}; // {obra:{projeto,tarefas:[...],importadoEm}} — cronograma importado por obra (fonte de verdade)
  if(!DB.finalizacoes) DB.finalizacoes = {};   // {obra:{taskId:{status,por,porId,data,observacoes,comentarios,fase,servicoNome,aprovadoPor,aprovadoData}}} — fluxo de finalização de serviço
  if(!DB.auditoria) DB.auditoria = [];          // event log estruturado (auditoria) — ver registrarEvento()
  if(!DB.cronogramaDados) DB.cronogramaDados = {}; // {obra:{taskId:{realIni,realFim,comentarios:[{por,porId,ts,texto}]}}} — módulo Cronograma (dados próprios, sem depender de ficha)
  // Carimba servicoId/tipo nas fichas (suporta várias fichas por serviço via chave de instância "servicoId#xxxx")
  Object.keys(DB.fichas).forEach(function(obra){
    var of = DB.fichas[obra]; if(!of || typeof of!=="object") return;
    Object.keys(of).forEach(function(key){
      var e = of[key]; if(!e || typeof e!=="object") return;
      if(!e.servicoId) e.servicoId = (key.indexOf("#")>=0) ? key.split("#")[0] : key;
      if(!e.tipo) e.tipo = (String(e.servicoId).charAt(0)==="M") ? "material" : "servico";
    });
  });
  // Migrar estrutura antiga: chaves diretas (ex: "1", "M01") para dentro de fichas
  var TODOS_IDS = SERVICOS.map(function(s){return s.id;}).concat(MATERIAIS.map(function(m){return m.id;}));
  var antigas = {};
  Object.keys(DB).forEach(function(k){
    if(k!=="obras" && k!=="fichas" && TODOS_IDS.indexOf(k)>=0){
      antigas[k] = DB[k];
    }
  });
  if(Object.keys(antigas).length > 0){
    var nome = "(Importadas)";
    if(!DB.fichas[nome]) DB.fichas[nome] = {};
    Object.keys(antigas).forEach(function(k){ DB.fichas[nome][k] = antigas[k]; delete DB[k]; });
    if(DB.obras.indexOf(nome)<0) DB.obras.push(nome);
  }
}

function carregarDB(){
  // 1. Carrega cache local imediatamente (app abre rápido)
  try{ DB = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }catch(e){ DB = {}; }
  migrarDB();
  carregarSessao();
  if(!_jbConfigurado()){ mostrarStatus("🔴 JSONBin não configurado (modo local)"); renderAtual(); return; }
  // 2. Busca dados atualizados da nuvem
  mostrarStatus("⏳ Carregando dados...");
  fetch("https://api.jsonbin.io/v3/b/"+JSONBIN.BIN_ID+"/latest", {
    headers:{"X-Master-Key": JSONBIN.BIN_KEY}
  }).then(function(r){ return r.json(); }).then(function(data){
    const nuvem = data.record || {};
    const tsLocal = DB._ts || 0;
    const tsNuvem = nuvem._ts || 0;
    // Só usa dados da nuvem se forem mais recentes que o localStorage
    if(tsNuvem >= tsLocal){
      DB = _restaurarFotos(nuvem, DB); // repõe fotos locais ainda não enviadas
      migrarDB();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
    } else {
      // localStorage é mais recente — re-salva na nuvem para atualizar
      _localDirty = true;
      salvarDB();
    }
    _jbOk = true;
    _localDirty = false;
    _ultimoHash = _calcHash(DB);
    mostrarStatus("🟢 Online — dados sincronizados");
    const btnS = document.getElementById("btnSincronizar"); if(btnS) btnS.style.display="";
    atualizarHeaderUsuario();
    renderAtual();
    reenviarFotosPendentes(); // sobe ao Storage qualquer foto presa em base64
  }).catch(function(){
    mostrarStatus("🔴 Sem conexão (usando dados locais)");
    renderAtual();
  });
}

var _syncTimer = null;
var _ultimoHash = "";
var _localDirty = false; // true enquanto há dados locais ainda não confirmados na nuvem

function _calcHash(obj){ try{ var s=JSON.stringify(obj); return s.length+"_"+s.slice(-32); }catch(e){ return ""; } }

function sincronizarDB(manual){
  if(!_jbConfigurado()) return;
  // Não sobrescrever dados locais não salvos ainda
  if(_localDirty && !manual) return;
  if(manual) mostrarStatus("🔄 Sincronizando...");
  fetch("https://api.jsonbin.io/v3/b/"+JSONBIN.BIN_ID+"/latest", {
    headers:{"X-Master-Key": JSONBIN.BIN_KEY}
  }).then(function(r){ return r.json(); }).then(function(data){
    const novo = data.record || {};
    const novoHash = _calcHash(novo);
    const tsNuvem = novo._ts || 0;
    const tsLocal = DB._ts || 0;
    if(novoHash !== _ultimoHash && tsNuvem > tsLocal && !_localDirty){
      _ultimoHash = novoHash;
      DB = _restaurarFotos(novo, DB); // repõe fotos locais ainda não enviadas
      migrarDB();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
      mostrarStatus("🟢 Online — atualizado");
      atualizarHeaderUsuario();
      renderAtual();
    } else if(novoHash === _ultimoHash && manual){
      mostrarStatus("🟢 Online — já atualizado");
    } else if(manual && !_localDirty){
      mostrarStatus("🟢 Online — dados locais mais recentes");
    }
  }).catch(function(){
    if(manual) mostrarStatus("⚠️ Sem conexão");
  });
}

function iniciarAutoSync(){
  if(_syncTimer) clearInterval(_syncTimer);
  _syncTimer = setInterval(function(){
    if(document.hidden) return;
    if(_localDirty){
      // há edições/submissões feitas offline ainda não enviadas: tenta reenviar
      _tentarReenviarTexto();
    } else {
      sincronizarDB(false);
    }
  }, 30000); // a cada 30 segundos
}

// Reenvia ao JSONBin o que foi preenchido/submetido offline, assim que houver conexão
function _tentarReenviarTexto(){
  if(_localDirty && navigator.onLine && _jbConfigurado()) salvarDB();
}

function salvarDB(){
  DB._ts = Date.now(); // timestamp para resolver conflitos localStorage vs nuvem
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
  _localDirty = true; // marca que há dados locais não confirmados
  if(!_jbConfigurado()) return;
  clearTimeout(_saveTimer);
  _saveTimer = null;
  mostrarStatus("✏️ Editando...");
  _saveTimer = setTimeout(function(){
    _saveTimer = null; // timer disparou — limpa referência
    var payload = JSON.stringify(_dbParaNuvem()); // fotos viram placeholder; base64 fica só local
    fetch("https://api.jsonbin.io/v3/b/"+JSONBIN.BIN_ID, {
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN.BIN_KEY},
      body: payload
    }).then(function(r){ return r.json(); }).then(function(){
      _jbOk = true;
      _localDirty = false; // confirmado na nuvem
      _ultimoHash = _calcHash(DB); // atualiza hash para sync não sobrescrever
      mostrarStatus("🟢 Online — salvo na nuvem");
      backupSupabase(); // espelha cópia de segurança no Supabase (best-effort)
    }).catch(function(){
      // Mantém _localDirty = true para não perder dados na próxima sync
      mostrarStatus("⚠️ Salvo localmente (erro na nuvem)");
    });
  }, 1500);
}
function novoEstado(servico){
  return {
    obra:"", respInsp:"", data:"", locais:["Local 1","Local 2","Local 3"],
    status: servico.itens.map(()=>["","",""]),
    projeto: servico.itens.map(()=>""),
    nc: [],
    aprovadoPor:"", aprovadoData:"", inspecionadoPor:"", dataFechamento:"",
    aprovacao:{status:"pendente", por:"", data:"", obs:""},
    fotos:[],
    fotosItens: servico.itens.map(()=>[null,null,null]),
    fotosNc: []
  };
}
function getEstado(id){
  if(!DB.fichas[obraAtual]) DB.fichas[obraAtual] = {};
  const obraFichas = DB.fichas[obraAtual];
  var est = obraFichas[id];
  var servicoId = (est && est.servicoId) || ((String(id).indexOf("#")>=0) ? String(id).split("#")[0] : id);
  const servico = SERVICOS.find(s=>s.id===servicoId);
  if(!servico) return est || null;
  if(!est){ est = obraFichas[id] = novoEstado(servico); }
  est.servicoId = servicoId; est.tipo = "servico";
  if(!est.obra) est.obra = obraAtual;
  if(!est.status || est.status.length !== servico.itens.length){
    est.status = servico.itens.map(()=> est.locais.map(()=>""));
  }
  if(!est.projeto || est.projeto.length !== servico.itens.length){
    est.projeto = servico.itens.map(()=>"");
  }
  if(!est.nc) est.nc = [];
  if(!est.aprovacao) est.aprovacao = {status:"pendente", por:"", data:"", obs:""};
  if(!est.fotos) est.fotos = [];
  if(!est.fotosNc) est.fotosNc = [];
  // Sincronizar fotosItens com itens e locais atuais
  if(!est.fotosItens || est.fotosItens.length !== servico.itens.length){
    var oldFI = est.fotosItens || [];
    est.fotosItens = servico.itens.map(function(_,ri){
      var oldRow = oldFI[ri] || [];
      return est.locais.map(function(_,li){ return oldRow[li]||null; });
    });
  } else {
    est.fotosItens.forEach(function(row){
      while(row.length < est.locais.length) row.push(null);
      while(row.length > est.locais.length) row.pop();
    });
  }
  while(est.fotosNc.length < est.nc.length) est.fotosNc.push(null);
  while(est.fotosNc.length > est.nc.length) est.fotosNc.pop();
  return est;
}

function getEstadoMaterial(id){

  const mat = MATERIAIS.find(m=>m.id===servicoId);

  if(!est.resultados || est.resultados.length !== mat.criterios.length){
    est.resultados = mat.criterios.map(()=>"");
  }
  // migrar campos antigos individuais para array recebimentos
  if(!est.recebimentos){
    est.recebimentos = [{
      fornecedor: est.fornecedor||"", dataEntrega: est.dataEntrega||"",
      nf: est.nf||"", descricao: est.descricao||"",

    }];
    delete est.fornecedor; delete est.dataEntrega; delete est.nf;
    delete est.descricao; delete est.qtde; delete est.pedido;
  }
  if(!est.criteriosCustom) est.criteriosCustom = [];
  if(!est.resultadosCustom) est.resultadosCustom = [];
  // manter arrays em sincronia
  while(est.resultadosCustom.length < est.criteriosCustom.length) est.resultadosCustom.push("");
  while(est.resultadosCustom.length > est.criteriosCustom.length) est.resultadosCustom.pop();
  if(!est.cubic) est.cubic = {C:"",L:"",M1:"",M2:"",M3:"",M4:"",M5:""};
  if(!est.nc) est.nc = [];
  if(!est.aprovacao) est.aprovacao = {status:"pendente", por:"", data:"", obs:""};
  if(!est.fotos) est.fotos = [];
  return est;
}

function atualizarSeletorFicha(){
  // Mostra o seletor apenas durante a escolha (sem ficha aberta); esconde quando a ficha está aberta
  var sv = modoAtual==="servico" && !servicoAtual;
  var mv = modoAtual==="material" && !materialAtual;
  var e;
  e=document.getElementById("lblServico");     if(e) e.style.display = sv?"":"none";
  e=document.getElementById("servicoSelect");  if(e) e.style.display = sv?"":"none";
  e=document.getElementById("lblMaterial");    if(e) e.style.display = mv?"":"none";
  e=document.getElementById("materialSelect"); if(e) e.style.display = mv?"":"none";
}

function trocarModo(modo){
  if(typeof fecharCronoPanel==="function") fecharCronoPanel();
  modoAtual = modo;
  var _bS=document.getElementById("btnModoServico"); if(_bS) _bS.classList.toggle("ativo", modo==="servico");
  var _bM=document.getElementById("btnModoMaterial"); if(_bM) _bM.classList.toggle("ativo", modo==="material");
  var _bSa=document.getElementById("btnModoSalvas"); if(_bSa) _bSa.classList.toggle("ativo", modo==="salvas");
  const ehSalvas = modo==="salvas";
  // Na lista (salvas) a barra branca de ferramentas é redundante → esconde; aparece só dentro de uma ficha
  var _tb=document.querySelector(".toolbar"); if(_tb) _tb.style.display = (ehSalvas||modo==="cronograma"||modo==="workspace"||modo==="fichacrono") ? "none" : "";
  atualizarSeletorFicha(); // seletor "Serviço:/Material:" só aparece ao escolher (some quando a ficha abre)
  document.getElementById("btnAddLocal").style.display = modo==="servico" ? "" : "none";
  document.getElementById("btnRmLocal").style.display = modo==="servico" ? "" : "none";
  document.getElementById("btnImportarNF").style.display = modo==="material" ? "" : "none";
  // Ocultar botões de ação quando estiver na aba salvas
  ["imprimirFichaBtn","limparFichaBtn"].forEach(function(id){
    const el=document.getElementById(id); if(el) el.style.display=ehSalvas?"none":"";
  });
  renderAtual();
}

function atualizarToolbarBloqueio(){
  const est = estadoAtual();
  const bloq = fichaEstaBloqueada(est);
  const btnLimpar = document.getElementById("limparFichaBtn");
  const btnAddL   = document.getElementById("btnAddLocal");
  const btnRmL    = document.getElementById("btnRmLocal");
  if(btnLimpar) btnLimpar.style.opacity = bloq?"0.35":"";
  if(btnLimpar) btnLimpar.style.pointerEvents = bloq?"none":"";

}

function renderAtual(){
  var _ld=document.getElementById("appLoading"); if(_ld) _ld.style.display="none"; // some a tela de carregamento na 1a renderizacao
  if(!sessao){ atualizarHeaderUsuario(); renderLogin(); return; }
  atualizarHeaderUsuario();
  if(!obraAtual){ renderSeletorObra(); return; }
  _setBreadcrumb({workspace:"",cronograma:"Cronograma",salvas:"Fichas",servico:"Ficha",material:"Ficha",fichacrono:"Ficha"}[modoAtual]||"");
  if(modoAtual==="workspace"){ renderWorkspace(); return; }
  if(modoAtual==="cronograma"){ renderCronograma(); return; }
  if(modoAtual==="fichacrono"){ if(servicoAtual) renderFichaCronograma(servicoAtual); else { modoAtual="salvas"; renderFichasSalvas(); } return; }
  if(modoAtual==="salvas"){ renderFichasSalvas(); return; }
  if(modoAtual==="servico"){
    if(!servicoAtual){ document.getElementById("main").innerHTML = '<div class="empty">Selecione um serviço acima para abrir a ficha.</div>'; return; }
    renderFicha();
  } else {
    if(!materialAtual){ document.getElementById("main").innerHTML = '<div class="empty">Selecione um material acima para abrir a ficha.</div>'; return; }
    renderFichaMaterial();
  }
}

        (f.status&&f.status.some(function(r){return r.some(function(v){return v;});})) ||

  document.getElementById("obraAtualLabel").textContent = nome;
  document.getElementById("obraAtualBar").style.display = "";

  // Filtro inicial: se há fichas aguardando aprovação e o usuário aprova, já foca nelas

// ============ PARSER DO CRONOGRAMA (XLSX — template oficial) ============
// Normaliza para comparação tolerante (minúsculas, sem acento). Usado também no #3.
function _normHdr(s){
  return String(s||"").toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g,"") // tira acentos
    .replace(/\s+/g," ").trim();
}
// Duração: "55 dias" / 55 / "1 dia" → número de dias
function _mspDur(s){ if(typeof s==="number") return Math.round(s); var m=String(s||"").match(/(\d+(?:[.,]\d+)?)/); return m?Math.round(parseFloat(m[1].replace(",","."))):0; }
// Ano de referência p/ recuperar datas com ano truncado pelo export (ex.: "15/07/2" → 2026)
var _xlsxRefYear=0;
// Data pt-BR do MS Project: "Ter 30/06/26" (dd/mm/yy) ou Date do Excel → ISO yyyy-mm-dd
function _xlsxData(v){
  if(v==null || v==="") return "";
  if(v instanceof Date && !isNaN(v)) return v.getFullYear()+"-"+String(v.getMonth()+1).padStart(2,"0")+"-"+String(v.getDate()).padStart(2,"0");
  var m=String(v).replace(/^[A-Za-zÀ-ú]{2,4}\.?\s+/,'').match(/(\d{1,2})\/(\d{1,2})\/(\d{1,4})/); // dd/mm/yy (ano 1–4 díg.)
  if(!m) return "";
  var dd=+m[1], mm=+m[2], ys=m[3], yy=+ys;
  if(ys.length<=1){ yy = _xlsxRefYear || (2000+yy); }   // ano truncado → usa o ano de referência da planilha
  else if(yy<100){ yy+=2000; }
  if(mm<1||mm>12||dd<1||dd>31) return "";
  return yy+"-"+String(mm).padStart(2,"0")+"-"+String(dd).padStart(2,"0");
}
// Descobre o ano predominante (2–4 díg.) nas colunas de data, para corrigir anos truncados
function _xlsxDetectarAno(aoa, map, linhaIni){
  var cont={};
  for(var r=linhaIni; r<aoa.length; r++){
    var row=aoa[r]||[];
    [map.ini,map.fim].forEach(function(ci){
      if(ci==null) return; var c=row[ci]; if(c==null) return;
      var m=String(c).match(/\d{1,2}\/\d{1,2}\/(\d{2,4})/);
      if(m){ var y=+m[1]; if(y<100) y+=2000; cont[y]=(cont[y]||0)+1; }
    });
  }
  var best=0,bn=-1; Object.keys(cont).forEach(function(y){ if(cont[y]>bn){ bn=cont[y]; best=+y; } });
  return best || (new Date().getFullYear());
}
// Percentual concluído: aceita 0..1 (fração do Excel) ou 0..100 ou "50%"
function _xlsxPct(v){
  if(v==null || v==="") return 0;
  if(typeof v==="number"){ var n = (v>0 && v<=1) ? v*100 : v; return Math.max(0,Math.min(100,Math.round(n))); }
  var s=String(v).replace("%","").replace(",",".").trim(); var f=parseFloat(s); if(isNaN(f)) return 0;
  if(f>0 && f<=1) f*=100; return Math.max(0,Math.min(100,Math.round(f)));
}
// Colunas do CONTRATO oficial (identificadas por NOME, nunca por posição).
var _XLSX_COLS = {
  tarefa: {req:true,  rotulo:"Nome da Tarefa",        nomes:["nome da tarefa","tarefa"]},
  dur:    {req:true,  rotulo:"Duração",               nomes:["duracao","duração","dur"]},
  ini:    {req:true,  rotulo:"Início",                nomes:["inicio","início","data de inicio"]},
  fim:    {req:true,  rotulo:"Término",               nomes:["termino","término","data de termino","fim"]},
  pred:   {req:true,  rotulo:"Predecessoras",         nomes:["predecessoras","predecessores","predecessora","predecessor"]},
  pct:    {req:true,  rotulo:"Percentual Concluído",  nomes:["percentual concluido","percentual concluído","% concluida","% concluída","% concluido","% concluído","percentual","percentual concluida"]},
  fase:   {req:false, rotulo:"Fase",                  nomes:["fase"]}
};
// Localiza, dentro das primeiras linhas, a linha de cabeçalho e mapeia coluna→índice.
function _xlsxAcharCabecalho(aoa){
  for(var r=0; r<Math.min(aoa.length,15); r++){
    var row=aoa[r]||[]; var map={}; var achouTarefa=false;
    for(var c=0;c<row.length;c++){
      var h=_normHdr(row[c]); if(!h) continue;
      Object.keys(_XLSX_COLS).forEach(function(k){
        if(map[k]==null && _XLSX_COLS[k].nomes.indexOf(h)>=0){ map[k]=c; if(k==="tarefa") achouTarefa=true; }
      });
    }
    // considera cabeçalho a 1ª linha que tenha "Nome da Tarefa" e pelo menos mais uma coluna conhecida
    if(achouTarefa && Object.keys(map).length>=2) return {linha:r, map:map, headers:row.filter(function(x){return _normHdr(x);}).map(function(x){return String(x).trim();})};
  }
  return null;
}
function parseCronogramaXLSX(arrayBuffer){
  return new Promise(function(resolve,reject){
    if(typeof XLSX==="undefined"){ reject({tipo:"lib", msg:"O leitor de planilhas (XLSX) não carregou. Verifique sua internet e tente novamente."}); return; }
    var wb;
    try{ wb=XLSX.read(arrayBuffer,{type:"array",cellDates:true}); }
    catch(e){ reject({tipo:"lib", msg:"Não foi possível abrir o arquivo. Confirme que é um .xlsx válido."}); return; }
    if(!wb.SheetNames.length){ reject({tipo:"lib", msg:"A planilha está vazia."}); return; }
    var ws=wb.Sheets[wb.SheetNames[0]];
    var aoa=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null,blankrows:false});
    var cab=_xlsxAcharCabecalho(aoa);
    if(!cab){ reject({tipo:"colunas", faltando:["Nome da Tarefa","Duração","Início","Término","Predecessoras","Percentual Concluído"], encontradas:(aoa[0]||[]).filter(function(x){return x!=null&&String(x).trim();}).map(function(x){return String(x).trim();})}); return; }
    // Valida colunas obrigatórias
    var faltando=[];
    Object.keys(_XLSX_COLS).forEach(function(k){ if(_XLSX_COLS[k].req && cab.map[k]==null) faltando.push(_XLSX_COLS[k].rotulo); });
    if(faltando.length){ reject({tipo:"colunas", faltando:faltando, encontradas:cab.headers}); return; }
    var temFase = cab.map.fase!=null;
    _xlsxRefYear = _xlsxDetectarAno(aoa, cab.map, cab.linha+1);  // corrige anos truncados pelo export
    // Lê as linhas de dados
    var brutos=[];
    for(var r=cab.linha+1; r<aoa.length; r++){
      var row=aoa[r]||[];
      var nome=row[cab.map.tarefa]; if(nome==null || !String(nome).trim()) continue; // ignora linhas vazias
      var ini=_xlsxData(row[cab.map.ini]);
      var fim=_xlsxData(row[cab.map.fim]);
      var dur=_mspDur(row[cab.map.dur]);
      if(!dur && ini && fim){ var dd=_cDias(_cdISO(ini),_cdISO(fim)); if(dd>0) dur=dd; } // duração ausente → calcula por início/término
      brutos.push({
        nome:String(nome).trim(),
        dur:dur,
        ini:ini,
        fim:fim,
        pred:(row[cab.map.pred]!=null?String(row[cab.map.pred]).trim():""),
        pct:_xlsxPct(row[cab.map.pct]),
        fase: temFase ? (row[cab.map.fase]!=null && String(row[cab.map.fase]).trim() ? String(row[cab.map.fase]).trim() : "") : ""
      });
    }
    // Mantém apenas atividades com data de início (necessária para a timeline)
    var ativ=brutos.filter(function(b){ return b.ini; });
    if(!ativ.length){ reject({tipo:"vazio", msg:"Nenhuma atividade com data de Início válida foi encontrada. Verifique a coluna Início (formato dd/mm/aa)."}); return; }
    // Rótulo da fase: número → "Fase N"; texto → o próprio; vazio → "Geral"
    function rotFase(v){ if(v==null||v==="") return "Geral"; if(/^\d+(\.0+)?$/.test(String(v))) return "Fase "+parseInt(v,10); return String(v); }
    // Agrupa por fase (ordem de 1ª aparição). Sem coluna Fase → tudo em "Geral".
    var ordem=[], grupos={};
    ativ.forEach(function(b){
      var f = temFase ? rotFase(b.fase) : "Geral";
      if(!grupos[f]){ grupos[f]=[]; ordem.push(f); }
      grupos[f].push(b);
    });
    // Monta lista hierárquica: Fase (nível 0) + atividades (nível 1)
    var tarefas=[], id=0;
    ordem.forEach(function(f){
      var filhos=grupos[f];
      var inis=filhos.map(function(x){return x.ini;}).filter(Boolean).sort();
      var fims=filhos.map(function(x){return x.fim||x.ini;}).filter(Boolean).sort();
      var faseIni=inis[0]||"", faseFim=fims[fims.length-1]||"";
      tarefas.push({id:++id, nivel:0, nome:f, dur:0, ini:faseIni, fim:"", pred:"", pct:0, _fase:true});
      filhos.forEach(function(b){ tarefas.push({id:++id, nivel:1, nome:b.nome, dur:b.dur, ini:b.ini, fim:b.fim, pred:b.pred, pct:b.pct}); });
    });
    var nFases=ordem.length, nAtiv=ativ.length;
    resolve({ tarefas:tarefas, temPercentual:true, resumo:{ fases:nFases, servicos:nFases, atividades:nAtiv, total:tarefas.length } });
  });
}

var _wiz=null;
function criarNovaObra(){
  if(!ehAdmin()){ alert("Apenas Administradores podem criar obras."); return; }

  document.getElementById("modal-box").classList.add("modal-wide");
  renderWizard();
}
function _wizStepper(){
  var passos=["Nome","Cronograma","Processamento","Usuários","Revisão"];
  return '<div class="wiz-stepper">'+passos.map(function(p,i){
    var n=i+1, cls=_wiz.step===n?"atual":(_wiz.step>n?"feito":"");
    return '<div class="wiz-step '+cls+'"><span class="wiz-bola">'+(_wiz.step>n?"✓":n)+'</span><span class="wiz-lbl">'+p+'</span></div>';
  }).join('')+'</div>';
}
function renderWizard(){
  var corpo=_wizStepper()+'<div class="wiz-corpo">';
  var rodape='';
  if(_wiz.step===1){
    corpo+='<label class="wiz-campo-lbl">Nome da obra</label>'
      +'<input type="text" id="wiz-nome" class="wiz-input" value="'+escapeHtml(_wiz.nome)+'" placeholder="Ex: SGT1325 — Facilities Building">'
      +(_wiz.erro?'<div class="wiz-erro">⚠️ '+escapeHtml(_wiz.erro)+'</div>':'');
    rodape='<button type="button" class="secundario" onclick="fecharModalForce()">Cancelar</button>'
      +'<button type="button" onclick="wizPasso1()">Avançar ›</button>';
  } else if(_wiz.step===2){

      +'<div class="wiz-usr-lista">'+lista+'</div>';
    rodape='<button type="button" class="secundario" onclick="wizVoltar4()">‹ Voltar</button>'
      +'<button type="button" onclick="wizPasso4()">Avançar ›</button>';

function wizIr(n){ _wiz.step=n; _wiz.erro=""; _wiz.erroEstrut=null; renderWizard(); }
function wizPasso1(){
  var nome=((document.getElementById("wiz-nome")||{}).value||"").trim();

  if((DB.obras||[]).indexOf(nome)>=0){ _wiz.erro="Já existe uma obra com esse nome."; renderWizard(); return; }
  _wiz.nome=nome; _wiz.erro=""; _wiz.step=2; renderWizard();

function _wizColetarUsuarios(){
  var livreEl=document.getElementById("wiz-acesso-livre");
  if(livreEl) _wiz.acessoLivre=livreEl.checked;
  var sel=[]; document.querySelectorAll(".wiz-usr-cb:checked").forEach(function(cb){ sel.push(cb.dataset.uid); });

function wizVoltar4(){ _wizColetarUsuarios(); _wiz.step=3; renderWizard(); }
function wizPasso4(){ _wizColetarUsuarios(); _wiz.step=5; renderWizard(); }
function wizFinalizar(){
  if(!_wiz||!_wiz.parsed) return;
  var nome=_wiz.nome;
  if(!DB.obras) DB.obras=[]; if(!DB.fichas) DB.fichas={}; if(!DB.obraCronograma) DB.obraCronograma={}; if(!DB.obraAcessos) DB.obraAcessos={};
  if(DB.obras.indexOf(nome)<0) DB.obras.push(nome);
  if(!DB.fichas[nome]) DB.fichas[nome]={};
  DB.obraCronograma[nome]={ projeto:nome, tarefas:_wiz.parsed.tarefas, importadoEm:Date.now(), temPercentual:!!_wiz.parsed.temPercentual };
  // Semeia o percentual inicial vindo da planilha (Percentual Concluído)
  if(_wiz.parsed.temPercentual){
    if(!DB.cronogramaPct) DB.cronogramaPct={};
    DB.cronogramaPct[nome]={};
    _wiz.parsed.tarefas.forEach(function(t){ if(!t._fase && typeof t.pct==="number") DB.cronogramaPct[nome][t.id]=t.pct; });
  }
  // Acesso definido no passo 4 (sem etapa de seleção de serviços/fichas — ocultada nesta fase)
  if(_wiz.acessoLivre){ delete DB.obraAcessos[nome]; } else { DB.obraAcessos[nome]=_wiz.usuariosSel.slice(); }
  registrarLog("criar-obra-cronograma",{obra:nome, tarefas:_wiz.parsed.tarefas.length});
  registrarEvento("obra_criada",{obra:nome,entidade:"obra",entidadeId:nome,origem:"wizard",depois:{nome:nome,tarefas:_wiz.parsed.tarefas.length},detalhe:"Obra criada com cronograma ("+_wiz.parsed.tarefas.length+" tarefas)"});
  registrarEvento("cronograma_importado",{obra:nome,entidade:"cronograma",entidadeId:nome,origem:"import",depois:{tarefas:_wiz.parsed.tarefas.length},detalhe:"Cronograma importado"});
  salvarDB();
  _wiz=null;
  fecharModalForce();
  selecionarObra(nome);
}

document.getElementById("cronoFileInput").addEventListener("change", function(e){
  var file=e.target.files[0]; e.target.value="";
  if(!file || !_wiz) return;
  var nome=(file.name||"").toLowerCase();
  if(!/\.xlsx$/.test(nome)){ _wiz.erro="Envie um arquivo .xlsx (planilha do Excel). PDF não é mais aceito."; _wiz.erroEstrut=null; _wiz.step=2; renderWizard(); return; }
  _wiz.step=3; _wiz.processando=true; _wiz.parsed=null; _wiz.erro=""; _wiz.erroEstrut=null; renderWizard();
  var reader=new FileReader();
  reader.onload=function(ev){
    parseCronogramaXLSX(ev.target.result).then(function(res){
      _wiz.processando=false; _wiz.parsed=res; _wiz.step=3; renderWizard();
    }).catch(function(err){
      _wiz.processando=false; _wiz.parsed=null;
      if(err && err.tipo==="colunas"){ _wiz.erroEstrut=err; _wiz.erro=""; }
      else { _wiz.erro=(err&&err.msg)||(err&&err.message)||String(err); _wiz.erroEstrut=null; }
      _wiz.step=2; renderWizard();
    });
  };
  reader.onerror=function(){ _wiz.processando=false; _wiz.erro="Não consegui ler o arquivo selecionado."; _wiz.erroEstrut=null; _wiz.step=2; renderWizard(); };
  reader.readAsArrayBuffer(file);
});

// Mensagem de erro do wizard (estruturada quando faltam colunas obrigatórias)
function _wizErroHtml(){
  if(_wiz.erroEstrut){
    var e=_wiz.erroEstrut;
    var falt=(e.faltando||[]).map(function(c){return '<li>'+escapeHtml(c)+'</li>';}).join('');
    var enc=(e.encontradas&&e.encontradas.length)?(e.encontradas.map(function(c){return '<li>'+escapeHtml(c)+'</li>';}).join('')):'<li><i>(nenhuma coluna reconhecida)</i></li>';
    return '<div class="wiz-erro wiz-erro-estrut">'
      +'<div class="we-tit">❌ Não foi possível importar o cronograma.</div>'
      +'<div class="we-sub">O arquivo enviado não segue o padrão esperado.</div>'
      +'<div class="we-bloco"><b>Colunas obrigatórias não encontradas:</b><ul>'+falt+'</ul></div>'
      +'<div class="we-bloco"><b>Colunas encontradas no arquivo:</b><ul>'+enc+'</ul></div>'
      +'<div class="we-rev">Revise o arquivo e tente novamente. Use o botão <b>Baixar Modelo (.xlsx)</b>.</div>'
      +'</div>';
  }
  return _wiz.erro?'<div class="wiz-erro">⚠️ '+escapeHtml(_wiz.erro)+'</div>':'';
}

  if(typeof XLSX==="undefined"){ alert("O gerador de planilhas (XLSX) não carregou. Verifique sua internet e tente novamente."); return; }
  var headers=["Nome da Tarefa","Duração","Início","Término","Predecessoras","Percentual Concluído","Fase"];
  var exemplo=[
    ["Reunião de alinhamento","1 dia","Ter 30/06/26","Ter 30/06/26","","0","Serviços Preliminares"],
    ["Montagem de linha de vida","1 dia","Ter 14/07/26","Ter 14/07/26","","0","Linha 1"],

    ["Instalação de calha","6 dias","Qua 15/07/26","Qua 22/07/26","2","50","Linha 1"]

    ["Modelo Oficial de Cronograma — Importação"],
