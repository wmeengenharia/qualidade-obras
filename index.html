    ["Preencha a aba 'Cronograma' (1ª aba) com uma linha por ATIVIDADE."],
    [""],
    ["COLUNAS OBRIGATÓRIAS (identificadas pelo NOME, em qualquer ordem):"],
    ["• Nome da Tarefa  — nome da atividade"],
    ["• Duração         — ex.: '6 dias' ou '1 dia'"],
    ["• Início          — data de início (dd/mm/aa). Ex.: Ter 30/06/26"],
    ["• Término         — data de término (dd/mm/aa)"],
    ["• Predecessoras   — pode ficar vazio"],
    ["• Percentual Concluído — 0 a 100 (ou 0 a 1). Define o avanço inicial"],
    [""],
    ["COLUNA OPCIONAL:"],
    ["• Fase            — agrupa as atividades por fase. Se ausente, tudo entra em 'Geral'."],
    [""],
    ["COMO EXPORTAR DO MICROSOFT PROJECT:"],
    ["1. Abra o cronograma no MS Project."],
    ["2. Exiba/garanta as colunas: Nome da Tarefa, Duração, Início, Término, Predecessoras, % concluída e (opcional) Fase."],
    ["3. Selecione a tabela e copie para o Excel, OU use Arquivo > Salvar como > Pasta de Trabalho do Excel (.xlsx)."],
    ["4. Ajuste os cabeçalhos exatamente como nesta planilha modelo e salve em .xlsx."],
    [""],
    ["IMPORTANTE: a importação só aceita .xlsx. Se faltar qualquer coluna obrigatória, a obra NÃO será criada."]
  ];

function gerenciarAcessoObra(nome, recemCriada){
  if(!ehAdmin()){ alert("Apenas administradores podem gerenciar acessos."); return; }
  const usuarios = (DB.usuarios||[]).filter(function(u){ return u.ativo && u.id!==sessao.id; });
  const acessoAtual = (DB.obraAcessos && DB.obraAcessos[nome]) || null;
  const checkboxes = usuarios.map(function(u){
    const marcado = acessoAtual===null || acessoAtual.indexOf(u.id)>=0;
    const tagTxt = {admin:"Admin",gestor:"Gestor",inspetor:"Inspetor",visualizador:"Visualizador"}[u.perfil]||u.perfil;
    return '<label style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0;cursor:pointer;">'
      +'<input type="checkbox" class="acesso-cb" data-uid="'+u.id+'"'+(marcado?" checked":"")+' style="width:auto;">'
      +'<span style="flex:1;font-size:13px;">'+escapeHtml(u.nome)+'<span style="font-size:11px;color:#888;margin-left:6px;">'+escapeHtml(u.email)+'</span></span>'
      +'<span class="tag tag-'+u.perfil+'" style="font-size:10px;">'+tagTxt+'</span>'
    +'</label>';
  }).join("")||'<div style="color:#888;font-size:12px;padding:8px 0;">Nenhum outro usuário cadastrado.</div>';

  const intro = recemCriada
    ? '<p style="font-size:13px;margin:0 0 10px;color:#333;">Obra <b>'+escapeHtml(nome)+'</b> criada. Selecione quem terá acesso a ela:</p>'
    : '<p style="font-size:13px;margin:0 0 10px;color:#333;">Usuários com acesso à obra <b>'+escapeHtml(nome)+'</b>:</p>';

  abrirModal("👥 Acesso à Obra",
    intro
    +'<p style="font-size:11.5px;color:#888;margin:0 0 8px;">O Administrador sempre tem acesso a todas as obras.</p>'
    +'<div style="max-height:260px;overflow-y:auto;">'+checkboxes+'</div>'
    +'<label style="display:flex;align-items:center;gap:8px;margin-top:10px;cursor:pointer;font-size:12.5px;font-weight:normal;">'
    +'<input type="checkbox" id="cb-acesso-livre" style="width:auto;"'+(acessoAtual===null?" checked":"")+'> Acesso livre (todos os usuários podem ver esta obra)</label>',
    '<button type="button" class="secundario" onclick="'+(recemCriada?'selecionarObra(\''+nome.replace(/'/g,"\\'")+'\')':'fecharModalForce()')+'">'+( recemCriada?'Pular':'Cancelar')+'</button>'
    +'<button type="button" onclick="confirmarAcessoObra(\''+nome.replace(/'/g,"\\'")+'\','+(recemCriada?'true':'false')+')">✔ Salvar Acesso</button>'
  );
  // Vincular toggle "acesso livre"
  setTimeout(function(){
    var cbLivre=document.getElementById("cb-acesso-livre");
    if(!cbLivre) return;
    function toggleCbs(livre){
      document.querySelectorAll(".acesso-cb").forEach(function(cb){ cb.disabled=livre; if(livre) cb.checked=true; });
    }
    toggleCbs(cbLivre.checked);
    cbLivre.addEventListener("change",function(){ toggleCbs(this.checked); });
  },100);
}

function confirmarAcessoObra(nome, recemCriada){
  if(!DB.obraAcessos) DB.obraAcessos={};
  var cbLivre=document.getElementById("cb-acesso-livre");
  if(cbLivre && cbLivre.checked){
    // Acesso livre: remover restrição
    delete DB.obraAcessos[nome];
  } else {
    var ids=[];
    document.querySelectorAll(".acesso-cb:checked").forEach(function(cb){ ids.push(cb.dataset.uid); });
    DB.obraAcessos[nome]=ids;
  }
  registrarLog("gerenciar-acesso-obra",{obra:nome});
  salvarDB();
  fecharModalForce();
  // Na criação, segue para a seleção de serviços/materiais da obra
  if(recemCriada){ gerenciarServicosObra(nome, true); } else { renderSeletorObra(); }
}

// ===== SERVIÇOS/MATERIAIS DISPONÍVEIS POR OBRA =====
// Retrocompat: obra sem entrada em DB.obraServicos OU sem a lista do tipo => TODOS disponíveis.
function _idPermitidoObra(tipo, id, obra){
  obra = obra || obraAtual;
  var conf = DB.obraServicos && DB.obraServicos[obra];
  if(!conf) return true;                       // obra não configurada → tudo (como antes)
  var lista = tipo==="servico" ? conf.servicos : conf.materiais;
  if(!Array.isArray(lista)) return true;       // tipo sem restrição definida → tudo
  return lista.indexOf(id) >= 0;
}
function _idsPermitidosCat(tipo, cat, obra){
  return (cat.ids||[]).filter(function(id){ return _idPermitidoObra(tipo, id, obra); });
}

function gerenciarServicosObra(nome, recemCriada){
  if(!ehAdmin()){ alert("Apenas administradores podem configurar serviços da obra."); return; }
  var conf = (DB.obraServicos && DB.obraServicos[nome]) || null;
  var servSel = conf && Array.isArray(conf.servicos) ? conf.servicos : null; // null = todos marcados
  var matSel  = conf && Array.isArray(conf.materiais) ? conf.materiais : null;

  function bloco(tipo, cats, lista, sel){
    var html = '';
    cats.forEach(function(cat){
      var itensHtml = '';
      (cat.ids||[]).forEach(function(id){
        var it = lista.find(function(x){ return x.id===id; });
        if(!it) return;
        var marcado = (sel===null) || sel.indexOf(id)>=0;
        var lbl = tipo==="servico" ? ("FVS "+id+" — "+it.titulo) : ("FVM "+id.replace("M","")+" — "+it.material);
        itensHtml += '<label class="srv-item"><input type="checkbox" class="srv-cb" data-tipo="'+tipo+'" data-id="'+escapeHtml(id)+'"'+(marcado?' checked':'')+'> '+escapeHtml(lbl)+'</label>';
      });
      if(!itensHtml) return;
      html += '<div class="srv-cat"><div class="srv-cat-h">'+(cat.ic||"📂")+' '+escapeHtml(cat.nome)+'</div>'+itensHtml+'</div>';
    });
    return html;
  }

  var corpo = '<p style="font-size:13px;margin:0 0 6px;color:#333;">Marque quais fichas ficam disponíveis para criar na obra <b>'+escapeHtml(nome)+'</b>.</p>'
    +'<p style="font-size:11.5px;color:#888;margin:0 0 8px;">Só os itens marcados aparecem no “➕ Nova ficha”. (Fichas já criadas continuam visíveis.)</p>'
    +'<div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;">'
    +'<button type="button" class="secundario" style="font-size:11px;padding:4px 10px;" onclick="_marcarTodosSrv(true)">Marcar todos</button>'
    +'<button type="button" class="secundario" style="font-size:11px;padding:4px 10px;" onclick="_marcarTodosSrv(false)">Desmarcar todos</button></div>'
    +'<div style="max-height:340px;overflow-y:auto;border:1px solid #eee;border-radius:6px;padding:8px 10px;">'
    +'<div class="srv-grupo-tit">📋 Fichas de Serviço (FVS)</div>'
    + bloco("servico", CATEGORIAS, SERVICOS, servSel)
    +'<div class="srv-grupo-tit" style="margin-top:12px;">📦 Fichas de Material (FVM)</div>'
    + bloco("material", CATEGORIAS_MAT, MATERIAIS, matSel)
    +'</div>';

  document.getElementById("modal-box").classList.add("modal-wide");
  abrirModal("🧰 Serviços/Materiais da Obra", corpo,
    '<button type="button" class="secundario" onclick="'+(recemCriada?'gerenciarServicosObra_pular(\''+nome.replace(/'/g,"\\'")+'\')':'fecharModalForce()')+'">'+(recemCriada?'Pular (deixar todos)':'Cancelar')+'</button>'
    +'<button type="button" onclick="confirmarServicosObra(\''+nome.replace(/'/g,"\\'")+'\','+(recemCriada?'true':'false')+')">✔ Salvar</button>'
  );
}
function _marcarTodosSrv(v){ document.querySelectorAll('.srv-cb').forEach(function(cb){ cb.checked=v; }); }
function gerenciarServicosObra_pular(nome){ // recém-criada: pular = sem restrição (todos)
  if(DB.obraServicos) delete DB.obraServicos[nome];
  fecharModalForce();
  selecionarObra(nome);
}
function confirmarServicosObra(nome, recemCriada){
  if(!ehAdmin()){ fecharModalForce(); return; }
  var servicos=[], materiais=[];
  document.querySelectorAll('.srv-cb[data-tipo="servico"]:checked').forEach(function(cb){ servicos.push(cb.dataset.id); });
  document.querySelectorAll('.srv-cb[data-tipo="material"]:checked').forEach(function(cb){ materiais.push(cb.dataset.id); });

  fecharModalForce();
  if(recemCriada){ selecionarObra(nome); } else { renderAtual(); }
}

function confirmarMeuPerfil(){
  const nome  = ((document.getElementById("mp-nome")||{}).value||"").trim();
  const email = ((document.getElementById("mp-email")||{}).value||"").trim().toLowerCase();
  const senhaAtual = (document.getElementById("mp-senha-atual")||{}).value||"";
  const senhaNova  = (document.getElementById("mp-senha-nova")||{}).value||"";
  const senhaConf  = (document.getElementById("mp-senha-conf")||{}).value||"";
  if(!nome||!email){ modalMsg("Nome e e-mail são obrigatórios."); return; }
  if(!senhaAtual){ modalMsg("Informe a senha atual para confirmar."); return; }
  const u = (DB.usuarios||[]).find(function(u){ return u.id===sessao.id; });
  if(!u){ modalMsg("Usuário não encontrado."); return; }
  if(u.senhaHash !== hashSenha(senhaAtual)){ modalMsg("Senha atual incorreta."); return; }
  if(senhaNova){
    if(senhaNova.length<4){ modalMsg("Nova senha deve ter ao menos 4 caracteres."); return; }
    if(senhaNova!==senhaConf){ modalMsg("As senhas não coincidem."); return; }
    u.senhaHash = hashSenha(senhaNova);
  }
  // Verificar e-mail duplicado
  if((DB.usuarios||[]).some(function(x){ return x.email===email && x.id!==u.id; })){ modalMsg("E-mail já em uso por outro usuário."); return; }
  u.nome = nome; u.email = email;
  sessao.nome = nome; sessao.email = email;
  salvarSessaoStorage();
  registrarLog("editar-proprio-perfil");
  salvarDB();
  atualizarHeaderUsuario();
  modalMsg("✅ Perfil atualizado com sucesso!");
  setTimeout(fecharModalForce, 900);
}

function confirmarEditarObra(nomeAntigo){
  if(!ehAdmin()){ fecharModalForce(); return; }
  const nomeEl = document.getElementById("ea-nome");
  const nomeNovo = nomeEl ? nomeEl.value.trim() : nomeAntigo;
  if(!nomeNovo){ alert("O nome da obra não pode estar vazio."); return; }

  // Verificar nome duplicado
  if(nomeNovo !== nomeAntigo && (DB.obras||[]).indexOf(nomeNovo)!==-1){
    alert("Já existe uma obra com esse nome."); return;
  }

  // Salvar logo
  if(_editObraLogoNovo === ""){
    if(DB.obraLogos) delete DB.obraLogos[nomeAntigo];
  } else if(_editObraLogoNovo){
    if(!DB.obraLogos) DB.obraLogos = {};
    DB.obraLogos[nomeAntigo] = _editObraLogoNovo;
  }

  // Salvar acesso
  const usuarios = (DB.usuarios||[]).filter(function(u){ return u.ativo && u.id!==sessao.id; });
  if(usuarios.length > 0){
    const selecionados = usuarios.filter(function(u){
      const cb = document.getElementById("ea-usr-"+u.id);
      return cb && cb.checked;
    }).map(function(u){ return u.id; });
    if(!DB.obraAcessos) DB.obraAcessos = {};
    // Se todos marcados, acesso livre (null); senão, lista restrita
    if(selecionados.length === usuarios.length){
      delete DB.obraAcessos[nomeAntigo];
    } else {
      DB.obraAcessos[nomeAntigo] = selecionados;
    }
  }

  // Renomear obra se necessário
  if(nomeNovo !== nomeAntigo){
    const idx = (DB.obras||[]).indexOf(nomeAntigo);
    if(idx!==-1) DB.obras[idx] = nomeNovo;
    // Mover fichas
    if(DB.fichas && DB.fichas[nomeAntigo]){
      DB.fichas[nomeNovo] = DB.fichas[nomeAntigo];
      delete DB.fichas[nomeAntigo];
      // Atualizar campo obra dentro de cada ficha
      Object.values(DB.fichas[nomeNovo]).forEach(function(f){ if(f) f.obra = nomeNovo; });
    }
    // Mover acessos e logos
    if(DB.obraAcessos && DB.obraAcessos[nomeAntigo]!==undefined){
      DB.obraAcessos[nomeNovo] = DB.obraAcessos[nomeAntigo];
      delete DB.obraAcessos[nomeAntigo];
    }
    if(DB.obraLogos && DB.obraLogos[nomeAntigo]!==undefined){
      DB.obraLogos[nomeNovo] = DB.obraLogos[nomeAntigo];
      delete DB.obraLogos[nomeAntigo];
    }
    if(DB.obraServicos && DB.obraServicos[nomeAntigo]!==undefined){
      DB.obraServicos[nomeNovo] = DB.obraServicos[nomeAntigo];
      delete DB.obraServicos[nomeAntigo];
    }
    if(obraAtual === nomeAntigo) obraAtual = nomeNovo;
  }

  registrarLog("editar-obra",{de:nomeAntigo, para:nomeNovo});
  registrarEvento("obra_alterada",{obra:nomeNovo,entidade:"obra",entidadeId:nomeNovo,origem:"app",antes:{nome:nomeAntigo},depois:{nome:nomeNovo},detalhe:(nomeAntigo!==nomeNovo?("Renomeada: "+nomeAntigo+" → "+nomeNovo):"Dados da obra alterados")});
  salvarDB();
  fecharModalForce();
  _editObraLogoNovo = null;
  renderAtual();
}

// ===== FICHAS A PARTIR DO CRONOGRAMA (fonte única) =====
function _cronoTarefasObra(obra){ obra=obra||obraAtual; var c=DB.obraCronograma&&DB.obraCronograma[obra]; return (c&&c.tarefas)||[]; }
function _cronoFaseDe(tarefas, idx){ // nome do ancestral de nível <=1
  var lv=tarefas[idx].nivel;
  for(var j=idx-1;j>=0;j--){ if(tarefas[j].nivel<lv){ if(tarefas[j].nivel<=1) return tarefas[j].nome; lv=tarefas[j].nivel; } }
  return "";
}
function _cronoTemFilhos(tarefas){ tarefas.forEach(function(t,i){ t.temFilhos=(i+1<tarefas.length)&&tarefas[i+1].nivel>t.nivel; }); return tarefas; }
function _cronoContagemFichas(servicoId){ // quantas fichas já existem p/ esta atividade
  var of=(DB.fichas&&DB.fichas[obraAtual])||{};
  return Object.keys(of).filter(function(k){ var e=of[k]; return e&&e.tipo==="cronograma"&&e.cronogramaId===servicoId; }).length;
}
function novaFichaCrono(){
  var tarefas=_cronoTemFilhos(_cronoTarefasObra());
  if(!tarefas.length){ abrirModal("➕ Nova ficha","<p style=\"font-size:13px;\">O cronograma desta obra não tem atividades.</p>",'<button type="button" class="secundario" onclick="fecharModalForce()">Fechar</button>'); return; }
  var corpo='<p style="font-size:13px;margin:0 0 12px;color:#555;">Escolha a <b>atividade do cronograma</b> para criar a ficha de verificação. Apenas atividades com <b>formulário de inspeção correspondente</b> aparecem habilitadas. Atividades sem formulário são controladas direto no cronograma (Finalização de Serviço).</p>'
    +'<div class="crono-pick">';
  var algumComForm=false;
  tarefas.forEach(function(t,i){
    if(t.temFilhos){
      corpo+='<div class="cp-grupo" style="padding-left:'+(t.nivel*12)+'px;">'+escapeHtml(t.nome)+'</div>';
    } else {
      var form=_formularioDaAtividade(t.nome);
      var n=_cronoContagemFichas(t.id);
      var jaTem = n>0 ? ' <span class="cp-cont">'+n+' ficha(s)</span>' : '';
      if(form){
        algumComForm=true;
        corpo+='<button type="button" class="cp-atv" style="padding-left:'+(t.nivel*12+10)+'px;" onclick="novaFichaCronoAbrir('+t.id+')">'
          +'<span class="cp-ic">📝</span>'
          +'<span class="cp-info"><span class="cp-nome">'+escapeHtml(t.nome)+'</span>'
          +'<span class="cp-datas">📄 '+escapeHtml((form.tipo==="servico"?"FVS ":"FVM ")+form.id+" — "+form.titulo)+'</span>'+jaTem+'</span></button>';
      } else {
        corpo+='<div class="cp-atv cp-atv-off" style="padding-left:'+(t.nivel*12+10)+'px;" title="Sem formulário de inspeção — controlada pelo cronograma">'
          +'<span class="cp-ic">📅</span>'
          +'<span class="cp-info"><span class="cp-nome">'+escapeHtml(t.nome)+'</span>'
          +'<span class="cp-datas cp-semform">Sem formulário · controle pelo cronograma</span></span></div>';
      }
    }
  });
  corpo+='</div>';
  if(!algumComForm) corpo+='<p style="font-size:12px;color:#999;margin-top:8px;">Nenhuma atividade desta obra possui formulário de inspeção correspondente. A aprovação dessas atividades é feita pelo cronograma (Finalização de Serviço).</p>';
  document.getElementById("modal-box").classList.add("modal-wide");
  abrirModal("➕ Nova ficha — cronograma", corpo, '<button type="button" class="secundario" onclick="fecharModalForce()">Cancelar</button>');
}
function novaFichaCronoAbrir(taskId){
  var tarefas=_cronoTemFilhos(_cronoTarefasObra());
  var t=null,idx=-1; for(var i=0;i<tarefas.length;i++){ if(tarefas[i].id===taskId){ t=tarefas[i]; idx=i; break; } }
  if(!t){ fecharModalForce(); alert("Atividade não encontrada no cronograma."); return; }
  if(!_atividadeTemFormulario(t.nome)){ fecharModalForce(); alert("Esta atividade não possui formulário de inspeção correspondente.\nA aprovação é feita direto no cronograma (Finalização de Serviço)."); return; }
  if(!DB.fichas) DB.fichas={}; if(!DB.fichas[obraAtual]) DB.fichas[obraAtual]={};
  var key="C"+taskId+"#"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  DB.fichas[obraAtual][key]={
    obra:obraAtual, tipo:"cronograma", cronogramaId:taskId, codigo:_proxFicCodigo(obraAtual),
    nome:t.nome, fase:_cronoFaseDe(tarefas,idx), planIni:t.ini, planFim:t.fim, planDur:t.dur, planPred:t.pred,
    respInsp:"", data:"", inspecionadoPor:"", dataFechamento:"",
    resultado:"", observacoes:"",
    nc:[], fotos:[],
    aprovacao:{status:"pendente",por:"",data:"",obs:""},
    criadoPor: sessao?sessao.id:""
  };
  registrarHistorico(key,"criou ficha (cronograma): "+t.nome);
  registrarEvento("ficha_criada",{entidade:"ficha",entidadeId:key,origem:"cronograma",depois:{codigo:DB.fichas[obraAtual][key].codigo,nome:t.nome,cronogramaId:taskId},detalhe:"Ficha criada para a atividade: "+t.nome});
  salvarDB();
  fecharModalForce();
  abrirFichaSalva("cronograma", key);
}

function _cronoTarefas(){
  var t;
  if(_obraTemCronograma()){
    // Fonte de verdade: cronograma importado DESTA obra (só linhas com datas válidas para o Gantt)
    t = DB.obraCronograma[obraAtual].tarefas
      .filter(function(o){ return o.ini; }) // precisa ter início para posicionar; Finish pode estar vazio
      .map(function(o){ return {id:o.id, lv:(o.nivel||0), nome:o.nome, dur:(o.dur||0), ini:o.ini, fim:o.fim||"", pred:(o.pred||"")}; });
    if(!t.length){ t = CRONOGRAMA.map(function(a){ return {id:a[0],lv:a[1],nome:a[2],dur:a[3],ini:a[4],fim:a[5],pred:a[6]}; }); }
  } else {
    t = CRONOGRAMA.map(function(a){ return {id:a[0],lv:a[1],nome:a[2],dur:a[3],ini:a[4],fim:a[5],pred:a[6]}; });
  }
  t.forEach(function(x,i){
    x.temFilhos = (i+1<t.length) && t[i+1].lv > x.lv;
    x.parent = null;
    for(var j=i-1;j>=0;j--){ if(t[j].lv < x.lv){ x.parent=t[j].id; break; } }
  });
  return t;
}

// Casa o nome da atividade com um formulário (match>0). Retorna {tipo,id,titulo,conf} ou null.
function _formularioDaAtividade(nome){
  var t=_normHdr(nome); if(!t) return null;
  for(var i=0;i<_MAPA_FORMS.length;i++){
    var m=_MAPA_FORMS[i];
    for(var j=0;j<m.kw.length;j++){
      var k=m.kw[j];
      // fronteira só no INÍCIO da palavra (permite stem/plural: "pre moldad" casa "pré moldadas")
      var re=new RegExp("(^|[^a-z0-9])"+k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"));
      if(re.test(t)){
        var lista=(m.tipo==="servico"?SERVICOS:MATERIAIS);
        var cat=lista.find(function(x){return x.id===m.id;});
        return {tipo:m.tipo, id:m.id, titulo:cat?(cat.titulo||cat.material||m.id):m.id, conf:m.conf};
      }
    }
  }
  return null;
}
// true se a atividade tem formulário de inspeção correspondente (fluxo de Ficha)
function _atividadeTemFormulario(nome){ return _formularioDaAtividade(nome)!=null; }

// REGRA (fonte de verdade = cronograma importado):
// Atividade COM formulário → status vem das Fichas (todas aprovadas = concluída).
// Atividade SEM formulário → status vem da Finalização de Serviço (aprovação no cronograma).
// Em ambos, Finish preenchido => Concluída; senão datas (futura/andamento/atrasada).
function _cronoStatus(tar){
  // Override universal: Finalização de Serviço aprovada (inclui conclusão MANUAL do gestor)
  var finO=_finalizacao(tar.id);
  if(finO){
    if(finO.status==="aprovado") return "concluida";
    if(finO.status==="pendente") return "pendente_aprov";
    // rejeitado → segue regra normal
  }
  if(_atividadeTemFormulario(tar.nome)){
    // Fluxo de Ficha: aprovação da ficha atualiza o cronograma
    var fs=_fichasDaAtividade(tar.id);
    if(fs.length){
      var algSub=false, todasAprov=true;
      fs.forEach(function(f){ var s=f.est&&f.est.aprovacao&&f.est.aprovacao.status; if(s==="submetido") algSub=true; if(s!=="aprovado") todasAprov=false; });
      if(todasAprov) return "concluida";
      if(algSub) return "pendente_aprov";
      // ficha em preenchimento → cai para a regra base (Finish/datas)
    }
  } else {
  }
  // Base: obras importadas com Percentual Concluído usam o % como fonte; demais usam o Finish (legado)
  if(_obraUsaPct()){
    if((_cronoPct(tar.id)||0) >= 100) return "concluida";
  } else if(tar.fim){ return "concluida"; }
  var hoje=_hojeISO();
  if(!tar.ini || hoje < tar.ini) return "futura";
  // fim previsto estimado = início + duração (para detectar atraso quando não há Finish)
  var fimPrev = tar.fim || tar.ini;
  if(!tar.fim && tar.dur>0){ var d=_cdISO(tar.ini); d.setDate(d.getDate()+tar.dur); fimPrev=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  if(hoje > fimPrev) return "atrasada";
  return "andamento";
}
// true se a obra atual foi importada com a coluna Percentual Concluído (o % é a fonte do status)
function _obraUsaPct(obra){ var c=DB.obraCronograma&&DB.obraCronograma[obra||obraAtual]; return !!(c&&c.temPercentual); }
// Finalização de serviço (governança): submissão por atividade do cronograma
function _finalizacao(taskId, obra){ obra=obra||obraAtual; var o=DB.finalizacoes&&DB.finalizacoes[obra]; return (o&&o[taskId])||null; }

function _cronoDados(taskId, obra){
  obra=obra||obraAtual;

// ===== CONCLUSÃO MANUAL (gestor/admin) — marca a atividade como concluída direto no cronograma =====
function marcarConcluidoManual(taskId){
  if(!podeAprovar()){ alert("Apenas Gestores e Administradores podem concluir serviços manualmente."); return; }
  var t=_cronoTarefas(), x=null; for(var i=0;i<t.length;i++){ if(t[i].id===taskId){ x=t[i]; break; } }
  if(x && x.temFilhos){ alert("Selecione uma atividade (não uma fase)."); return; }
  var anc = x?_cronoAncestrais(t,x):{fase:""};
  var nome = x?x.nome:("Atividade "+taskId);
  var hojeISO=_hojeISO(), hoje=new Date().toLocaleDateString("pt-BR");
  if(!DB.finalizacoes) DB.finalizacoes={}; if(!DB.finalizacoes[obraAtual]) DB.finalizacoes[obraAtual]={};
  DB.finalizacoes[obraAtual][taskId]={
    status:"aprovado", por:(sessao?sessao.nome:""), porId:(sessao?sessao.id:""), data:hoje,
    observacoes:"Concluído manualmente pelo gestor", comentarios:"",
    fase:(anc.fase&&anc.fase!=="—"?anc.fase:""), servicoNome:nome,
    aprovadoPor:(sessao?sessao.nome:""), aprovadoData:hoje, manual:true
  };
  // Real término + Finish = hoje (guarda o término planejado original para poder reabrir)
  var d=_cronoDados(taskId);
  var oc=DB.obraCronograma&&DB.obraCronograma[obraAtual];
  if(oc&&oc.tarefas){ for(var k=0;k<oc.tarefas.length;k++){ if(oc.tarefas[k].id===taskId){ if(d.fimPlan==null) d.fimPlan=oc.tarefas[k].fim||""; oc.tarefas[k].fim=hojeISO; break; } } }
  d.realFim=hojeISO;
  registrarEvento("finalizacao_aprovada",{entidade:"finalizacao",entidadeId:taskId,origem:"cronograma",depois:{status:"aprovado",manual:true,realFim:hojeISO,finish:hojeISO},detalhe:"Concluído manualmente pelo gestor (término real "+hoje+"): "+nome});
  salvarDB(); atualizarBadgePendencias();
  if(modoAtual==="cronograma") renderCronograma();
  renderCronoPanel(taskId);
  mostrarStatus("✅ Concluída — término real e Finish marcados para hoje");
}
function reabrirConcluidoManual(taskId){
  if(!podeAprovar()){ alert("Apenas Gestores e Administradores podem reabrir conclusões."); return; }
  var fin=_finalizacao(taskId);
  if(DB.finalizacoes && DB.finalizacoes[obraAtual]) delete DB.finalizacoes[obraAtual][taskId];
  // REVERTER: restaura o término planejado original e limpa o término real
  var d=DB.cronogramaDados&&DB.cronogramaDados[obraAtual]&&DB.cronogramaDados[obraAtual][taskId];

  if(d){ delete d.realFim; delete d.fimPlan; }

function _cronoPctTarefa(tar){
  // Override: finalização aprovada (inclui conclusão manual do gestor) = 100%; pendente = 0%
  var finP=_finalizacao(tar.id);
  if(finP){ if(finP.status==="aprovado") return 100; if(finP.status==="pendente") return 0; }
  if(_atividadeTemFormulario(tar.nome)){
    var fs=_fichasDaAtividade(tar.id);
    if(fs.length){
      var todasAprov=fs.every(function(f){ return f.est&&f.est.aprovacao&&f.est.aprovacao.status==="aprovado"; });
      if(todasAprov) return 100;
      // alguma ainda não aprovada → não conta como concluído (segue base)
    }
  }
  // Obras com Percentual Concluído: o % importado/ajustado é a fonte. Legado: Finish=100%.
  if(_obraUsaPct()) return Math.max(0,Math.min(100,_cronoPct(tar.id)||0));
  return tar.fim ? 100 : (_cronoPct(tar.id)||0);
}
function _cronoCalc(t){
  var pctById={}, stById={};
  // Folhas: 100% se tem Finish; senão % manual (0 por padrão)
  t.forEach(function(x){ if(!x.temFilhos) pctById[x.id]=_cronoPctTarefa(x); });
  function folhasDesc(idx){ var r=[],bl=t[idx].lv; for(var j=idx+1;j<t.length;j++){ if(t[j].lv<=bl) break; if(!t[j].temFilhos) r.push(t[j]); } return r; }
  t.forEach(function(x,i){
    if(x.temFilhos){ var fs=folhasDesc(i),tot=0,acc=0; fs.forEach(function(f){ var d=Math.max(f.dur,0.5); tot+=d; acc+=d*(pctById[f.id]||0); }); pctById[x.id]=tot?Math.round(acc/tot):0; }
  });
  var tot=0,acc=0,cont={concluida:0,andamento:0,atrasada:0,futura:0,pendente_aprov:0};
  t.forEach(function(x){ stById[x.id]=_cronoStatus(x); if(!x.temFilhos){ var d=Math.max(x.dur,0.5); tot+=d; acc+=d*(pctById[x.id]||0); if(cont[stById[x.id]]!==undefined) cont[stById[x.id]]++; } });
  return {pct:pctById, st:stById, geral:(tot?Math.round(acc/tot):0), cont:cont};
}
// % por fase (nível 1 com filhos) — usa o rollup do _cronoCalc
function _cronoFasesPct(t, calc){
  return t.filter(function(x){ return x.nivel===1 && x.temFilhos; })
          .map(function(x){ return {nome:x.nome, pct:calc.pct[x.id]||0}; });
}

    return false;

}

function renderCronoPanel(id){
  var t=_cronoTarefas(); var x=null; for(var k=0;k<t.length;k++){ if(t[k].id===id){x=t[k];break;} }
  if(!x){ return false; }

  var calc=_cronoCalc(t); var pct=calc.pct[id]||0; var st=calc.st[id];
  var anc=_cronoAncestrais(t,x);
  var info=_CRONO_ST_INFO[st]||_CRONO_ST_INFO.futura;
  var stLblFull={concluida:"Concluído",pendente_aprov:"Pendente de Aprovação",andamento:"Em andamento",atrasada:"Atrasado",futura:"Futura"}[st];
  var fin=_finalizacao(id);
  var ligs=_fichasDaAtividade(id);   // relação 1:N — TODAS as fichas da atividade
  var lig=ligs.length?ligs[0]:null;  // primeira (para o rodapé / atalho rápido)
  var form=(!x.temFilhos)?_formularioDaAtividade(x.nome):null;  // formulário correspondente (match>0) ou null
  var temForm=!!form;

  // ----- Planejado / Real / Diferença -----
  var cdat=(DB.cronogramaDados&&DB.cronogramaDados[obraAtual]&&DB.cronogramaDados[obraAtual][id])||{};
  var planFim=(cdat.fimPlan!=null && cdat.fimPlan!=="")? cdat.fimPlan : (x.fim||""); // término planejado (baseline)
  var realISO=cdat.realFim ? cdat.realFim : ((fin&&fin.status==="aprovado"&&fin.aprovadoData)? paraISO(fin.aprovadoData) : (x.fim||""));
  var difTxt="—", difCor="#616161";
  if(planFim && realISO){
    var dd=_cDias(_cdISO(planFim), _cdISO(realISO));
    if(dd>0){ difTxt="🔴 +"+dd+" dia(s) de atraso"; difCor="#c62828"; }
    else if(dd<0){ difTxt="🟢 "+(-dd)+" dia(s) adiantado"; difCor="#2e7d32"; }
    else { difTxt="🟢 No prazo"; difCor="#2e7d32"; }
  } else if(!planFim){ difTxt="Em aberto (sem término)"; difCor="#616161"; }

  // ----- Explicação do status -----
  var stExpl;
  if(st==="concluida"){ stExpl=(fin&&fin.status==="aprovado")?"Concluído após aprovação do gestor na Finalização de Serviço.":"Concluído automaticamente porque existe data de término (Finish) no cronograma."; }
  else if(st==="pendente_aprov"){ stExpl="Serviço enviado e aguardando aprovação do gestor."; }
  else if(st==="andamento"){ stExpl="Atividade iniciada e dentro do período planejado (ainda sem data Finish)."; }
  else if(st==="atrasada"){ stExpl="O término previsto já passou e ainda não há Finish nem aprovação."; }
  else { stExpl="Atividade ainda não iniciada — prevista para uma data futura."; }

  var editavel = !x.temFilhos && !x.fim && podeEditar();

  // ===== HEADER =====
  var html='<div class="cp-head" style="background:'+info.bg+';">'
    +'<button type="button" class="cp-x" onclick="fecharCronoPanel()" aria-label="Fechar">✖</button>'
    +'<div class="cp-h-nome">📌 '+escapeHtml(x.nome)+'</div>'
    +'<div class="cp-h-meta">'
      +'<span class="cp-badge" style="color:'+info.cor+';background:#fff;border:1px solid '+info.cor+'33;">'+info.ic+' '+stLblFull+'</span>'
      +(anc.fase&&anc.fase!=="—"?'<span class="cp-fase">'+escapeHtml(anc.fase)+'</span>':'')
    +'</div></div>';

  html+='<div class="cp-body">';

  // ===== CARD RESUMO =====

    +_cpLinha("⏱","Duração", x.dur+" dia(s)")
    +_cpLinha("📈","Progresso", pct+"%")
    +_cpLinha("👤","Responsável", escapeHtml((fin&&fin.por)||"—"))
    +_cpLinha("🔗","Predecessoras", x.pred?escapeHtml(x.pred):"—")
  +'</div>';
  // editor de % (atividades-folha sem Finish)
  if(editavel){
    html+='<div class="cp-pct-edit"><label>Atualizar % concluído</label>'
      +'<div class="cp-pct-row"><input type="range" id="crono-pct" min="0" max="100" step="5" value="'+pct+'" oninput="document.getElementById(\'crono-pct-v\').textContent=this.value+\'%\'">'
      +'<b id="crono-pct-v">'+pct+'%</b>'
      +'<button type="button" class="cp-btn cp-btn-pri" onclick="setCronoPct('+id+',document.getElementById(\'crono-pct\').value);renderCronoPanel('+id+')">💾 Salvar</button></div></div>';
  } else if(x.temFilhos){
    html+='<div class="cp-nota">% calculado automaticamente pela média das atividades do grupo.</div>';
  }
  html+='</div>';

  // ===== CARD CRONOGRAMA =====
  html+='<div class="cp-card"><div class="cp-card-tit">Cronograma</div><div class="cp-grid">'
    +_cpLinha("🗓","Planejado", (x.ini?_fmtBR(x.ini):"—")+" → "+(planFim?_fmtBR(planFim):"—"))
    +_cpLinha("✅","Real (término)", realISO?_fmtBR(realISO):"—")
    +_cpLinha("📊","Diferença", difTxt, difCor)
  +'</div></div>';

  // ===== CARD STATUS =====
  html+='<div class="cp-card"><div class="cp-card-tit">Status</div>'
    +'<div class="cp-status-big" style="color:'+info.cor+';background:'+info.bg+';border:1px solid '+info.cor+'33;">'+info.ic+' '+stLblFull+'</div>'
    +'<div class="cp-status-expl">'+stExpl+'</div></div>';

  var finLbl={pendente:"🟡 Pendente de Aprovação",aprovado:"🟢 Aprovada",rejeitado:"🔴 Rejeitada"}[(fin&&fin.status)]||"—";

  // ===== CARD: FORMULÁRIO + FICHAS (atividade COM formulário) =====
  if(temForm){
    html+='<div class="cp-card"><div class="cp-card-tit">Formulário de inspeção</div>';
    html+=_cpLinha("📄","Formulário", escapeHtml((form.tipo==="servico"?"FVS ":"FVM ")+form.id+" — "+form.titulo));
    html+='<div class="cp-subtit">Fichas vinculadas <span class="cp-count">'+ligs.length+'</span></div>';
    if(podeEditar()) html+='<button type="button" class="cp-btn cp-btn-sec cp-addficha" onclick="novaFichaCronoAbrir('+id+')">➕ Nova ficha</button>';
    if(ligs.length){
      html+='<div class="cp-fichas">';
      ligs.forEach(function(l){
        var si=_fichaStatusInfo(l.est);

          +'<div class="cp-ficha-top"><span class="cp-ficha-cod">'+escapeHtml(l.est.codigo||"FIC")+'</span>'
            +'<span class="cp-ficha-badge" style="color:'+si.cor+';background:'+si.bg+';">'+si.ic+' '+si.lbl+'</span></div>'
          +'<div class="cp-ficha-nome">'+escapeHtml(l.est.nome||x.nome)+'</div>'
          +'<div class="cp-ficha-meta">👤 '+escapeHtml(l.est.respInsp||"—")+' &nbsp;·&nbsp; 📅 '+escapeHtml(l.est.data||"—")+'</div>'
          +'<button type="button" class="cp-btn cp-btn-sec cp-ficha-abrir" onclick="cronoAbrirFichaLigada(\''+l.key+'\')">Abrir ›</button>'
        +'</div>';
      });
      html+='</div>';
    } else {
      html+='<div class="cp-nota">Nenhuma ficha criada ainda para esta atividade.</div>';
    }
    html+='</div>';
  }

  // ===== CARD: CONTROLE PELO CRONOGRAMA (atividade SEM formulário) =====
  if(!x.temFilhos && !temForm){
    html+='<div class="cp-card"><div class="cp-card-tit">Aprovação pelo Cronograma</div>';
    html+='<div class="cp-nota">Esta atividade não possui formulário de inspeção correspondente. A conclusão é submetida e aprovada diretamente pelo gestor no cronograma (Finalização de Serviço).</div>';
    html+='<div class="cp-rel" style="margin-top:8px;">';
    html+=_cpLinha("✔","Status", finLbl);
    if(fin){
      html+=_cpLinha("👤","Usuário responsável", escapeHtml(fin.por||"—"));
      html+=_cpLinha("📅","Data da submissão", escapeHtml(fin.data||"—"));
      if(fin.status==="aprovado"&&fin.aprovadoPor) html+=_cpLinha("🟢","Aprovado por", escapeHtml(fin.aprovadoPor)+(fin.aprovadoData?" · "+escapeHtml(fin.aprovadoData):""));
      if(fin.observacoes) html+=_cpLinha("📝","Observações", escapeHtml(fin.observacoes));
    }
    html+='</div></div>';
  }

  // ===== CARD FINALIZAÇÃO (legado: existe submissão mesmo com formulário) =====
  if(temForm && fin){
    html+='<div class="cp-card"><div class="cp-card-tit">Finalização de Serviço</div><div class="cp-rel">';
    html+=_cpLinha("✔","Status", finLbl);
    html+=_cpLinha("👤","Usuário responsável", escapeHtml(fin.por||"—"));
    html+=_cpLinha("📅","Data da submissão", escapeHtml(fin.data||"—"));
    if(fin.status==="aprovado"&&fin.aprovadoPor) html+=_cpLinha("🟢","Aprovado por", escapeHtml(fin.aprovadoPor)+(fin.aprovadoData?" · "+escapeHtml(fin.aprovadoData):""));
    if(fin.observacoes) html+=_cpLinha("📝","Observações", escapeHtml(fin.observacoes));
    html+='</div></div>';
  }

  // ===== CARD COMENTÁRIOS (ação direta no cronograma, sem ficha) =====
  var coments=_comentariosCrono(id);
  html+='<div class="cp-card"><div class="cp-card-tit">Comentários <span class="cp-count">'+coments.length+'</span></div>';
  if(coments.length){
    html+='<div class="cp-coments">';
    coments.slice().reverse().forEach(function(c){
      var dt=""; try{ dt=new Date(c.ts).toLocaleString("pt-BR"); }catch(e){ dt=c.ts||""; }
      html+='<div class="cp-coment"><div class="cp-coment-h"><b>'+escapeHtml(c.por||"?")+'</b><span>'+escapeHtml(dt)+'</span></div>'
        +'<div class="cp-coment-txt">'+escapeHtml(c.texto||"")+'</div></div>';
    });
    html+='</div>';
  } else { html+='<div class="cp-nota">Nenhum comentário ainda.</div>'; }
  if(podeEditar()){
    html+='<div class="cp-coment-add"><textarea id="cp-coment-input" rows="2" placeholder="Escreva um comentário..."></textarea>'
      +'<button type="button" class="cp-btn cp-btn-pri" onclick="addComentarioCrono('+id+')">Comentar</button></div>';
  }
  html+='</div>';

  // ===== CARD HISTÓRICO (auditoria estruturada) =====
  var evAudit=_eventosDaAtividade(id, ligs);
  var ev=[];
  if(evAudit.length){
    // Usa o event log estruturado (preciso) + marco de importação do cronograma
    evAudit.forEach(function(e){
      var info=_EV_INFO[e.tipo]||{ic:"•",cor:"#616161"};
      var dt=""; try{ dt=new Date(e.ts).toLocaleString("pt-BR"); }catch(_e){ dt=e.ts||""; }
      ev.push({ic:info.ic, cor:info.cor, txt:(e.detalhe||e.tipo)+" — "+e.usuario, dt:dt});
    });
  } else {
    // Fallback (dados antigos sem auditoria): histórico sintetizado
    var imp=DB.obraCronograma&&DB.obraCronograma[obraAtual]&&DB.obraCronograma[obraAtual].importadoEm;
    if(imp){ var di=new Date(imp); ev.push({ic:"🟢",cor:"#2e7d32",txt:"Cronograma importado",dt:di.toLocaleDateString("pt-BR")}); }
    if(fin){
      ev.push({ic:"🟡",cor:"#f9a825",txt:"Serviço enviado para aprovação"+(fin.por?" por "+fin.por:""),dt:fin.data||""});
      if(fin.status==="aprovado") ev.push({ic:"🟢",cor:"#2e7d32",txt:"Gestor aprovou a finalização"+(fin.aprovadoPor?" ("+fin.aprovadoPor+")":""),dt:fin.aprovadoData||""});
      else if(fin.status==="rejeitado") ev.push({ic:"🔴",cor:"#c62828",txt:"Gestor rejeitou a finalização"+(fin.aprovadoPor?" ("+fin.aprovadoPor+")":""),dt:fin.aprovadoData||""});
    }
    if(x.fim && !(fin&&fin.status==="aprovado")) ev.push({ic:"🟢",cor:"#2e7d32",txt:"Concluído pelo cronograma (data Finish)",dt:_fmtBR(x.fim)});
  }
  html+='<div class="cp-card"><div class="cp-card-tit">Histórico</div>';
  if(ev.length){
    html+='<div class="cp-timeline">';
    ev.forEach(function(e){ html+='<div class="cp-tl-item"><span class="cp-tl-dot" style="background:'+e.cor+';"></span>'
      +'<div class="cp-tl-txt"><div class="cp-tl-ev">'+e.ic+' '+escapeHtml(e.txt)+'</div>'+(e.dt?'<div class="cp-tl-dt">'+escapeHtml(e.dt)+'</div>':'')+'</div></div>'; });
    html+='</div>';
  } else { html+='<div class="cp-nota">Sem eventos registrados.</div>'; }
  html+='</div>';

  html+='</div>'; // cp-body

  // ===== RODAPÉ =====
  var foot='<div class="cp-foot">';
  if(temForm && podeEditar()) foot+='<button type="button" class="cp-btn cp-btn-sec" onclick="novaFichaCronoAbrir('+id+')">📝 Nova ficha</button>';
  if(ligs.length===1) foot+='<button type="button" class="cp-btn cp-btn-sec" onclick="cronoAbrirFichaLigada(\''+lig.key+'\')">📄 Abrir Ficha</button>';
  // Atividade SEM formulário: submissão direta no cronograma (Finalização de Serviço)
  if(!x.temFilhos && !temForm && podeEditar() && !(fin && (fin.status==="pendente"||fin.status==="aprovado"))){
    foot+='<button type="button" class="cp-btn cp-btn-pri" onclick="fecharCronoPanel();formFinalizacao('+id+')">📨 Submeter ao gestor</button>';
  }
  if(fin && fin.status==="pendente" && ehAdmin()){
    foot+='<button type="button" class="cp-btn cp-btn-rej" onclick="rejeitarFinalizacao('+id+')">✖ Rejeitar</button>'
      +'<button type="button" class="cp-btn cp-btn-apr" onclick="aprovarFinalizacao('+id+')">✔ Aprovar</button>';
  }
  // Conclusão manual pelo gestor/admin (atalho direto, sem precisar de ficha/submissão)
  if(!x.temFilhos && podeAprovar()){
    if(fin && fin.status==="aprovado"){
      foot+='<button type="button" class="cp-btn cp-btn-sec" onclick="reabrirConcluidoManual('+id+')">↩ Reabrir conclusão</button>';
    } else if(st!=="concluida" && !(fin && fin.status==="pendente")){
      foot+='<button type="button" class="cp-btn cp-btn-apr" onclick="marcarConcluidoManual('+id+')">✔ Marcar como concluído</button>';
    }
  }
  foot+='<button type="button" class="cp-btn" onclick="fecharCronoPanel()">Fechar</button>';
  foot+='</div>';

  var body=document.getElementById("cronoPanelBody");
  if(body) body.innerHTML=html+foot;
  _destacarLinhaCrono(id);
  return true;
}

var _cronoTcache=null, _cronoCalcCache=null; // cache p/ tooltip
function _cronoFimEf(x){
  if(x.fim) return x.fim;
  if(x.ini && x.dur>0){ var d=_cdISO(x.ini); d.setDate(d.getDate()+x.dur); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  return x.ini;
}
function renderCronograma(){
  const main=document.getElementById("main");
  const t=_cronoTarefas();
  const calc=_cronoCalc(t);
  _cronoTcache=t; _cronoCalcCache=calc;
  // índice id→posição (para contar descendentes de fases)
  var idx={}; t.forEach(function(x,i){ idx[x.id]=i; });
  function descFolhas(i){ var r=[],bl=t[i].lv; for(var j=i+1;j<t.length;j++){ if(t[j].lv<=bl) break; if(!t[j].temFilhos) r.push(t[j]); } return r; }
  function faseStatus(folhas){
    if(!folhas.length) return "futura";
    if(folhas.every(function(l){return calc.st[l.id]==="concluida";})) return "concluida";
    var has=function(s){ return folhas.some(function(l){return calc.st[l.id]===s;}); };
    if(has("atrasada")) return "atrasada";
    if(has("pendente_aprov")) return "pendente_aprov";
    if(has("andamento")) return "andamento";
    return "futura";
  }
  // ----- janela de datas (escala dinâmica = min início → max término reais) -----
  var minISO=null, maxISO=null;
  t.forEach(function(x){ if(!x.temFilhos===false && !x.ini) return; if(x.ini && (!minISO||x.ini<minISO)) minISO=x.ini; var fe=_cronoFimEf(x); if(fe && (!maxISO||fe>maxISO)) maxISO=fe; });
  if(!minISO) minISO=_hojeISO(); if(!maxISO||maxISO<minISO) maxISO=minISO;
  var min=_cdISO(minISO), max=_cdISO(maxISO);
  var span=Math.max(_cDias(min,max),1);
  function pos(iso){ if(!iso) return 0; var p=_cDias(min,_cdISO(iso))/span*100; return Math.max(0,Math.min(100,p)); }
  var Wmin=Math.max(Math.round(span*7),520); // px mínimos da timeline (responsivo: scroll em telas pequenas)
  var hojeISO=_hojeISO(); var posHoje=pos(hojeISO); var foraPrazo=(hojeISO>maxISO);

  // ----- Dashboard (cards) -----
  var c=calc.cont;
  var dash='<div class="crono-dash">'
    +'<div class="cd-card cd-geral"><div class="cd-num" data-count="'+calc.geral+'" data-suf="%">0%</div><div class="cd-lbl">Conclusão geral</div>'
      +'<div class="cd-bar"><div class="cd-bar-fill" style="width:'+calc.geral+'%"></div></div></div>'
    +'<div class="cd-card cd-click" onclick="abrirCronoDrill(\'concluida\')"><div class="cd-num cd-verde" data-count="'+c.concluida+'">0</div><div class="cd-lbl">🟢 Concluídas</div></div>'
    +'<div class="cd-card cd-click'+(c.pendente_aprov?' cd-pend':'')+'" onclick="abrirCronoDrill(\'pendente_aprov\')"><div class="cd-num cd-amarelo" data-count="'+c.pendente_aprov+'">0</div><div class="cd-lbl">🟡 Pend. aprovação</div></div>'
    +'<div class="cd-card cd-click" onclick="abrirCronoDrill(\'andamento\')"><div class="cd-num cd-azul" data-count="'+c.andamento+'">0</div><div class="cd-lbl">🔵 Em andamento</div></div>'
    +'<div class="cd-card cd-click" onclick="abrirCronoDrill(\'atrasada\')"><div class="cd-num cd-vermelho" data-count="'+c.atrasada+'">0</div><div class="cd-lbl">🔴 Atrasadas</div></div>'
    +'<div class="cd-card cd-click" onclick="abrirCronoDrill(\'futura\')"><div class="cd-num cd-cinza" data-count="'+c.futura+'">0</div><div class="cd-lbl">⚪ Futuras</div></div>'
    +'<div class="cd-card cd-prev"><div class="cd-num cd-data">'+_fmtBR(maxISO)+'</div><div class="cd-lbl">📅 Previsão de término</div></div>'
    +'</div>';

  // ----- Card "Próximas atividades" -----
  var futuras = t.filter(function(x){ return !x.temFilhos && calc.st[x.id]==="futura"; }).sort(function(a,b){ return a.ini.localeCompare(b.ini); });
  var atrasadas = t.filter(function(x){ return !x.temFilhos && calc.st[x.id]==="atrasada"; }).sort(function(a,b){ return a.ini.localeCompare(b.ini); });
  var prox=(atrasadas.concat(futuras)).slice(0,5);
  var proxItens = prox.length ? prox.map(function(p){
    var st=calc.st[p.id], info=_CRONO_ST_INFO[st]||_CRONO_ST_INFO.futura;
    return '<button type="button" class="px-item" onclick="cronoDetalhe('+p.id+')">'
      +'<span class="px-dot st-'+st+'"></span>'
      +'<span class="px-info"><span class="px-nome">'+escapeHtml(p.nome)+'</span>'
      +'<span class="px-meta">'+_fmtBR(p.ini)+' · '+info.lbl.replace(/s$/,'').replace("Concluída","Concluída")+'</span></span>'
      +'<span class="px-go">›</span></button>';
  }).join('') : '<div class="px-vazio">🎉 Sem próximas atividades pendentes.</div>';
  var proxCard='<div class="crono-prox-card"><div class="px-tit">⏭ Próximas atividades</div><div class="px-lista">'+proxItens+'</div></div>'
    + (foraPrazo?'<div class="crono-aviso">⚠️ Hoje ('+_fmtBR(hojeISO)+') é posterior ao término planejado ('+_fmtBR(maxISO)+').</div>':'');

  // ----- Cabeçalho por SEMANAS (posições em %) + grade semanal -----
  var weekPct=7/span*100;
  var nSem=Math.floor(span/7)+1;
  var labelEvery = nSem>32 ? 4 : (nSem>16 ? 2 : 1);
  var meses=''; var mesAtual=-1;
  for(var k=0;k<=Math.ceil(span/7);k++){
    var wd=new Date(min.getFullYear(),min.getMonth(),min.getDate()+k*7);
    if(wd>max && k>0) break;
    var leftp=Math.min(k*weekPct,100);
    var dia=String(wd.getDate()).padStart(2,"0");
    var mesMudou=(wd.getMonth()!==mesAtual); mesAtual=wd.getMonth();
    var lbl = (k%labelEvery===0) ? (dia+'/'+(mesMudou?_MESES_PT[wd.getMonth()]:String(wd.getMonth()+1).padStart(2,"0"))) : '';
    meses+='<div class="gc-sem" style="left:'+leftp+'%;">'+lbl+'</div>';
  }
  // grade semanal de fundo (linhas verticais alinhadas às semanas)
  var gridBg='background:repeating-linear-gradient(90deg,#eef0f3 0,#eef0f3 1px,transparent 1px,transparent '+weekPct+'%);';

  // ----- Linhas -----
  var vis=_cronoVisiveis(t);
  var linhas='';
  vis.forEach(function(x){
    var pct=calc.pct[x.id]||0, st=calc.st[x.id];
    var _fe=_cronoFimEf(x);
    var L=pos(x.ini), R=pos(_fe), wb=Math.max(R-L,0.4);
    var indent=(x.lv)*15;
    var caret = x.temFilhos ? '<span class="gn-caret" onclick="event.stopPropagation();toggleCronoGrupo('+x.id+')">'+(_cronoColapsado[x.id]?'▶':'▼')+'</span>' : '<span class="gn-caret gn-vazio"></span>';
    var marco = !x.temFilhos && x.ini===_fe;   // marco só quando início = término (duração pode vir vazia na planilha)
    var barra, metaTxt, nomeCls;
    if(x.temFilhos){
      nomeCls = x.lv<=1?"gn-fase":"gn-grupo";
      var folhas=descFolhas(idx[x.id]); var fst=faseStatus(folhas);
      metaTxt='<span class="gn-meta">'+folhas.length+' ativ. · '+pct+'% · <span class="gn-st gn-st-'+fst+'">'+(_CRONO_ST_INFO[fst]||_CRONO_ST_INFO.futura).lbl.replace(/s$/,'')+'</span></span>';
      barra='<div class="gbar gbar-resumo" style="left:'+L+'%;width:'+wb+'%;"><span class="gbar-resumo-cap gbar-cap-l"></span><span class="gbar-resumo-cap gbar-cap-r"></span></div>';
    } else if(marco){
      nomeCls="gn-tarefa";
      metaTxt='<span class="gn-meta">'+_fmtBR(x.ini)+' · marco</span>';
      barra='<div class="gmarco" style="left:'+L+'%;">◆</div>';
    } else {
      nomeCls="gn-tarefa";
      metaTxt='<span class="gn-meta">'+pct+'% · '+(x.fim?_fmtBR(x.fim):'sem término')+'</span>';
      var clock = st==="pendente_aprov" ? '<span class="gbar-clock">⏱</span>' : '';
      barra='<div class="gbar st-'+st+(x.fim?'':' gbar-aberta')+'" style="left:'+L+'%;width:'+wb+'%;">'
        +'<div class="gbar-fill" style="width:'+pct+'%;"></div>'+clock+'<span class="gbar-pct">'+(wb>5?pct+'%':'')+'</span></div>';
    }
    linhas+='<div class="g-row" data-tid="'+x.id+'" onclick="cronoDetalhe('+x.id+')" onmouseenter="cronoTip(event,'+x.id+')" onmousemove="cronoTipMove(event)" onmouseleave="cronoTipHide()">'
      +'<div class="g-name '+nomeCls+'" style="padding-left:'+indent+'px;">'+caret
        +'<span class="gn-main"><span class="gn-l1"><span class="gn-dot st-'+st+'"></span><span class="gn-nome">'+escapeHtml(x.nome)+'</span></span>'+metaTxt+'</span></div>'
      +'<div class="g-time" style="min-width:'+Wmin+'px;'+gridBg+'">'+barra+'<div class="g-hoje" style="left:'+posHoje+'%;"></div></div>'
      +'</div>';
  });

  var headHoje='<div class="g-hoje g-hoje-top" style="left:'+posHoje+'%;"><span class="g-hoje-lbl">Hoje</span></div>';
  var nomeProj = _obraTemCronograma() ? (DB.obraCronograma[obraAtual].projeto||obraAtual) : CRONOGRAMA_PROJETO;
  main.innerHTML=
    '<div class="crono-topo"><div><h2>📅 Cronograma da Obra</h2><div style="font-size:12px;color:#555;">'+escapeHtml(nomeProj)+'</div></div>'

// Animação suave (count-up) dos cards superiores
function _animarContadores(){
  var els=document.querySelectorAll(".crono-dash .cd-num[data-count]");
  els.forEach(function(el){
    var target=parseInt(el.getAttribute("data-count"),10)||0, suf=el.getAttribute("data-suf")||"";
    if(target<=0){ el.textContent="0"+suf; return; }
    var t0=null, dur=650;
    function step(now){ if(!t0)t0=now; var p=Math.min(1,(now-t0)/dur); var e=1-Math.pow(1-p,3); el.textContent=Math.round(target*e)+suf; if(p<1) requestAnimationFrame(step); }
    requestAnimationFrame(step);
  });
}

var _cronoTipEl=null;
function _cronoTipBox(){ if(!_cronoTipEl){ _cronoTipEl=document.createElement("div"); _cronoTipEl.className="crono-tip"; _cronoTipEl.style.display="none"; document.body.appendChild(_cronoTipEl); } return _cronoTipEl; }
function cronoTip(e, id){
  var t=_cronoTcache, calc=_cronoCalcCache; if(!t||!calc) return;
  var x=null; for(var i=0;i<t.length;i++){ if(t[i].id===id){x=t[i];break;} } if(!x) return;
  var st=calc.st[x.id], pct=calc.pct[x.id]||0, info=_CRONO_ST_INFO[st]||_CRONO_ST_INFO.futura;
  var anc=_cronoAncestrais(t,x);
  var ligs=(!x.temFilhos)?_fichasDaAtividade(x.id):[];
  var pend=0; ligs.forEach(function(l){ if(l.est&&l.est.aprovacao&&l.est.aprovacao.status==="submetido") pend++; });
  var fin=_finalizacao(x.id); if(fin&&fin.status==="pendente") pend++;
  function lin(ic,k,v){ return '<div class="ct-l"><span>'+ic+' '+k+'</span><b>'+v+'</b></div>'; }
  var html='<div class="ct-h" style="border-color:'+info.cor+';"><span class="ct-badge" style="color:'+info.cor+';background:'+info.bg+';">'+info.ic+' '+info.lbl.replace(/s$/,'')+'</span><div class="ct-nome">'+escapeHtml(x.nome)+'</div></div>';
  if(anc.fase&&anc.fase!=="—") html+=lin("📁","Fase", escapeHtml(anc.fase));
  html+=lin("📅","Início", x.ini?_fmtBR(x.ini):"—");
  html+=lin("🏁","Término", x.fim?_fmtBR(x.fim):"—");
  html+=lin("⏱","Duração", (x.dur||0)+" dia(s)");
  html+=lin("📈","Progresso", pct+"%");
  if(x.pred) html+=lin("🔗","Predecessoras", escapeHtml(x.pred));
  if(!x.temFilhos){ html+=lin("📄","Fichas vinculadas", ligs.length); if(pend>0) html+=lin("🟡","Aprovações pendentes", pend); }
  var el=_cronoTipBox(); el.innerHTML=html; el.style.display="block"; cronoTipMove(e);
}
function cronoTipMove(e){
  if(!_cronoTipEl||_cronoTipEl.style.display==="none") return;
  var w=_cronoTipEl.offsetWidth, h=_cronoTipEl.offsetHeight;
  var x=e.clientX+16, y=e.clientY+16;
  if(x+w>window.innerWidth-8) x=e.clientX-w-16; if(x<8) x=8;
  if(y+h>window.innerHeight-8) y=window.innerHeight-h-8; if(y<8) y=8;
  _cronoTipEl.style.left=x+"px"; _cronoTipEl.style.top=y+"px";
}
function cronoTipHide(){ if(_cronoTipEl) _cronoTipEl.style.display="none"; }

function renderFichasSalvas(){
  const main = document.getElementById("main");
  const cards = [];

  const obraFichas = (DB.fichas && DB.fichas[obraAtual]) || {};

  // Itera TODAS as fichas da obra (suporta várias fichas por serviço/material)
  Object.keys(obraFichas).forEach(function(key){
    const est = obraFichas[key];
    if(!est || typeof est!=="object") return;
    // Ficha baseada no cronograma (fonte única)
    if(est.tipo==="cronograma"){
      if(!_fichaVisivel(est)) return;
      var aprovC = est.aprovacao||{status:"pendente"};
      cards.push({tipo:"cronograma", id:key, servicoId:"C"+est.cronogramaId, grupo:(est.fase?est.fase+" — ":"")+est.nome, badge:(est.codigo||"CRONO"), badgeCls:"crono",
        titulo: est.nome, rascunho: !!est.rascunho,
        obra: est.obra||"—", data: est.data||"—", resp: est.respInsp||"—",
        pct: (est.resultado?100:0), cls:(est.resultado?"":"vazio"), ncCount:(est.nc?est.nc.length:0),
        aprovStatus: aprovC.status, aprovPor: aprovC.por,
        info: (est.resultado?({C:"Conforme",NC:"Não Conforme",NA:"N.A."}[est.resultado]||"Preenchida"):"Não preenchida")
      });
      return;
    }
    const servicoId = est.servicoId || ((String(key).indexOf("#")>=0) ? String(key).split("#")[0] : key);
    const tipo = est.tipo || ((String(servicoId).charAt(0)==="M") ? "material" : "servico");
    if(!_fichaTemDados(est, tipo)) return;
    if(!_fichaVisivel(est)) return; // rascunho de outro usuário → oculto
    const aprov = est.aprovacao||{status:"pendente"};
    if(tipo==="servico"){
      const s = SERVICOS.find(function(x){ return x.id===servicoId; });
      if(!s) return;
      const status = est.status||[];
      const totalItens = status.reduce(function(acc,row){ return acc+(row?row.length:0); }, 0);
      const preenchidos = status.reduce(function(acc,row){ return acc+(row?row.filter(function(v){ return v!==""; }).length:0); }, 0);
      const pct = totalItens ? Math.round(preenchidos/totalItens*100) : 0;
      cards.push({tipo:"servico", id:key, servicoId:servicoId, grupo:"FVS "+servicoId+" — "+s.titulo, badge:"FVS "+servicoId, badgeCls:"",
        titulo: s.titulo, rascunho: !!est.rascunho,
        obra: est.obra||"—", data: est.data||"—", resp: est.respInsp||"—",
        pct, cls:(pct===0?"vazio":pct<100?"parcial":""), ncCount:(est.nc?est.nc.length:0),
        aprovStatus: aprov.status, aprovPor: aprov.por,
        info: preenchidos+"/"+totalItens+" status preenchidos"
      });
    } else {
      const m = MATERIAIS.find(function(x){ return x.id===servicoId; });
      if(!m) return;
      const total = 5;
      const preenchidos = est.resultados ? est.resultados.filter(function(r){ return r!==""; }).length : 0;
      const pct = Math.round(preenchidos/total*100);
      cards.push({tipo:"material", id:key, servicoId:servicoId, grupo:"FVM "+String(servicoId).replace("M","")+" — "+m.material, badge:"FVM "+String(servicoId).replace("M",""), badgeCls:"fvm",
        titulo: m.material, rascunho: !!est.rascunho,
        obra: est.obra||"—", data: est.data||"—", resp: (est.recebimentos&&est.recebimentos[0]&&est.recebimentos[0].fornecedor)||est.fornecedor||"—",
        pct, cls:(pct===0?"vazio":pct<100?"parcial":""), ncCount:(est.nc?est.nc.length:0),
        aprovStatus: aprov.status, aprovPor: aprov.por,
        info: preenchidos+"/"+total+" verificações preenchidas"
      });
    }
  });

  // Contagens por status de aprovação
  const cont = {todos:cards.length, submetido:0, pendente:0, aprovado:0, reprovado:0};
  cards.forEach(function(c){ if(cont[c.aprovStatus]!==undefined) cont[c.aprovStatus]++; });

  // Alertas de ação
  let alerta = "";
  // Para quem aprova: o que está aguardando decisão
  if(podeAprovar() && cont.submetido>0){
    alerta += '<div class="aprov-alerta">🔔 <b>'+cont.submetido+'</b> ficha(s) aguardando sua aprovação nesta obra. <a href="#" onclick="setFiltroFichas(\'submetido\');return false;">Ver</a></div>';
  }
  // Para quem envia: o que foi reprovado e precisa de correção
  if(cont.reprovado>0){
    alerta += '<div class="aprov-alerta reprov">❌ <b>'+cont.reprovado+'</b> ficha(s) reprovada(s) — precisam de correção e novo envio. <a href="#" onclick="setFiltroFichas(\'reprovado\');return false;">Ver</a></div>';
  }

  // Barra de filtros
  const chips = [
    {k:"todos",     lbl:"Todos",                  n:cont.todos},
    {k:"submetido", lbl:"📋 Aguardando aprovação", n:cont.submetido},
    {k:"pendente",  lbl:"📝 Abertos",             n:cont.pendente},
    {k:"aprovado",  lbl:"✅ Aprovados",            n:cont.aprovado},
    {k:"reprovado", lbl:"❌ Reprovados",           n:cont.reprovado}
  ];
  const chipsHtml = chips.map(function(ch){
    const cls = "filtro-chip"+(_filtroFichas===ch.k?" ativo":"")+(ch.k==="submetido"&&ch.n>0?" destaque":"");
    return '<button type="button" class="'+cls+'" onclick="setFiltroFichas(\''+ch.k+'\')">'+ch.lbl+' <span class="chip-n">'+ch.n+'</span></button>';
  }).join("");

  // Botões de ação (a navegação entre módulos é feita pelo Dashboard da obra)
  const btnNova = '<div class="salvas-acoes">'
    + '<button type="button" class="secundario" onclick="trocarModo(\'workspace\')">‹ Voltar ao painel</button>'
    + (podeEditar() ? '<button type="button" class="btn-nova-ficha" onclick="novaFicha()">➕ Nova ficha</button>' : '')
    + '</div>';

  const topo = '<div class="salvas-topo"><div><h2>📋 Fichas da Obra</h2>'
    +'<div style="font-size:12px;color:#555;">'+cards.length+' ficha(s) no total</div></div>'
    +btnNova+'</div>'
    +alerta
    +'<div class="filtros-bar">'+chipsHtml+'</div>'
    +'<div class="filtros-linha2">'
      +'<label class="filtro-serv-lbl">🔎 Serviço:</label>'+_selectFiltroServicoHtml()
      +'<label class="agrupar-toggle"><input type="checkbox" '+(_agruparServico?'checked':'')+' onclick="setAgruparServico(this.checked)"> 🗂️ Agrupar por serviço</label>'
    +'</div>';

  if(cards.length===0){
    main.innerHTML = topo + '<div class="salvas-vazio">Nenhuma ficha preenchida ainda.<br>Crie a primeira em <b>➕ Nova ficha</b>.</div>';
    return;
  }

  // Aplica filtros: status + serviço/seção selecionado
  let visiveis = cards.filter(function(c){
    if(_filtroFichas!=="todos" && c.aprovStatus!==_filtroFichas) return false;
    if(!_cardNoFiltroServico(c)) return false;
    return true;
  });
  // Ordena: mais recentes primeiro (por data)
  visiveis.sort(function(a,b){ return (b.data||"").localeCompare(a.data||""); });

  if(visiveis.length===0){
    var msgVazio = _filtroServico
      ? 'Nenhuma ficha encontrada para este serviço.'
      : 'Nenhuma ficha neste filtro.';
    main.innerHTML = topo + '<div class="salvas-vazio">'+msgVazio+'</div>';
    return;
  }

  function cardHtml(c){
    const aprovLabels={pendente:"📝 Em preenchimento",submetido:"📋 Aguardando Aprovação",aprovado:"✅ Aprovado",reprovado:"❌ Reprovado"};
    const aprovCores={pendente:"#e65100",submetido:"#1565c0",aprovado:"#2e7d32",reprovado:"#c62828"};
    return '<div class="ficha-card" onclick="abrirFichaSalva(\''+c.tipo+'\',\''+c.id+'\')" style="position:relative;">'+
      '<button type="button" onclick="event.stopPropagation();excluirFichaSalva(\''+c.tipo+'\',\''+c.id+'\')" title="Excluir ficha" style="position:absolute;top:10px;right:10px;background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:0;" onmouseover="this.style.color=\'#c62828\'" onmouseout="this.style.color=\'#ccc\'">🗑</button>'+
      '<span class="card-badge '+c.badgeCls+'">'+escapeHtml(c.badge)+'</span>'+
      '<div class="card-titulo">'+escapeHtml(c.titulo)+'</div>'+
      '<div class="card-info">🏗️ Obra: <span>'+escapeHtml(c.obra)+'</span></div>'+
      '<div class="card-info">📅 Data: <span>'+escapeHtml(c.data)+'</span></div>'+
      '<div class="card-info">'+(c.tipo==="servico"?"👷 Resp.:":"🏭 Fornecedor:")+' <span>'+escapeHtml(c.resp)+'</span></div>'+
      (c.ncCount>0?'<div class="card-info" style="color:#b71c1c;">⚠️ '+c.ncCount+' não conformidade(s)</div>':'')+
      (c.rascunho&&c.aprovStatus==="pendente"
        ? '<div class="card-info" style="color:#5e35b1;font-weight:bold;">🔒 Rascunho (só você vê)</div>'
        : '<div class="card-info" style="color:'+aprovCores[c.aprovStatus]+';font-weight:bold;">'+(aprovLabels[c.aprovStatus]||"")+(c.aprovPor?' — '+escapeHtml(c.aprovPor):'')+'</div>')+
      '<div class="card-progress-txt">'+c.info+' ('+c.pct+'%)</div>'+
      '<div class="progress-bar"><div class="progress-fill '+c.cls+'" style="width:'+c.pct+'%"></div></div>'+
    '</div>';
  }

  let corpoFichas;
  if(_agruparServico){
    // Agrupa por serviço: todas as fichas do mesmo serviço juntas, com cabeçalho e contagem
    var grupos={}, ordem=[];
    visiveis.forEach(function(c){ if(!grupos[c.grupo]){ grupos[c.grupo]=[]; ordem.push(c.grupo); } grupos[c.grupo].push(c); });
    ordem.sort(function(a,b){ return a.localeCompare(b); });
    corpoFichas = ordem.map(function(g){
      return '<div class="grupo-serv"><div class="grupo-serv-h">'+escapeHtml(g)+' <span class="grupo-serv-n">'+grupos[g].length+'</span></div>'
        +'<div class="salvas-grid">'+grupos[g].map(cardHtml).join("")+'</div></div>';
    }).join("");
  } else {
    corpoFichas = '<div class="salvas-grid">'+visiveis.map(cardHtml).join("")+'</div>';
  }

  main.innerHTML = topo + corpoFichas;
}

function abrirFichaSalva(tipo, id){
  // Detecta ficha de cronograma pela própria ficha (retrocompat: tipo pode vir "cronograma")
  var of=(DB.fichas&&DB.fichas[obraAtual])||{};
  var ehCrono = tipo==="cronograma" || (of[id] && of[id].tipo==="cronograma");
  if(ehCrono){
    modoAtual="fichacrono"; servicoAtual=id; materialAtual=null;
    var _tb=document.querySelector(".toolbar"); if(_tb) _tb.style.display="none";
    _setBreadcrumb("Ficha");
    renderFichaCronograma(id);
    return;
  }
  if(tipo==="servico"){
    trocarModo("servico");
    document.getElementById("servicoSelect").value = id;
    servicoAtual = id;
    renderFicha();
  } else {
    trocarModo("material");
    document.getElementById("materialSelect").value = id;
    materialAtual = id;
    renderFichaMaterial();
  }
  atualizarSeletorFicha(); // ficha aberta → esconde o seletor "Serviço:/Material:" da barra
}

function resultadoLabel(s){
  return s==="C" ? "CONFORME" : (s==="NC" ? "NÃO CONFORME" : "");
}
function calcCubicagemTexto(c){
  const nums = ["M1","M2","M3","M4","M5"].map(k=>parseFloat(String(c[k]||"").replace(",", ".")));
  const validos = nums.filter(n=>!isNaN(n));
  if(validos.length===0) return "Preencha as medidas (M1 a M5) para calcular o volume.";
  const hMedio = validos.reduce((a,b)=>a+b,0)/validos.length;
  const cNum = parseFloat(String(c.C||"").replace(",", "."));
  const lNum = parseFloat(String(c.L||"").replace(",", "."));
  let txt = "H (médio) = "+hMedio.toFixed(3)+" m";
  if(!isNaN(cNum) && !isNaN(lNum)){
    const vol = cNum*lNum*hMedio;
    txt += " · Volume = C × L × H(médio) = "+vol.toFixed(3)+" m³";
  } else {
    txt += " · Informe C e L para calcular o volume.";
  }
  return txt;
}

function escapeHtml(v){
  return String(v==null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
// Converte DD/MM/YYYY → YYYY-MM-DD (para input type=date)
function paraISO(dataBR){
  if(!dataBR) return "";
  var p = dataBR.split("/");
  if(p.length===3) return p[2]+"-"+p[1]+"-"+p[0];
  return dataBR;
}
// Converte YYYY-MM-DD → DD/MM/YYYY (para exibição)
function paraBR(dataISO){
  if(!dataISO) return "";
  var p = dataISO.split("-");
  if(p.length===3) return p[2]+"/"+p[1]+"/"+p[0];
  return dataISO;
}

function onHeaderChange(campo, valor){
  const est = getEstado(servicoAtual);
  const de = est[campo];
  est[campo] = valor;
  if(de!==valor) registrarHistorico(servicoAtual, "alterou campo «"+campo+"»", (de||"")+" → "+valor);
  salvarDB();
  atualizarUIValidacao();
}
function onProjetoChange(input){
  const ri = parseInt(input.dataset.row,10);
  const est = getEstado(servicoAtual);
  est.projeto[ri] = input.value;
  salvarDB();
  atualizarUIValidacao();
}
function onLocalNomeChange(input){
  const li = parseInt(input.dataset.local,10);
  const est = getEstado(servicoAtual);
  est.locais[li] = input.value || ("Local "+(li+1));

  atualizarUIValidacao();
}
function onStatusClick(ri, li){
  const est = getEstado(servicoAtual);
  const de = est.status[ri][li];
  est.status[ri][li] = statusCiclo(de || "");
  const para = est.status[ri][li];
  if(de!==para) registrarHistorico(servicoAtual, "status item "+(ri+1)+" local "+(li+1), (de||"—")+" → "+(para||"—"));
  salvarDB();
  renderFicha();
}
function adicionarLocal(){
  if(!servicoAtual) return;
  const est = getEstado(servicoAtual);
  est.locais.push("Local "+(est.locais.length+1));
  est.status.forEach(row=>row.push(""));
  if(est.fotosItens) est.fotosItens.forEach(row=>row.push(null));
  salvarDB();
  renderFicha();
}
function removerLocal(){
  if(!servicoAtual) return;
  const est = getEstado(servicoAtual);
  if(est.locais.length<=1) return;
  est.locais.pop();
  est.status.forEach(row=>row.pop());
  if(est.fotosItens) est.fotosItens.forEach(row=>row.pop());
  salvarDB();
  renderFicha();
}
function adicionarNc(){
  const est = estadoAtual();
  if(!est) return;
  est.nc.push({problema:"",solucao:"",reinspecao:""});
  if(modoAtual==="servico"){ if(!est.fotosNc) est.fotosNc=[]; est.fotosNc.push(null); }
  const fichaId = _fichaIdAtual();
  registrarHistorico(fichaId, "adicionou NC #"+est.nc.length);
  salvarDB();
  renderAtual();
}
function removerNc(i){
  const est = estadoAtual();
  if(!est) return;
  est.nc.splice(i,1);
  if(modoAtual==="servico" && est.fotosNc) est.fotosNc.splice(i,1);
  salvarDB();
  renderAtual();
}
function onNcChange(i, campo, valor){
  const est = estadoAtual();
  if(!est) return;
  est.nc[i][campo] = valor;
  salvarDB();
  atualizarUIValidacao();
}
function limparFicha(){
  if(!DB.fichas[obraAtual]) DB.fichas[obraAtual] = {};
  if(modoAtual==="servico"){
    if(!servicoAtual) return;
    if(!confirm("Limpar todos os dados preenchidos desta ficha?")) return;
    const servico = SERVICOS.find(s=>s.id===_servicoIdAtual());
    var novo = novoEstado(servico); novo.servicoId = _servicoIdAtual(); novo.tipo = "servico"; novo.obra = obraAtual;
    DB.fichas[obraAtual][servicoAtual] = novo;
  } else {
    if(!materialAtual) return;
    if(!confirm("Limpar todos os dados preenchidos desta ficha?")) return;
    const mat = MATERIAIS.find(m=>m.id===_materialIdAtual());
    var novoM = novoEstadoMaterial(mat); novoM.servicoId = _materialIdAtual(); novoM.tipo = "material"; novoM.obra = obraAtual;
    DB.fichas[obraAtual][materialAtual] = novoM;
  }
  salvarDB();
  renderAtual();
}

function abrirModal(titulo, corpo, botoes){
  document.getElementById("modal-titulo").textContent = titulo;
  document.getElementById("modal-corpo").innerHTML = corpo;
  document.getElementById("modal-msg").textContent = "";

function fecharModal(e){
  if(e && e.target !== document.getElementById("modal-overlay")) return;
  document.getElementById("modal-overlay").classList.remove("ativo");
}
function fecharModalForce(){ var mb=document.getElementById("modal-box"); document.getElementById("modal-overlay").classList.remove("ativo"); mb.classList.remove("modal-wide"); mb.classList.remove("modal-xl"); }
function modalMsg(txt){ document.getElementById("modal-msg").textContent = txt; }

// ===== APROVAÇÃO =====
function fichaEstaBloqueada(est){
  const s = est && est.aprovacao && est.aprovacao.status;
  if(s==="aprovado" || s==="reprovado") return true;
  if(s==="submetido" && !podeAprovar()) return true; // bloqueia inspetor quando submetido
  return false;
}

function validarItensPreenchidos(pularFotos){
  const est = estadoAtual();
  if(!est) return "Nenhuma ficha selecionada.";
  // Ficha baseada no cronograma (genérica)
  if(est.tipo==="cronograma" || modoAtual==="fichacrono"){
    if(!est.respInsp || !est.respInsp.trim()) return "Preencha o RESPONSÁVEL pela inspeção.";
    if(!est.data) return "Preencha a DATA da inspeção.";
    if(!est.resultado) return "Selecione o RESULTADO (Conforme / Não Conforme / N.A.).";
    if(est.resultado==="NC" && (!est.nc || !est.nc.length)) return "Resultado Não Conforme: registre ao menos 1 Não Conformidade.";
    return null;
  }
  if(!est.obra || !est.obra.trim()) return "Preencha o campo OBRA.";
  if(modoAtual==="servico"){
    if(!est.respInsp || !est.respInsp.trim()) return "Preencha o campo RESP. INSP.";
    if(!est.data) return "Preencha a DATA da ficha.";
    if(!est.inspecionadoPor || !est.inspecionadoPor.trim()) return "Preencha o campo INSPECIONADO POR.";
    if(!est.dataFechamento) return "Preencha a DATA DE FECHAMENTO da FVS.";
    let vazios = 0;
    (est.status||[]).forEach(function(row){ row.forEach(function(s){ if(!s) vazios++; }); });
    if(vazios>0) return "Preencha todos os "+vazios+" status de inspeção antes de aprovar.";
    if(!pularFotos){
      // Fotos obrigatórias para itens aprovados
      let semFotoItem = 0;
      (est.status||[]).forEach(function(row, ri){ row.forEach(function(s, li){ if((s==="A"||s==="AR") && !(est.fotosItens&&est.fotosItens[ri]&&est.fotosItens[ri][li])) semFotoItem++; }); });
      if(semFotoItem>0) return "Adicione foto para todos os itens aprovados ("+semFotoItem+" pendente(s)).";
      // Fotos obrigatórias para NCs
      let semFotoNc = (est.nc||[]).filter(function(_,ni){ return !(est.fotosNc&&est.fotosNc[ni]); }).length;
      if(semFotoNc>0) return "Adicione foto para todas as não conformidades ("+semFotoNc+" pendente(s)).";
    }
  } else {
    if(!est.respReceb || !est.respReceb.trim()) return "Preencha o campo RESP. RECEB.";
    if(!est.data) return "Preencha a DATA da ficha.";
    const r0 = (est.recebimentos||[{}])[0]||{};
    if(!r0.fornecedor || !r0.fornecedor.trim()) return "Preencha o campo FORNECEDOR.";
    if(!r0.dataEntrega) return "Preencha a DATA DE ENTREGA.";
    if(!r0.nf || !r0.nf.trim()) return "Preencha o campo NF Nº.";
    if(!r0.descricao || !r0.descricao.trim()) return "Preencha o campo DESCRIÇÃO / CARACTERÍSTICAS.";
    if(!r0.qtde || !r0.qtde.trim()) return "Preencha o campo QTDE / UN.";
    if(!est.inspecionadoPor || !est.inspecionadoPor.trim()) return "Preencha o campo INSPECIONADO POR.";
    if(!est.dataFechamento) return "Preencha a DATA DE FECHAMENTO da FVM.";
    const vaziosF = (est.resultados||[]).filter(function(r){ return !r; }).length;
    const vaziosC = (est.resultadosCustom||[]).filter(function(r){ return !r; }).length;
    const vazios = vaziosF + vaziosC;
    if(vazios>0) return "Preencha todos os "+vazios+" resultado(s) de verificação antes de aprovar.";
  }
  return null; // OK
}

// ===== PREENCHIMENTO DE TESTE (admin) — preenche a ficha aberta com dados validos
// para testar o fluxo rapido (status "NA" nao exige foto -> ja pode submeter).
function preencherTeste(){
  if(!ehAdmin()){ alert("Disponivel apenas para administrador (para testes)."); return; }
  var est = estadoAtual(); if(!est){ alert("Abra uma ficha primeiro."); return; }
  var hoje = new Date().toLocaleDateString("pt-BR");
  est.obra = obraAtual || est.obra || "Teste";
  if(modoAtual==="servico"){
    if(!est.respInsp) est.respInsp = "Inspetor Teste";
    if(!est.data) est.data = hoje;
    if(!est.inspecionadoPor) est.inspecionadoPor = "Inspetor Teste";
    if(!est.dataFechamento) est.dataFechamento = hoje;
    (est.status||[]).forEach(function(row,ri){ (row||[]).forEach(function(_,li){ est.status[ri][li] = "NA"; }); });
  } else {
    if(!est.respReceb) est.respReceb = "Recebedor Teste";
    if(!est.data) est.data = hoje;
    if(!est.recebimentos || !est.recebimentos.length) est.recebimentos = [{}];
    var r = est.recebimentos[0];
    if(!r.fornecedor) r.fornecedor = "Fornecedor Teste";
    if(!r.dataEntrega) r.dataEntrega = hoje;
    if(!r.nf) r.nf = "000";
    if(!r.descricao) r.descricao = "Material de teste";
    if(!r.qtde) r.qtde = "1";
    est.inspecionadoPor = est.inspecionadoPor || "Recebedor Teste";
    est.dataFechamento = est.dataFechamento || hoje;
    est.resultados = (est.resultados||[]).map(function(){ return "C"; });
    if(est.resultadosCustom) est.resultadosCustom = est.resultadosCustom.map(function(){ return "C"; });
  }
  salvarDB(); renderAtual();
  mostrarStatus("🧪 Ficha preenchida com dados de teste — já pode submeter");
}

function htmlAprovacao(est){
  const aprov = est.aprovacao || {status:"pendente",por:"",data:"",obs:""};
  const badges = {
    pendente:"📝 Em preenchimento",
    submetido:"📋 Aguardando Aprovação",
    aprovado:"✅ Aprovado",
    reprovado:"❌ Reprovado"
  };
  const ehRascunho = !!est.rascunho && aprov.status==="pendente";
  const badge = ehRascunho
    ? '<span class="aprov-badge rascunho">🔒 Rascunho</span>'
    : '<span class="aprov-badge '+aprov.status+'">'+(badges[aprov.status]||"")+'</span>';
  let corpo = '';
  if(aprov.status==="pendente"){
    // Só libera Submeter/Aprovar quando a ficha está 100% preenchida (campos, status e fotos)
    const erroCompleto = validarItensPreenchidos();
    const completo = !erroCompleto;
    const aviso = completo ? '' : '<div class="aprov-aviso">⚠️ Para submeter/aprovar, complete a ficha: '+escapeHtml(erroCompleto)+'</div>';
    if(podeAprovar()){
      // Gestor/Admin pode aprovar diretamente (aprovar exige 100%; reprovar sempre liberado)
      corpo = aviso + '<div class="aprov-acoes">'
        +(completo
            ? '<button type="button" class="btn-aprovar" onclick="iniciarAprovacao(\'aprovar\')">✅ Aprovar ficha</button>'
            : '<button type="button" class="btn-aprovar" disabled title="Complete 100% da ficha para aprovar">✅ Aprovar ficha</button>')
        +'<button type="button" class="btn-reprovar" onclick="iniciarAprovacao(\'reprovar\')">❌ Reprovar ficha</button>'
        +'</div>';
    } else if(podeEditar()){
      // Opção de rascunho: enquanto marcado, a ficha fica visível só para o criador
      const draftBox = '<label class="rascunho-toggle"><input type="checkbox" '+(ehRascunho?'checked':'')+' onclick="toggleRascunho()"> 🔒 Manter como rascunho (não exibir para o gestor)</label>'
        +(ehRascunho ? '<div class="aprov-aviso rascunho">🔒 Esta ficha é um <b>rascunho</b> — somente você a vê. Desmarque acima (ou submeta) para enviá-la ao gestor.</div>' : '');
      corpo = aviso + draftBox + '<div class="aprov-acoes">'
        +(completo
            ? '<button type="button" class="btn-submeter" onclick="iniciarSubmissao()">📋 Submeter para Aprovação</button>'
            : '<button type="button" class="btn-submeter" disabled title="Complete 100% da ficha para submeter">📋 Submeter para Aprovação</button>')
        +'</div>';
    }
  } else if(aprov.status==="submetido"){
    const bannerSub = '<div class="banner-bloqueado" style="background:#e3f2fd;color:#1565c0;border-color:#1976d2;">📋 Submetido por '
      +escapeHtml(aprov.por||"")+(aprov.data?' em '+escapeHtml(aprov.data):'')
      +(podeAprovar()?'' : ' — aguardando aprovação do gestor')+'</div>';
    if(podeAprovar()){
      corpo = bannerSub
        +'<div class="aprov-acoes">'
        +'<button type="button" class="btn-aprovar" onclick="iniciarAprovacao(\'aprovar\')">✅ Aprovar ficha</button>'
        +'<button type="button" class="btn-reprovar" onclick="iniciarAprovacao(\'reprovar\')">❌ Reprovar ficha</button>'
        +'<button type="button" class="secundario" onclick="devolverEdicao()">↩ Devolver para edição</button>'
        +'</div>';
    } else {
      corpo = bannerSub;
    }
  } else {
    const bannerCls = aprov.status==="aprovado"?"banner-bloqueado":"banner-bloqueado banner-reprovado";
    const bannerTxt = aprov.status==="aprovado"
      ? "🔒 Ficha aprovada e bloqueada para edição"
      : "🔒 Ficha reprovada e bloqueada para edição";
    corpo = '<div class="'+bannerCls+'">'+bannerTxt+'</div>'
      +'<div class="aprov-registro">'
      +'<b>'+(aprov.status==="aprovado"?"Aprovado":"Reprovado")+' por:</b> '+escapeHtml(aprov.por)
      +' &nbsp;|&nbsp; <b>Data:</b> '+escapeHtml(aprov.data)
      +(aprov.obs?'<br><b>Obs.:</b> '+escapeHtml(aprov.obs):'')
      +'</div>'
      +(podeAprovar()?'<div class="aprov-acoes"><button type="button" class="secundario" onclick="reabrirAprovacao()">↩ Reabrir aprovação (requer senha admin)</button></div>':'');
  }
  return '<div class="aprov-section">'
    +'<div class="aprov-header"><strong>Status de Aprovação</strong>'+badge+'</div>'
    +'<div class="aprov-body">'+corpo+'</div>'
    +'</div>';
}

// Re-renderiza SOMENTE a seção de aprovação (aviso de pendência + botões) de forma reativa.
// Garante que a validação reflita os campos preenchidos em QUALQUER ordem, sem perder foco/scroll
// (causa raiz do bug "Preencha a DATA" mesmo com o campo já preenchido).
function atualizarUIValidacao(){
  var est=estadoAtual(); if(!est) return;
  var sec=document.querySelector(".ficha-doc .aprov-section");
  if(!sec) return;
  var tmp=document.createElement("div");
  tmp.innerHTML=htmlAprovacao(est);
  var novo=tmp.firstElementChild;
  if(novo) sec.parentNode.replaceChild(novo, sec);
}

function iniciarAprovacao(acao){
  if(!podeAprovar()){ alert("⚠️ Apenas Administradores e Gestores podem aprovar/reprovar fichas."); return; }
  // Ao reprovar, não exige fotos (a ficha está sendo rejeitada)
  const erro = validarItensPreenchidos(acao==="reprovar");
  if(erro){ alert("⚠️ "+erro); return; }
  const label = acao==="aprovar" ? "Aprovar" : "Reprovar";
  abrirModal(
    label+" ficha",
    '<p style="font-size:13px;margin:0 0 12px;">Confirma a '+(acao==="aprovar"?"aprovação":"reprovação")+' desta ficha como <b>'+escapeHtml(sessao.nome)+'</b>?</p>'
    +'<label>Observação (opcional):</label><input type="text" id="aprov-obs" placeholder="">',
    '<button type="button" class="secundario" onclick="fecharModalForce()">Cancelar</button>'
    +'<button type="button" class="'+(acao==="aprovar"?"btn-aprovar":"btn-reprovar")+'" onclick="confirmarAprovacao(\''+acao+'\')">'
    +(acao==="aprovar"?"✅ Confirmar Aprovação":"❌ Confirmar Reprovação")+'</button>'
  );
  setTimeout(function(){ var el=document.getElementById("aprov-obs"); if(el) el.focus(); },100);
}

function confirmarAprovacao(acao){
  if(!podeAprovar()){ fecharModalForce(); alert("Acesso negado."); return; }
  const obs = (document.getElementById("aprov-obs")||{}).value||"";
  const est = estadoAtual(); if(!est) return;
  if(!est.aprovacao) est.aprovacao = {};
  est.aprovacao.status = acao==="aprovar" ? "aprovado" : "reprovado";
  est.aprovacao.por = sessao.nome;
  const _hoje = new Date(); est.aprovacao.data = _hoje.toLocaleDateString("pt-BR");
  const _hojeISO = _hoje.toISOString().slice(0,10);
  est.aprovacao.obs = obs.trim();
  if(acao==="aprovar"){ est.aprovadoPor = sessao.nome; est.aprovadoData = paraBR(_hojeISO); }
  const fichaId = _fichaIdAtual();
  registrarHistorico(fichaId, acao==="aprovar"?"aprovação":"reprovação", obs.trim()||"");
  registrarLog(acao==="aprovar"?"aprovacao":"reprovacao", {fichaId:fichaId, obra:obraAtual});
  registrarEvento(acao==="aprovar"?"ficha_aprovada":"ficha_reprovada",{entidade:"ficha",entidadeId:fichaId,origem:"ficha",antes:{status:"submetido"},depois:{status:est.aprovacao.status,por:est.aprovacao.por},detalhe:(est.codigo?est.codigo+" — ":"")+(est.nome||"")+(obs.trim()?(" · "+obs.trim()):"")});
  salvarDB();
  fecharModalForce();
  renderAtual();
}

function reabrirAprovacao(){
  if(!podeAprovar()){ alert("Apenas Administradores e Gestores podem reabrir aprovações."); return; }
  abrirModal(
    "Reabrir aprovação",
    '<p style="font-size:13px;margin:0 0 12px;">Esta ação remove a aprovação atual e desbloqueia a ficha para edição.<br>Confirma como <b>'+escapeHtml(sessao.nome)+'</b>?</p>',
    '<button type="button" class="secundario" onclick="fecharModalForce()">Cancelar</button>'
    +'<button type="button" class="perigo" onclick="confirmarReabertura()">↩ Reabrir</button>'
  );
}
function confirmarReabertura(){
  if(!podeAprovar()){ fecharModalForce(); return; }
  const est=estadoAtual(); if(!est) return;
  const fichaId=_fichaIdAtual();
  registrarHistorico(fichaId, "reabriu aprovação");
  registrarLog("reabrir-aprovacao",{fichaId:fichaId,obra:obraAtual});
  est.aprovacao={status:"pendente",por:"",data:"",obs:""};
  est.aprovadoPor=""; est.aprovadoData="";
  salvarDB(); fecharModalForce(); renderAtual();
}

function iniciarSubmissao(){
  if(!podeEditar()){ alert("⚠️ Sem permissão para submeter fichas."); return; }
  const erro = validarItensPreenchidos();
  if(erro){ alert("⚠️ "+erro); return; }
  abrirModal(
    "Submeter para aprovação",
    '<p style="font-size:13px;margin:0 0 12px;">Submeter esta ficha para aprovação como <b>'+escapeHtml(sessao.nome)+'</b>?</p>'
    +'<p style="font-size:12px;color:#666;margin:0;">A ficha ficará bloqueada para edição até que o gestor tome uma decisão.</p>',
    '<button type="button" class="secundario" onclick="fecharModalForce()">Cancelar</button>'
    +'<button type="button" class="btn-submeter" onclick="confirmarSubmissao()">📋 Confirmar Submissão</button>'
  );
}
