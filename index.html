<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fichas de Verificação - WME Engenharia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#3f7d3a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FV WME">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root{
  --verde:#5fa744;
  --verde-escuro:#3f7d3a;
  --cinza:#eef0ee;
  --borda:#000;
  --a:#c8e6c9; --a-t:#1b5e20;
  --r:#ffcdd2; --r-t:#b71c1c;
  --ar:#ffe0b2; --ar-t:#e65100;
  --na:#e0e0e0; --na-t:#424242;
}
*{box-sizing:border-box;}
body{font-family:Calibri,Arial,Helvetica,sans-serif;margin:0;background:var(--cinza);color:#000;}
header{background:var(--verde-escuro);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
header h1{font-size:18px;margin:0;}
header .sub{font-size:12px;opacity:.9;}
.toolbar{background:#fff;border-bottom:1px solid #ccc;padding:12px 24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.toolbar label{font-size:13px;font-weight:bold;}
select, input[type=text], input[type=date]{
  font-family:inherit;font-size:13px;padding:6px 8px;border:1px solid #ccc;border-radius:4px;background:#fff;color:#000;
}
select#servicoSelect, select#materialSelect{min-width:340px;}
.modo-toggle{display:flex;gap:6px;}
.modo-btn{background:#fff;color:var(--verde-escuro);}
.modo-btn.ativo{background:var(--verde-escuro);color:#fff;}
button{
  font-family:inherit;font-size:13px;padding:7px 14px;border-radius:4px;border:1px solid var(--verde-escuro);
  background:var(--verde-escuro);color:#fff;cursor:pointer;
}
button.secundario{background:#fff;color:var(--verde-escuro);}
button.perigo{background:#fff;color:#b71c1c;border-color:#b71c1c;}
button:hover{opacity:.88;}
main{max-width:1300px;margin:20px auto;padding:0 16px 60px;}
.empty{text-align:center;color:#888;padding:60px 20px;background:#fff;border:1px solid #ccc;border-radius:6px;}

/* ===== Documento (réplica do layout original) ===== */
.ficha-doc{background:#fff;border:1px solid #999;padding:14px;margin-bottom:24px;font-size:12px;}
.ficha-doc table{width:100%;border-collapse:collapse;}
.ficha-doc td, .ficha-doc th{border:1px solid var(--borda);padding:4px 8px;vertical-align:middle;}

/* cabeçalho estilo formulário original */
.tbl-cabecalho{margin-bottom:10px;}
.tbl-cabecalho col.c1{width:150px;}
.tbl-cabecalho col.c2{width:130px;}
.tbl-cabecalho col.c3{width:auto;}
.tbl-cabecalho col.c4{width:130px;}
.tbl-cabecalho col.c5{width:190px;}
.logo-cell{text-align:center;background:#fff;}
.logo-badge{display:flex;align-items:center;justify-content:center;}
.logo-img{display:block;margin:0 auto;max-width:140px;max-height:70px;width:auto;height:auto;object-fit:contain;}
.logo-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;width:120px;height:60px;border:2px dashed #ccc;border-radius:6px;color:#aaa;font-size:11px;cursor:pointer;gap:2px;}
.logo-placeholder:hover{border-color:var(--verde-escuro);color:var(--verde-escuro);}
@media print{.logo-placeholder{display:none !important;}}
.lbl-mini{font-weight:bold;font-size:11px;text-align:center;background:#fff;white-space:nowrap;}
.titulo-cell{font-weight:bold;font-size:17px;text-align:center;letter-spacing:.5px;}
.servico-nome{font-weight:bold;font-size:13px;text-align:center;text-transform:uppercase;}
.ref-cell{font-weight:bold;font-size:11px;text-align:left;}
.objetivo-texto{font-size:11px;text-align:center;line-height:1.35;}
.val-mini{padding:2px 4px;}
.val-mini input{width:100%;border:none;background:transparent;font-size:12px;font-family:inherit;padding:2px;}
.val-mini input:focus{background:#fff8d6;outline:1px solid var(--verde-escuro);}

/* rótulos de grupo (Verificação / Local da Verificação) */
.grupo-lbl{font-style:italic;font-weight:bold;font-size:11.5px;text-decoration:underline;border:none !important;padding:2px 4px 4px;background:#fff;}

/* tabela de verificação */
.tbl-verificacao th{background:var(--cinza);font-size:11px;font-style:italic;text-align:left;}
.tbl-verificacao td{font-size:11.5px;}
.col-n{width:30px;text-align:center;}
.col-local{width:75px;text-align:center;}
.local-head{display:flex;flex-direction:column;gap:2px;align-items:center;}
.local-head input{width:80px;text-align:center;font-size:10.5px;font-weight:bold;border:none;background:transparent;}
.local-head input:focus{background:#fff8d6;outline:1px solid var(--verde-escuro);}
.tbl-verificacao td input[type=text]{width:100%;border:none;background:transparent;font-size:11.5px;padding:2px;}
.tbl-verificacao td input[type=text]:focus{background:#fff8d6;outline:1px solid var(--verde-escuro);}
.status-btn{
  width:100%;min-height:26px;border:1px solid #999;border-radius:0;cursor:pointer;font-weight:bold;font-size:11.5px;
  background:#fff;color:#aaa;
}
.status-btn.A{background:var(--a);color:var(--a-t);border-color:var(--a-t);}
.status-btn.R{background:var(--r);color:var(--r-t);border-color:var(--r-t);}
.status-btn.AR{background:var(--ar);color:var(--ar-t);border-color:var(--ar-t);}
.status-btn.NA{background:var(--na);color:var(--na-t);border-color:#999;}

.locais-actions{margin:6px 0 10px;font-size:11.5px;color:#666;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

/* não conformidade */
.nc-titulo{font-style:italic;font-weight:bold;text-decoration:underline;font-size:12px;margin:14px 0 6px;}
.tbl-nc{table-layout:fixed;}
.tbl-nc th{font-style:italic;font-size:11px;text-align:left;background:#fff;}
.tbl-nc td{padding:3px 6px;}
.tbl-nc input{width:100%;height:22px;box-sizing:border-box;border:none;background:transparent;font-size:11.5px;padding:2px 4px;font-family:inherit;}
.tbl-nc input:focus{background:#fff8d6;outline:1px solid var(--verde-escuro);}
.tbl-nc input[type=date]{appearance:auto;-webkit-appearance:auto;}
.nc-row-rm{background:#fff;color:#b71c1c;border-color:#b71c1c;padding:3px 8px;font-size:10.5px;}
.nc-vazio{text-align:center;color:#999;font-style:italic;}
.nc-actions{margin:8px 0 4px;}

/* rodapé / aprovação */
.rodape{margin-top:14px;}
.rodape-duplo{display:flex;gap:16px;}
.rodape-metade{flex:1;min-width:0;}
.rodape-bloco{display:flex;justify-content:space-between;font-size:11px;font-style:italic;margin-bottom:2px;}
.rodape-linha{display:flex;border:1px solid var(--borda);margin-bottom:10px;}
.rodape-linha .nome{flex:1;border-right:1px solid var(--borda);padding:6px 8px;}
.rodape-linha .data{width:140px;padding:6px 8px;}
.rodape-linha input{width:100%;border:none;background:transparent;font-size:12px;font-family:inherit;}
.rodape-linha input:focus{background:#fff8d6;outline:1px solid var(--verde-escuro);}
.consideracoes{font-size:10.5px;font-weight:bold;margin:6px 0;}
.norma-tec{font-size:11px;font-weight:bold;margin:4px 0 10px;}
.legenda-final{display:flex;justify-content:space-between;align-items:flex-end;font-size:10.5px;flex-wrap:wrap;gap:6px;border-top:1px solid #ccc;padding-top:6px;}
.legenda-final .itens{display:flex;gap:14px;flex-wrap:wrap;}
.legenda-final .itens b{font-style:normal;}
.codigo-doc{font-size:10.5px;color:#333;}

/* ===== Fichas Salvas ===== */
.salvas-topo{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.salvas-topo h2{font-size:16px;margin:0;color:var(--verde-escuro);}
.salvas-filtro{display:flex;gap:8px;flex-wrap:wrap;}
.salvas-filtro button{font-size:12px;padding:5px 12px;}
.salvas-grid{display:flex;flex-wrap:wrap;gap:16px;}
.ficha-card{background:#fff;border:1px solid #ccc;border-radius:6px;padding:14px 16px;width:280px;cursor:pointer;transition:box-shadow .15s,border-color .15s;}
.ficha-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.15);border-color:var(--verde-escuro);}
.ficha-card .card-badge{font-size:10.5px;font-weight:bold;background:var(--verde-escuro);color:#fff;padding:2px 8px;border-radius:3px;display:inline-block;margin-bottom:8px;}
.ficha-card .card-badge.fvm{background:#1565c0;}
.ficha-card .card-titulo{font-weight:bold;font-size:13px;margin-bottom:8px;line-height:1.3;}
.ficha-card .card-info{font-size:11.5px;color:#555;margin-bottom:3px;}
.ficha-card .card-info span{font-weight:bold;color:#333;}
.ficha-card .card-progress-txt{font-size:11px;color:#555;margin-top:8px;}
.progress-bar{height:5px;background:#eee;border-radius:3px;margin-top:4px;}
.progress-fill{height:5px;background:var(--verde);border-radius:3px;transition:width .3s;}
.progress-fill.parcial{background:#fb8c00;}
.progress-fill.vazio{background:#e0e0e0;}
.salvas-vazio{text-align:center;color:#888;padding:60px 20px;background:#fff;border:1px solid #ccc;border-radius:6px;width:100%;}

/* ===== Ficha de Material (FVM) ===== */
.tbl-mat th{background:var(--cinza);font-size:11px;font-style:italic;text-align:left;}
.tbl-mat td{font-size:11.5px;}
.col-resultado{width:190px;text-align:center;}
.resultado-btn{width:100%;min-height:26px;border:1px solid #999;cursor:pointer;font-weight:bold;font-size:11px;background:#fff;color:#aaa;}
.resultado-btn.C{background:var(--a);color:var(--a-t);border-color:var(--a-t);}
.resultado-btn.NC{background:var(--r);color:var(--r-t);border-color:var(--r-t);}

.tbl-receb{margin:10px 0;}
.tbl-receb td{padding:3px 6px;}
.tbl-receb input{width:100%;border:none;background:transparent;font-size:12px;font-family:inherit;padding:2px;}
.tbl-receb input:focus{background:#fff8d6;outline:1px solid var(--verde-escuro);}
.lbl-receb{font-weight:bold;font-size:10.5px;text-align:center;background:var(--cinza);white-space:nowrap;}

.tbl-lotes{margin:10px 0;}
.tbl-lotes td{font-size:11px;vertical-align:top;padding:6px 8px;}
.tbl-lotes .lbl-lotes{font-weight:bold;font-style:italic;background:var(--cinza);text-align:center;}

.cubic-box{font-size:11px;border:1px solid var(--borda);padding:8px;margin:10px 0;}
.cubic-box .grupo-lbl2{font-weight:bold;font-style:italic;text-decoration:underline;display:block;margin-bottom:6px;}
.cubic-box label{display:inline-block;margin-right:10px;margin-bottom:4px;}
.cubic-box input{width:60px;border:1px solid #ccc;border-radius:3px;padding:2px 4px;font-size:11px;font-family:inherit;}
.cubic-result{font-weight:bold;margin-top:4px;}

/* ===== Ficha Bloqueada ===== */
.ficha-bloqueada{position:relative;}
.ficha-bloqueada .bloquear-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;z-index:10;cursor:not-allowed;
}
.aprov-section{position:relative;z-index:11;}
.ficha-bloqueada .status-btn,.ficha-bloqueada .resultado-btn{cursor:not-allowed;opacity:.85;}
.banner-bloqueado{
  display:flex;align-items:center;gap:8px;
  background:#e8f5e9;border:1px solid #4caf50;border-radius:4px;
  padding:8px 14px;margin-bottom:10px;font-size:12.5px;font-weight:bold;color:#2e7d32;
}
.banner-reprovado{background:#ffebee;border-color:#ef5350;color:#c62828;}

/* ===== Aprovação ===== */
.aprov-section{margin-top:14px;border:1px solid var(--borda);border-radius:4px;overflow:hidden;}
.aprov-header{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--cinza);flex-wrap:wrap;gap:8px;}
.aprov-header strong{font-size:12px;}
.aprov-badge{font-size:11px;font-weight:bold;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.aprov-badge.pendente{background:#fff3e0;color:#e65100;border:1px solid #fb8c00;}
.aprov-badge.aprovado{background:#e8f5e9;color:#2e7d32;border:1px solid #4caf50;}
.aprov-badge.reprovado{background:#ffebee;color:#c62828;border:1px solid #ef5350;}
.aprov-badge.submetido{background:#e3f2fd;color:#1565c0;border:1px solid #1976d2;}
.aprov-badge.rascunho{background:#ede7f6;color:#5e35b1;border:1px solid #9575cd;}
.rascunho-toggle{display:flex;align-items:center;gap:8px;font-size:12.5px;color:#4527a0;background:#f3effa;border:1px solid #d1c4e9;border-radius:6px;padding:8px 11px;margin-bottom:8px;cursor:pointer;}
.rascunho-toggle input{width:16px;height:16px;cursor:pointer;}
.aprov-aviso.rascunho{background:#ede7f6;border-color:#9575cd;color:#4527a0;}
.aprov-body{padding:10px 12px;font-size:12px;}
.aprov-acoes{display:flex;gap:8px;margin-top:8px;}
.btn-aprovar{background:#2e7d32;border-color:#2e7d32;color:#fff;}
.btn-reprovar{background:#c62828;border-color:#c62828;color:#fff;}
.btn-submeter{background:#1565c0;border-color:#1565c0;color:#fff;}
.btn-aprovar:disabled,.btn-submeter:disabled{background:#bdbdbd;border-color:#bdbdbd;color:#f0f0f0;cursor:not-allowed;opacity:.8;}
.aprov-aviso{background:#fff8e1;border:1px solid #ffb300;border-radius:5px;padding:8px 11px;font-size:12px;color:#7a5c00;margin-bottom:8px;}
.aprov-registro{font-size:11.5px;color:#333;line-height:1.8;}

/* ===== Fotos ===== */
.fotos-section{margin-top:14px;}
.fotos-titulo{font-style:italic;font-weight:bold;text-decoration:underline;font-size:12px;margin-bottom:8px;}
.fotos-grid{display:flex;flex-wrap:wrap;gap:10px;}
.foto-item{position:relative;width:160px;}
.foto-item img{width:160px;height:120px;object-fit:cover;border:1px solid #ccc;border-radius:4px;display:block;}
.foto-item input{width:100%;border:none;border-top:1px solid #eee;font-size:11px;padding:3px 4px;font-family:inherit;background:#fafafa;}
.foto-item input:focus{background:#fff8d6;outline:none;}
.foto-rm{position:absolute;top:3px;right:3px;background:rgba(183,28,28,.85);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;}
.fotos-add{margin-top:8px;}

/* ===== Fotos por item de inspeção ===== */
.cel-foto{margin-top:3px;text-align:center;}
.foto-cel-btn{background:none;border:1px dashed #ccc;border-radius:4px;cursor:pointer;font-size:14px;padding:2px 4px;color:#999;display:block;width:100%;margin:0 auto;line-height:1.4;}
.foto-cel-btn.foto-req{border-color:#e53935;color:#e53935;background:#fff8f8;}
.foto-cel-thumb{width:100%;max-height:54px;object-fit:cover;border:1px solid #bbb;border-radius:3px;display:block;cursor:pointer;}
.foto-cel-rm{background:rgba(183,28,28,.82);color:#fff;border:none;border-radius:50%;width:15px;height:15px;font-size:9px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;line-height:1;vertical-align:middle;margin-left:2px;}
.nc-foto-cel{text-align:center;vertical-align:middle;width:70px;}
/* Seção de fotos por local (impressão e tela) */
.fotos-locais-section{margin-top:14px;}
.fotos-local-group{margin-bottom:10px;}
.fotos-local-nome{font-weight:bold;font-size:11px;text-transform:uppercase;border-bottom:1px solid #ccc;padding-bottom:2px;margin-bottom:6px;}
.fotos-grid-local{display:flex;flex-wrap:wrap;gap:8px;}
.foto-local-item{width:140px;}
.foto-local-item .foto-label{font-size:10px;color:#555;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.foto-local-item img{width:140px;height:95px;object-fit:cover;border:1px solid #ccc;border-radius:3px;display:block;}

/* ===== Modal ===== */
#modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:9000;display:none;align-items:center;justify-content:center;}
#modal-overlay.ativo{display:flex;}
#modal-box{background:#fff;border-radius:8px;padding:26px 28px;min-width:340px;max-width:460px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.3);}
#modal-box h3{margin:0 0 14px;font-size:15px;color:var(--verde-escuro);}
#modal-box label{display:block;font-size:12.5px;font-weight:bold;margin-bottom:4px;}
#modal-box input[type=text],#modal-box input[type=password]{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px;font-family:inherit;margin-bottom:12px;box-sizing:border-box;}
#modal-box input:focus{outline:1px solid var(--verde-escuro);border-color:var(--verde-escuro);}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;}
.modal-msg{font-size:12px;color:#c62828;margin-bottom:8px;min-height:16px;}

@media print{
  .aprov-acoes,.fotos-add,.foto-rm,.foto-cel-btn,.foto-cel-rm{display:none !important;}
  .foto-item img,.foto-local-item{page-break-inside:avoid;}
  .fotos-locais-section{margin-top:10px;}
}

@media print{
  header, .toolbar, .locais-actions, .nc-actions, button{display:none !important;}
  .status-btn, .resultado-btn{display:block !important;}
  input.print-hidden{display:none !important;}
  .print-val{
    display:block;white-space:pre-wrap;word-break:break-word;
    font-family:inherit;font-size:inherit;padding:2px 4px;
    width:100%;box-sizing:border-box;
    height:22px;overflow:hidden;
  }
  /* campos de NC: altura livre para caber o texto inteiro */
  .tbl-nc .print-val{height:auto;overflow:visible;min-height:22px;}
  /* campos do rodapé são um pouco maiores */
  .rodape-linha .print-val{height:28px;}
  /* campos do cabeçalho: altura livre para o texto não ser cortado */
  .val-mini .print-val{height:auto;min-height:20px;overflow:visible;}
  /* Remover scroll horizontal em print */
  .scroll-wrapper{overflow:visible !important;}
  /* Fixar larguras de colunas para manter alinhamento */
  .tbl-cabecalho, .tbl-verificacao, .tbl-nc, .tbl-mat, .tbl-receb, .tbl-lotes{
    table-layout:fixed !important;width:100% !important;
  }
  body{background:#fff;}
  main{margin:0;padding:0;max-width:100%;}
  .ficha-doc{border:none;overflow:visible;}
  @page{size:A4 landscape;margin:8mm;}
}

/* ===== Login / Autenticação ===== */
.login-screen{max-width:400px;margin:60px auto;background:#fff;border:1px solid #ccc;border-radius:8px;padding:36px 32px;box-shadow:0 4px 20px rgba(0,0,0,.12);}
.login-screen h2{margin:0 0 6px;font-size:18px;color:var(--verde-escuro);}
.login-screen label{display:block;font-size:12.5px;font-weight:bold;margin-bottom:4px;margin-top:12px;}
.login-screen input[type=email],.login-screen input[type=password],.login-screen input[type=text]{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px;font-family:inherit;box-sizing:border-box;}
.login-screen input:focus{outline:1px solid var(--verde-escuro);border-color:var(--verde-escuro);}
.login-btn{width:100%;margin-top:18px;padding:10px;font-size:14px;}
.login-erro{color:#c62828;font-size:12px;margin-top:10px;min-height:16px;}
.login-titulo{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
/* Barra de usuário no header */
.user-badge{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.user-badge .u-nome{font-size:12px;opacity:.9;}
.perfil-tag{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:bold;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);}
.user-badge button{font-size:11px;padding:3px 10px;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4);color:#fff;}
.user-badge button:hover{background:rgba(255,255,255,.28);}
/* Sino / Pendências de aprovação */
#btnPendencias{position:relative;}
#btnPendencias.tem-pend{background:#ffb300;color:#3b2f00;border-color:#e0a000;font-weight:bold;animation:pendPulse 1.8s infinite;}
#btnPendencias.tem-pend:hover{background:#ffc233;}
.pend-badge{position:absolute;top:-7px;right:-7px;background:#c62828;color:#fff;border-radius:10px;font-size:10px;font-weight:bold;min-width:17px;height:17px;line-height:17px;text-align:center;padding:0 4px;box-shadow:0 0 0 2px var(--verde-escuro);}
@keyframes pendPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,179,0,.55);}50%{box-shadow:0 0 0 6px rgba(255,179,0,0);}}
/* Lista de pendências no modal */

const FOTO_PLACEHOLDER = "__FOTO_LOCAL__"; // marca foto ainda não enviada (no JSONBin)
function _supabaseOk(){ return SUPABASE.URL && SUPABASE.KEY && SUPABASE.URL.indexOf("http")===0; }
function _ehBase64(v){ return typeof v==="string" && v.indexOf("data:image")===0; }

// Converte dataURL (base64) em Blob para upload
function _dataURLparaBlob(dataURL){
  var arr=dataURL.split(","), mime=((arr[0].match(/:(.*?);/))||[])[1]||"image/jpeg";
  var bstr=atob(arr[1]), n=bstr.length, u8=new Uint8Array(n);
  while(n--) u8[n]=bstr.charCodeAt(n);
  return new Blob([u8],{type:mime});
}

// Sobe uma foto (base64) para o Storage e devolve a URL pública (Promise)
function subirFotoStorage(dataURL){
  if(!_supabaseOk()) return Promise.reject(new Error("supabase off"));
  var nome=Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,9)+".jpg";
  return fetch(SUPABASE.URL+"/storage/v1/object/"+SUPABASE.BUCKET+"/"+nome,{
    method:"POST",
    headers:{"apikey":SUPABASE.KEY,"Authorization":"Bearer "+SUPABASE.KEY,"Content-Type":"image/jpeg","x-upsert":"true"},
    body:_dataURLparaBlob(dataURL)
  }).then(function(r){
    if(!r.ok) throw new Error("upload HTTP "+r.status);
    return SUPABASE.URL+"/storage/v1/object/public/"+SUPABASE.BUCKET+"/"+nome;
  });
}

// Recebe uma foto nova (base64): tenta subir; se falhar (offline) guarda base64
// localmente e devolve o base64 (será reenviado depois). cb(valorParaGuardar)
function processarFotoNova(dataURL, cb){
  subirFotoStorage(dataURL).then(function(url){
    cb(url);
  }).catch(function(){
    mostrarStatus("⚠️ Foto salva no aparelho (enviada à nuvem quando houver internet)");
    cb(dataURL); // mantém base64 local; reenviarFotosPendentes() sobe depois
  });
}

// Versão do DB para enviar ao JSONBin: troca base64 de FICHAS por placeholder
// (logos ficam, são pequenos). Mantém o payload bem abaixo de 100KB.
function _dbParaNuvem(){
  function _ph(v){ return _ehBase64(v) ? FOTO_PLACEHOLDER : v; }
  var clone=JSON.parse(JSON.stringify(DB));
  var f=clone.fichas||{};
  Object.keys(f).forEach(function(obra){
    var o=f[obra]||{};
    Object.keys(o).forEach(function(fid){
      var e=o[fid]; if(!e||typeof e!=="object") return;
      if(Array.isArray(e.fotosItens)) e.fotosItens=e.fotosItens.map(function(row){ return Array.isArray(row)?row.map(_ph):row; });
      if(Array.isArray(e.fotosNc)) e.fotosNc=e.fotosNc.map(_ph);
      if(Array.isArray(e.fotos)) e.fotos=e.fotos.map(function(p){ return (p&&typeof p==="object")?{base64:_ph(p.base64),legenda:p.legenda}:p; });
    });
  });
  return clone;
}

// Ao receber dados da nuvem, repõe as fotos locais onde a nuvem só tem placeholder
// (fotos ainda não enviadas). Sem base64 local, vira null (mostra "sem foto").
function _restaurarFotos(novo, antigo){
  if(!novo) return novo;
  var nf=novo.fichas||{}, af=(antigo&&antigo.fichas)||{};
  Object.keys(nf).forEach(function(obra){
    var no=nf[obra]||{}, ao=af[obra]||{};
    Object.keys(no).forEach(function(fid){
      var ne=no[fid], ae=ao[fid]||{}; if(!ne||typeof ne!=="object") return;
      if(Array.isArray(ne.fotosItens)) ne.fotosItens.forEach(function(row,ri){
        if(Array.isArray(row)) row.forEach(function(v,li){
          if(v===FOTO_PLACEHOLDER){ var l=ae.fotosItens&&ae.fotosItens[ri]&&ae.fotosItens[ri][li]; row[li]=(l&&l!==FOTO_PLACEHOLDER)?l:null; }
        });
      });
      if(Array.isArray(ne.fotosNc)) ne.fotosNc.forEach(function(v,ni){
        if(v===FOTO_PLACEHOLDER){ var l=ae.fotosNc&&ae.fotosNc[ni]; ne.fotosNc[ni]=(l&&l!==FOTO_PLACEHOLDER)?l:null; }
      });
      if(Array.isArray(ne.fotos)) ne.fotos.forEach(function(p,i){
        if(p&&p.base64===FOTO_PLACEHOLDER){ var l=ae.fotos&&ae.fotos[i]&&ae.fotos[i].base64; p.base64=(l&&l!==FOTO_PLACEHOLDER)?l:""; }
      });
    });
  });
  return novo;
}

// Procura fotos ainda em base64 no DB local e as envia ao Storage, trocando por URL
var _reenviando=false;
function reenviarFotosPendentes(){
  if(!_supabaseOk() || _reenviando) return;
  var tarefas=[];
  var f=DB.fichas||{};
  Object.keys(f).forEach(function(obra){
    var o=f[obra]||{};
    Object.keys(o).forEach(function(fid){
      var e=o[fid]; if(!e||typeof e!=="object") return;
      (e.fotosItens||[]).forEach(function(row,ri){ if(Array.isArray(row)) row.forEach(function(v,li){ if(_ehBase64(v)) tarefas.push({val:v,set:function(u){ e.fotosItens[ri][li]=u; }}); }); });
      (e.fotosNc||[]).forEach(function(v,ni){ if(_ehBase64(v)) tarefas.push({val:v,set:function(u){ e.fotosNc[ni]=u; }}); });
      (e.fotos||[]).forEach(function(p,i){ if(p&&_ehBase64(p.base64)) tarefas.push({val:p.base64,set:function(u){ e.fotos[i].base64=u; }}); });
    });
  });
  if(!tarefas.length) return;
  _reenviando=true;
  mostrarStatus("⏳ Enviando "+tarefas.length+" foto(s) para a nuvem...");
  var chain=Promise.resolve(), ok=0;
  tarefas.forEach(function(t){ chain=chain.then(function(){ return subirFotoStorage(t.val).then(function(u){ t.set(u); ok++; }).catch(function(){}); }); });
  chain.then(function(){
    _reenviando=false;
    if(ok>0){ salvarDB(); renderAtual(); mostrarStatus("🟢 "+ok+" foto(s) enviada(s) para a nuvem"); }
  });
}

function listarPendenciasAprovacao(){
  var res=[];
  if(!sessao || !podeAprovar()) return res;
  var fichas=DB.fichas||{};
  var obras=DB.obras||[];

    }
    var of=fichas[obra]||{};
    Object.keys(of).forEach(function(id){
      var est=of[id];
      if(!est || !est.aprovacao || est.aprovacao.status!=="submetido") return;
      var serv=SERVICOS.find(function(s){return s.id===id;});

        var mat=MATERIAIS.find(function(m){return m.id===id;});
        if(!mat) return;

function migrarDB(){
  if(!DB.fichas)      DB.fichas      = {};
  if(!DB.obras)       DB.obras       = [];
  if(!DB.obraAcessos) DB.obraAcessos = {};
  if(!DB.obraLogos)   DB.obraLogos   = {};
  // Migrar estrutura antiga: chaves diretas (ex: "1", "M01") para dentro de fichas
  var TODOS_IDS = SERVICOS.map(function(s){return s.id;}).concat(MATERIAIS.map(function(m){return m.id;}));
  var antigas = {};
  Object.keys(DB).forEach(function(k){
    if(k!=="obras" && k!=="fichas" && TODOS_IDS.indexOf(k)>=0){
      antigas[k] = DB[k];
    }
  });
  if(Object.keys(antigas).length > 0){
    var nome = "(Importadas)";
    if(!DB.fichas[nome]) DB.fichas[nome] = {};
    Object.keys(antigas).forEach(function(k){ DB.fichas[nome][k] = antigas[k]; delete DB[k]; });
    if(DB.obras.indexOf(nome)<0) DB.obras.push(nome);
  }
}

function carregarDB(){
  // 1. Carrega cache local imediatamente (app abre rápido)
  try{ DB = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }catch(e){ DB = {}; }
  migrarDB();
  carregarSessao();
  if(!_jbConfigurado()){ mostrarStatus("🔴 JSONBin não configurado (modo local)"); renderAtual(); return; }
  // 2. Busca dados atualizados da nuvem
  mostrarStatus("⏳ Carregando dados...");
  fetch("https://api.jsonbin.io/v3/b/"+JSONBIN.BIN_ID+"/latest", {
    headers:{"X-Master-Key": JSONBIN.BIN_KEY}
  }).then(function(r){ return r.json(); }).then(function(data){
    const nuvem = data.record || {};
    const tsLocal = DB._ts || 0;
    const tsNuvem = nuvem._ts || 0;
    // Só usa dados da nuvem se forem mais recentes que o localStorage
    if(tsNuvem >= tsLocal){
      DB = _restaurarFotos(nuvem, DB); // repõe fotos locais ainda não enviadas
      migrarDB();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
    } else {
      // localStorage é mais recente — re-salva na nuvem para atualizar
      _localDirty = true;
      salvarDB();
    }
    _jbOk = true;
    _localDirty = false;
    _ultimoHash = _calcHash(DB);
    mostrarStatus("🟢 Online — dados sincronizados");
    const btnS = document.getElementById("btnSincronizar"); if(btnS) btnS.style.display="";
    atualizarHeaderUsuario();
    renderAtual();
    reenviarFotosPendentes(); // sobe ao Storage qualquer foto presa em base64
  }).catch(function(){
    mostrarStatus("🔴 Sem conexão (usando dados locais)");
    renderAtual();
  });
}

var _syncTimer = null;
var _ultimoHash = "";
var _localDirty = false; // true enquanto há dados locais ainda não confirmados na nuvem

function _calcHash(obj){ try{ var s=JSON.stringify(obj); return s.length+"_"+s.slice(-32); }catch(e){ return ""; } }

function sincronizarDB(manual){
  if(!_jbConfigurado()) return;
  // Não sobrescrever dados locais não salvos ainda
  if(_localDirty && !manual) return;
  if(manual) mostrarStatus("🔄 Sincronizando...");
  fetch("https://api.jsonbin.io/v3/b/"+JSONBIN.BIN_ID+"/latest", {
    headers:{"X-Master-Key": JSONBIN.BIN_KEY}
  }).then(function(r){ return r.json(); }).then(function(data){
    const novo = data.record || {};
    const novoHash = _calcHash(novo);
    const tsNuvem = novo._ts || 0;
    const tsLocal = DB._ts || 0;
    if(novoHash !== _ultimoHash && tsNuvem > tsLocal && !_localDirty){
      _ultimoHash = novoHash;
      DB = _restaurarFotos(novo, DB); // repõe fotos locais ainda não enviadas
      migrarDB();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
      mostrarStatus("🟢 Online — atualizado");
      atualizarHeaderUsuario();
      renderAtual();
    } else if(novoHash === _ultimoHash && manual){
      mostrarStatus("🟢 Online — já atualizado");
    } else if(manual && !_localDirty){
      mostrarStatus("🟢 Online — dados locais mais recentes");
    }
  }).catch(function(){
    if(manual) mostrarStatus("⚠️ Sem conexão");
  });
}

function iniciarAutoSync(){
  if(_syncTimer) clearInterval(_syncTimer);
  _syncTimer = setInterval(function(){
    if(!document.hidden && !_localDirty) sincronizarDB(false);
  }, 30000); // a cada 30 segundos
}

function salvarDB(){
  DB._ts = Date.now(); // timestamp para resolver conflitos localStorage vs nuvem
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
  _localDirty = true; // marca que há dados locais não confirmados
  if(!_jbConfigurado()) return;
  clearTimeout(_saveTimer);
  _saveTimer = null;
  mostrarStatus("✏️ Editando...");
  _saveTimer = setTimeout(function(){
    _saveTimer = null; // timer disparou — limpa referência
    var payload = JSON.stringify(_dbParaNuvem()); // fotos viram placeholder; base64 fica só local
    fetch("https://api.jsonbin.io/v3/b/"+JSONBIN.BIN_ID, {
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":JSONBIN.BIN_KEY},
      body: payload
    }).then(function(r){ return r.json(); }).then(function(){
      _jbOk = true;
      _localDirty = false; // confirmado na nuvem
      _ultimoHash = _calcHash(DB); // atualiza hash para sync não sobrescrever
      mostrarStatus("🟢 Online — salvo na nuvem");
    }).catch(function(){
      // Mantém _localDirty = true para não perder dados na próxima sync
      mostrarStatus("⚠️ Salvo localmente (erro na nuvem)");
    });
  }, 1500);
}
function novoEstado(servico){
  return {
    obra:"", respInsp:"", data:"", locais:["Local 1","Local 2","Local 3"],
    status: servico.itens.map(()=>["","",""]),
    projeto: servico.itens.map(()=>""),
    nc: [],
    aprovadoPor:"", aprovadoData:"", inspecionadoPor:"", dataFechamento:"",
    aprovacao:{status:"pendente", por:"", data:"", obs:""},
    fotos:[],
    fotosItens: servico.itens.map(()=>[null,null,null]),
    fotosNc: []
  };
}
function getEstado(id){
  const servico = SERVICOS.find(s=>s.id===id);
  if(!DB.fichas[obraAtual]) DB.fichas[obraAtual] = {};
  const obraFichas = DB.fichas[obraAtual];
  if(!obraFichas[id]) obraFichas[id] = novoEstado(servico);
  const est = obraFichas[id];
  if(!est.obra) est.obra = obraAtual;
  if(!est.status || est.status.length !== servico.itens.length){
    est.status = servico.itens.map(()=> est.locais.map(()=>""));
  }
  if(!est.projeto || est.projeto.length !== servico.itens.length){
    est.projeto = servico.itens.map(()=>"");
  }
  if(!est.nc) est.nc = [];
  if(!est.aprovacao) est.aprovacao = {status:"pendente", por:"", data:"", obs:""};
  if(!est.fotos) est.fotos = [];
  if(!est.fotosNc) est.fotosNc = [];
  // Sincronizar fotosItens com itens e locais atuais
  if(!est.fotosItens || est.fotosItens.length !== servico.itens.length){
    var oldFI = est.fotosItens || [];
    est.fotosItens = servico.itens.map(function(_,ri){
      var oldRow = oldFI[ri] || [];
      return est.locais.map(function(_,li){ return oldRow[li]||null; });
    });
  } else {
    est.fotosItens.forEach(function(row){
      while(row.length < est.locais.length) row.push(null);
      while(row.length > est.locais.length) row.pop();
    });
  }
  while(est.fotosNc.length < est.nc.length) est.fotosNc.push(null);
  while(est.fotosNc.length > est.nc.length) est.fotosNc.pop();
  return est;
}

function novoEstadoMaterial(mat){
  return {
    obra:"", respReceb:"", data:"",
    recebimentos:[{fornecedor:"", dataEntrega:"", nf:"", descricao:"", qtde:"", pedido:""}],
    resultados: mat.criterios.map(()=>""),
    cubic:{C:"",L:"",M1:"",M2:"",M3:"",M4:"",M5:""},
    nc: [],
    aprovadoPor:"", aprovadoData:"", inspecionadoPor:"", dataFechamento:"",
    aprovacao:{status:"pendente", por:"", data:"", obs:""},
    fotos:[]
  };
}
function getEstadoMaterial(id){
  const mat = MATERIAIS.find(m=>m.id===id);
  if(!DB.fichas[obraAtual]) DB.fichas[obraAtual] = {};
  const obraFichas = DB.fichas[obraAtual];
  if(!obraFichas[id]) obraFichas[id] = novoEstadoMaterial(mat);
  const est = obraFichas[id];
  if(!est.obra) est.obra = obraAtual;
  if(!est.resultados || est.resultados.length !== mat.criterios.length){
    est.resultados = mat.criterios.map(()=>"");
  }
  // migrar campos antigos individuais para array recebimentos
  if(!est.recebimentos){
    est.recebimentos = [{
      fornecedor: est.fornecedor||"", dataEntrega: est.dataEntrega||"",
      nf: est.nf||"", descricao: est.descricao||"",
      qtde: est.qtde||"", pedido: est.pedido||""
    }];
    delete est.fornecedor; delete est.dataEntrega; delete est.nf;
    delete est.descricao; delete est.qtde; delete est.pedido;
  }
  if(!est.criteriosCustom) est.criteriosCustom = [];
  if(!est.resultadosCustom) est.resultadosCustom = [];
  // manter arrays em sincronia
  while(est.resultadosCustom.length < est.criteriosCustom.length) est.resultadosCustom.push("");
  while(est.resultadosCustom.length > est.criteriosCustom.length) est.resultadosCustom.pop();
  if(!est.cubic) est.cubic = {C:"",L:"",M1:"",M2:"",M3:"",M4:"",M5:""};
  if(!est.nc) est.nc = [];
  if(!est.aprovacao) est.aprovacao = {status:"pendente", por:"", data:"", obs:""};
  if(!est.fotos) est.fotos = [];
  return est;
}

function confirmarMeuPerfil(){
  const nome  = ((document.getElementById("mp-nome")||{}).value||"").trim();
  const email = ((document.getElementById("mp-email")||{}).value||"").trim().toLowerCase();
  const senhaAtual = (document.getElementById("mp-senha-atual")||{}).value||"";
  const senhaNova  = (document.getElementById("mp-senha-nova")||{}).value||"";
  const senhaConf  = (document.getElementById("mp-senha-conf")||{}).value||"";
  if(!nome||!email){ modalMsg("Nome e e-mail são obrigatórios."); return; }
  if(!senhaAtual){ modalMsg("Informe a senha atual para confirmar."); return; }
  const u = (DB.usuarios||[]).find(function(u){ return u.id===sessao.id; });
  if(!u){ modalMsg("Usuário não encontrado."); return; }
  if(u.senhaHash !== hashSenha(senhaAtual)){ modalMsg("Senha atual incorreta."); return; }
  if(senhaNova){
    if(senhaNova.length<4){ modalMsg("Nova senha deve ter ao menos 4 caracteres."); return; }
    if(senhaNova!==senhaConf){ modalMsg("As senhas não coincidem."); return; }
    u.senhaHash = hashSenha(senhaNova);
  }
  // Verificar e-mail duplicado
  if((DB.usuarios||[]).some(function(x){ return x.email===email && x.id!==u.id; })){ modalMsg("E-mail já em uso por outro usuário."); return; }
  u.nome = nome; u.email = email;
  sessao.nome = nome; sessao.email = email;
  salvarSessaoStorage();
  registrarLog("editar-proprio-perfil");
  salvarDB();
  atualizarHeaderUsuario();
  modalMsg("✅ Perfil atualizado com sucesso!");
  setTimeout(fecharModalForce, 900);
}

function confirmarEditarObra(nomeAntigo){
  if(!ehAdmin()){ fecharModalForce(); return; }
  const nomeEl = document.getElementById("ea-nome");
  const nomeNovo = nomeEl ? nomeEl.value.trim() : nomeAntigo;
  if(!nomeNovo){ alert("O nome da obra não pode estar vazio."); return; }

  // Verificar nome duplicado
  if(nomeNovo !== nomeAntigo && (DB.obras||[]).indexOf(nomeNovo)!==-1){
    alert("Já existe uma obra com esse nome."); return;
  }

  // Salvar logo
  if(_editObraLogoNovo === ""){
    if(DB.obraLogos) delete DB.obraLogos[nomeAntigo];
  } else if(_editObraLogoNovo){
    if(!DB.obraLogos) DB.obraLogos = {};
    DB.obraLogos[nomeAntigo] = _editObraLogoNovo;
  }

  // Salvar acesso
  const usuarios = (DB.usuarios||[]).filter(function(u){ return u.ativo && u.id!==sessao.id; });
  if(usuarios.length > 0){
    const selecionados = usuarios.filter(function(u){
      const cb = document.getElementById("ea-usr-"+u.id);
      return cb && cb.checked;
    }).map(function(u){ return u.id; });
    if(!DB.obraAcessos) DB.obraAcessos = {};
    // Se todos marcados, acesso livre (null); senão, lista restrita
    if(selecionados.length === usuarios.length){
      delete DB.obraAcessos[nomeAntigo];
    } else {
      DB.obraAcessos[nomeAntigo] = selecionados;
    }
  }

  // Renomear obra se necessário
  if(nomeNovo !== nomeAntigo){
    const idx = (DB.obras||[]).indexOf(nomeAntigo);
    if(idx!==-1) DB.obras[idx] = nomeNovo;
    // Mover fichas
    if(DB.fichas && DB.fichas[nomeAntigo]){
      DB.fichas[nomeNovo] = DB.fichas[nomeAntigo];
      delete DB.fichas[nomeAntigo];
      // Atualizar campo obra dentro de cada ficha
      Object.values(DB.fichas[nomeNovo]).forEach(function(f){ if(f) f.obra = nomeNovo; });
    }
    // Mover acessos e logos
    if(DB.obraAcessos && DB.obraAcessos[nomeAntigo]!==undefined){
      DB.obraAcessos[nomeNovo] = DB.obraAcessos[nomeAntigo];
      delete DB.obraAcessos[nomeAntigo];
    }
    if(DB.obraLogos && DB.obraLogos[nomeAntigo]!==undefined){
      DB.obraLogos[nomeNovo] = DB.obraLogos[nomeAntigo];
      delete DB.obraLogos[nomeAntigo];
    }
    if(obraAtual === nomeAntigo) obraAtual = nomeNovo;
  }

  registrarLog("editar-obra",{de:nomeAntigo, para:nomeNovo});
  salvarDB();
  fecharModalForce();
  _editObraLogoNovo = null;
  renderAtual();
}

function excluirObra(nome){
  if(!ehAdmin()){ alert("Apenas administradores podem excluir obras."); return; }
  const fichas = (DB.fichas && DB.fichas[nome]) || {};
  const total = Object.keys(fichas).length;
  const msg = total>0
    ? 'A obra "<b>'+escapeHtml(nome)+'</b>" tem '+total+' ficha(s). Excluir apagará tudo permanentemente.'
    : 'Excluir a obra "<b>'+escapeHtml(nome)+'</b>"?';
  abrirModal("Excluir Obra",
    '<p style="font-size:13px;margin:0 0 12px;">'+msg+'</p>',
    '<button type="button" class="secundario" onclick="fecharModalForce()">Cancelar</button>'
    +'<button type="button" class="perigo" onclick="confirmarExcluirObra(\''+nome.replace(/'/g,"\\'")+'\')">🗑 Excluir Permanentemente</button>');
}

function confirmarExcluirObra(nome){
  if(!ehAdmin()){ fecharModalForce(); return; }
  DB.obras = (DB.obras||[]).filter(function(o){return o!==nome;});
  if(DB.fichas) delete DB.fichas[nome];
  if(DB.obraAcessos) delete DB.obraAcessos[nome];
  if(DB.obraLogos) delete DB.obraLogos[nome];
  registrarLog("excluir-obra",{obra:nome});
  salvarDB();
  fecharModalForce();
  if(obraAtual===nome){ obraAtual=null; }
  renderAtual();
}

function _fichaTemDados(est, tipo){
  if(!est) return false;
  if(est.obra || est.data || est.fornecedor) return true;
  if(tipo==="servico") return est.status && est.status.some(function(row){ return row.some(function(s){ return s!==""; }); });
  return est.resultados && est.resultados.some(function(r){ return r!==""; });
}

function renderFichasSalvas(){
  const main = document.getElementById("main");
  const cards = [];

  const obraFichas = (DB.fichas && DB.fichas[obraAtual]) || {};

  // FVS
  SERVICOS.forEach(function(s){
    const est = obraFichas[s.id];
    if(!_fichaTemDados(est, "servico")) return;
    if(!_fichaVisivel(est)) return; // rascunho de outro usuário → oculto
    const totalItens = est.status.reduce(function(acc,row){ return acc+row.length; }, 0);
    const preenchidos = est.status.reduce(function(acc,row){ return acc+row.filter(function(v){ return v!==""; }).length; }, 0);
    const pct = totalItens ? Math.round(preenchidos/totalItens*100) : 0;
    const cls = pct===0?"vazio":pct<100?"parcial":"";
    const ncCount = est.nc ? est.nc.length : 0;
    const aprov = est.aprovacao||{status:"pendente"};
    cards.push({tipo:"servico", id:s.id, badge:"FVS "+s.id, badgeCls:"",
      titulo: s.titulo, rascunho: !!est.rascunho,
      obra: est.obra||"—", data: est.data||"—", resp: est.respInsp||"—",
      pct, cls, ncCount, aprovStatus: aprov.status, aprovPor: aprov.por,
      info: preenchidos+"/"+totalItens+" status preenchidos"
    });
  });

  // FVM
  MATERIAIS.forEach(function(m){
    const est = obraFichas[m.id];
    if(!_fichaTemDados(est, "material")) return;
    if(!_fichaVisivel(est)) return; // rascunho de outro usuário → oculto
    const total = 5;
    const preenchidos = est.resultados ? est.resultados.filter(function(r){ return r!==""; }).length : 0;
    const pct = Math.round(preenchidos/total*100);
    const cls = pct===0?"vazio":pct<100?"parcial":"";
    const ncCount = est.nc ? est.nc.length : 0;
    const aprovM = est.aprovacao||{status:"pendente"};
    cards.push({tipo:"material", id:m.id, badge:"FVM "+m.id.replace("M",""), badgeCls:"fvm",
      titulo: m.material, rascunho: !!est.rascunho,
      obra: est.obra||"—", data: est.data||"—", resp: est.fornecedor||"—",
      pct, cls, ncCount, aprovStatus: aprovM.status, aprovPor: aprovM.por,
      info: preenchidos+"/"+total+" verificações preenchidas"
    });
  });

  // Contagens por status de aprovação
  const cont = {todos:cards.length, submetido:0, pendente:0, aprovado:0, reprovado:0};
  cards.forEach(function(c){ if(cont[c.aprovStatus]!==undefined) cont[c.aprovStatus]++; });

  // Alertas de ação
  let alerta = "";
  // Para quem aprova: o que está aguardando decisão
  if(podeAprovar() && cont.submetido>0){
    alerta += '<div class="aprov-alerta">🔔 <b>'+cont.submetido+'</b> ficha(s) aguardando sua aprovação nesta obra. <a href="#" onclick="setFiltroFichas(\'submetido\');return false;">Ver</a></div>';
  }
  // Para quem envia: o que foi reprovado e precisa de correção
  if(cont.reprovado>0){
    alerta += '<div class="aprov-alerta reprov">❌ <b>'+cont.reprovado+'</b> ficha(s) reprovada(s) — precisam de correção e novo envio. <a href="#" onclick="setFiltroFichas(\'reprovado\');return false;">Ver</a></div>';
  }

  // Barra de filtros
  const chips = [
    {k:"todos",     lbl:"Todos",                  n:cont.todos},
    {k:"submetido", lbl:"📋 Aguardando aprovação", n:cont.submetido},
    {k:"pendente",  lbl:"📝 Abertos",             n:cont.pendente},
    {k:"aprovado",  lbl:"✅ Aprovados",            n:cont.aprovado},
    {k:"reprovado", lbl:"❌ Reprovados",           n:cont.reprovado}
  ];
  const chipsHtml = chips.map(function(ch){
    const cls = "filtro-chip"+(_filtroFichas===ch.k?" ativo":"")+(ch.k==="submetido"&&ch.n>0?" destaque":"");
    return '<button type="button" class="'+cls+'" onclick="setFiltroFichas(\''+ch.k+'\')">'+ch.lbl+' <span class="chip-n">'+ch.n+'</span></button>';
  }).join("");

  // Botão de criar nova ficha (quem pode editar)
  const btnNova = podeEditar()
    ? '<button type="button" class="btn-nova-ficha" onclick="novaFicha()">➕ Nova ficha</button>'
    : '';

  const topo = '<div class="salvas-topo"><div><h2>📋 Fichas da Obra</h2>'
    +'<div style="font-size:12px;color:#555;">'+cards.length+' ficha(s) no total</div></div>'
    +btnNova+'</div>'
    +alerta
    +'<div class="filtros-bar">'+chipsHtml+'</div>';

  if(cards.length===0){
    main.innerHTML = topo + '<div class="salvas-vazio">Nenhuma ficha preenchida ainda.<br>Use as abas “Ficha de Serviço” ou “Ficha de Material” acima para começar.</div>';
    return;
  }

  // Aplica o filtro selecionado
  let visiveis = (_filtroFichas==="todos") ? cards.slice() : cards.filter(function(c){ return c.aprovStatus===_filtroFichas; });
  // Ordena: mais recentes primeiro (por data)
  visiveis.sort(function(a,b){ return (b.data||"").localeCompare(a.data||""); });

  if(visiveis.length===0){
    main.innerHTML = topo + '<div class="salvas-vazio">Nenhuma ficha neste filtro.</div>';
    return;
  }

  const cardsHtml = visiveis.map(function(c){
    const aprovLabels={pendente:"📝 Em preenchimento",submetido:"📋 Aguardando Aprovação",aprovado:"✅ Aprovado",reprovado:"❌ Reprovado"};
    const aprovCores={pendente:"#e65100",submetido:"#1565c0",aprovado:"#2e7d32",reprovado:"#c62828"};
    return '<div class="ficha-card" onclick="abrirFichaSalva(\''+c.tipo+'\',\''+c.id+'\')" style="position:relative;">'+
      '<button type="button" onclick="event.stopPropagation();excluirFichaSalva(\''+c.tipo+'\',\''+c.id+'\')" title="Excluir ficha" style="position:absolute;top:10px;right:10px;background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:0;" onmouseover="this.style.color=\'#c62828\'" onmouseout="this.style.color=\'#ccc\'">🗑</button>'+
      '<span class="card-badge '+c.badgeCls+'">'+escapeHtml(c.badge)+'</span>'+
      '<div class="card-titulo">'+escapeHtml(c.titulo)+'</div>'+
      '<div class="card-info">🏗️ Obra: <span>'+escapeHtml(c.obra)+'</span></div>'+
      '<div class="card-info">📅 Data: <span>'+escapeHtml(c.data)+'</span></div>'+
      '<div class="card-info">'+(c.tipo==="servico"?"👷 Resp.:":"🏭 Fornecedor:")+' <span>'+escapeHtml(c.resp)+'</span></div>'+
      (c.ncCount>0?'<div class="card-info" style="color:#b71c1c;">⚠️ '+c.ncCount+' não conformidade(s)</div>':'')+
      (c.rascunho&&c.aprovStatus==="pendente"
        ? '<div class="card-info" style="color:#5e35b1;font-weight:bold;">🔒 Rascunho (só você vê)</div>'
        : '<div class="card-info" style="color:'+aprovCores[c.aprovStatus]+';font-weight:bold;">'+(aprovLabels[c.aprovStatus]||"")+(c.aprovPor?' — '+escapeHtml(c.aprovPor):'')+'</div>')+
      '<div class="card-progress-txt">'+c.info+' ('+c.pct+'%)</div>'+
      '<div class="progress-bar"><div class="progress-fill '+c.cls+'" style="width:'+c.pct+'%"></div></div>'+
    '</div>';
  }).join("");

  main.innerHTML = topo + '<div class="salvas-grid">'+cardsHtml+'</div>';
}

function resultadoCiclo(s){
  const ordem = ["","C","NC"];
  const i = ordem.indexOf(s);
  return ordem[(i+1)%ordem.length];
}
function resultadoLabel(s){
  return s==="C" ? "CONFORME" : (s==="NC" ? "NÃO CONFORME" : "");
}
function calcCubicagemTexto(c){
  const nums = ["M1","M2","M3","M4","M5"].map(k=>parseFloat(String(c[k]||"").replace(",", ".")));
  const validos = nums.filter(n=>!isNaN(n));
  if(validos.length===0) return "Preencha as medidas (M1 a M5) para calcular o volume.";
  const hMedio = validos.reduce((a,b)=>a+b,0)/validos.length;
  const cNum = parseFloat(String(c.C||"").replace(",", "."));
  const lNum = parseFloat(String(c.L||"").replace(",", "."));
  let txt = "H (médio) = "+hMedio.toFixed(3)+" m";
  if(!isNaN(cNum) && !isNaN(lNum)){
    const vol = cNum*lNum*hMedio;
    txt += " · Volume = C × L × H(médio) = "+vol.toFixed(3)+" m³";
  } else {
    txt += " · Informe C e L para calcular o volume.";
  }
  return txt;
}

function adicionarCriterioMat(){
  const est = getEstadoMaterial(materialAtual);
  est.criteriosCustom.push({verif:"", criterio:""});
  est.resultadosCustom.push("");
  registrarHistorico(materialAtual, "adicionou critério de verificação extra");
  salvarDB();
  renderFichaMaterial();
}
function removerCriterioMat(ci){
  const est = getEstadoMaterial(materialAtual);
  est.criteriosCustom.splice(ci,1);
  est.resultadosCustom.splice(ci,1);
  registrarHistorico(materialAtual, "removeu critério de verificação extra "+(ci+1));
  salvarDB();
  renderFichaMaterial();
}

function popularSelect(){
  const sel = document.getElementById("servicoSelect");
  sel.innerHTML = '<option value="">— Selecione —</option>';
  CATEGORIAS.forEach(cat=>{
    const og = document.createElement("optgroup");
    og.label = cat.nome;
    cat.ids.forEach(id=>{
      const s = SERVICOS.find(x=>x.id===id);
      const op = document.createElement("option");
      op.value = id;
      op.textContent = "FVS "+id+" — "+s.titulo;
      og.appendChild(op);
    });
    sel.appendChild(og);
  });
  sel.addEventListener("change", ()=>{ selecionarServico(sel.value); });
}

function selecionarServico(id){
  servicoAtual = id || null;
  atualizarSeletorFicha();
  if(!servicoAtual){
    document.getElementById("main").innerHTML = '<div class="empty">Selecione um serviço acima para abrir a ficha.</div>';
    return;
  }
  renderFicha();
}

function statusCiclo(s){
  const ordem = ["","A","R","AR","NA"];
  const i = ordem.indexOf(s);
  return ordem[(i+1)%ordem.length];
}
function statusLabel(s){
  return s || "";
}

function escapeHtml(v){
  return String(v==null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
// Converte DD/MM/YYYY → YYYY-MM-DD (para input type=date)
function paraISO(dataBR){
  if(!dataBR) return "";
  var p = dataBR.split("/");
  if(p.length===3) return p[2]+"-"+p[1]+"-"+p[0];
  return dataBR;
}
// Converte YYYY-MM-DD → DD/MM/YYYY (para exibição)
function paraBR(dataISO){
  if(!dataISO) return "";
  var p = dataISO.split("-");
  if(p.length===3) return p[2]+"/"+p[1]+"/"+p[0];
  return dataISO;
}

function onHeaderChange(campo, valor){
  const est = getEstado(servicoAtual);
  const de = est[campo];
  est[campo] = valor;
  if(de!==valor) registrarHistorico(servicoAtual, "alterou campo «"+campo+"»", (de||"")+" → "+valor);
  salvarDB();
}
function onProjetoChange(input){
  const ri = parseInt(input.dataset.row,10);
  const est = getEstado(servicoAtual);
  est.projeto[ri] = input.value;
  salvarDB();
}
function onLocalNomeChange(input){
  const li = parseInt(input.dataset.local,10);
  const est = getEstado(servicoAtual);
  est.locais[li] = input.value || ("Local "+(li+1));
  salvarDB();
}
function onStatusClick(ri, li){
  const est = getEstado(servicoAtual);
  const de = est.status[ri][li];
  est.status[ri][li] = statusCiclo(de || "");
  const para = est.status[ri][li];

function fichaEstaBloqueada(est){
  const s = est && est.aprovacao && est.aprovacao.status;
  if(s==="aprovado" || s==="reprovado") return true;
  if(s==="submetido" && !podeAprovar()) return true; // bloqueia inspetor quando submetido
  return false;
}

function validarItensPreenchidos(pularFotos){
  const est = estadoAtual();
  if(!est) return "Nenhuma ficha selecionada.";
  if(!est.obra || !est.obra.trim()) return "Preencha o campo OBRA.";
  if(modoAtual==="servico"){
    if(!est.respInsp || !est.respInsp.trim()) return "Preencha o campo RESP. INSP.";
    if(!est.data) return "Preencha a DATA da ficha.";
    if(!est.inspecionadoPor || !est.inspecionadoPor.trim()) return "Preencha o campo INSPECIONADO POR.";
    if(!est.dataFechamento) return "Preencha a DATA DE FECHAMENTO da FVS.";
    let vazios = 0;
    (est.status||[]).forEach(function(row){ row.forEach(function(s){ if(!s) vazios++; }); });
    if(vazios>0) return "Preencha todos os "+vazios+" status de inspeção antes de aprovar.";
    if(!pularFotos){
      // Fotos obrigatórias para itens aprovados
      let semFotoItem = 0;
      (est.status||[]).forEach(function(row, ri){ row.forEach(function(s, li){ if((s==="A"||s==="AR") && !(est.fotosItens&&est.fotosItens[ri]&&est.fotosItens[ri][li])) semFotoItem++; }); });
      if(semFotoItem>0) return "Adicione foto para todos os itens aprovados ("+semFotoItem+" pendente(s)).";
      // Fotos obrigatórias para NCs
      let semFotoNc = (est.nc||[]).filter(function(_,ni){ return !(est.fotosNc&&est.fotosNc[ni]); }).length;
      if(semFotoNc>0) return "Adicione foto para todas as não conformidades ("+semFotoNc+" pendente(s)).";
    }
  } else {
    if(!est.respReceb || !est.respReceb.trim()) return "Preencha o campo RESP. RECEB.";
    if(!est.data) return "Preencha a DATA da ficha.";
    const r0 = (est.recebimentos||[{}])[0]||{};
    if(!r0.fornecedor || !r0.fornecedor.trim()) return "Preencha o campo FORNECEDOR.";
    if(!r0.dataEntrega) return "Preencha a DATA DE ENTREGA.";
    if(!r0.nf || !r0.nf.trim()) return "Preencha o campo NF Nº.";
    if(!r0.descricao || !r0.descricao.trim()) return "Preencha o campo DESCRIÇÃO / CARACTERÍSTICAS.";
    if(!r0.qtde || !r0.qtde.trim()) return "Preencha o campo QTDE / UN.";
    if(!est.inspecionadoPor || !est.inspecionadoPor.trim()) return "Preencha o campo INSPECIONADO POR.";
    if(!est.dataFechamento) return "Preencha a DATA DE FECHAMENTO da FVM.";
    const vaziosF = (est.resultados||[]).filter(function(r){ return !r; }).length;
    const vaziosC = (est.resultadosCustom||[]).filter(function(r){ return !r; }).length;
    const vazios = vaziosF + vaziosC;
    if(vazios>0) return "Preencha todos os "+vazios+" resultado(s) de verificação antes de aprovar.";
  }
  return null; // OK
}

function htmlAprovacao(est){
  const aprov = est.aprovacao || {status:"pendente",por:"",data:"",obs:""};
  const badges = {
    pendente:"📝 Em preenchimento",
    submetido:"📋 Aguardando Aprovação",
    aprovado:"✅ Aprovado",
    reprovado:"❌ Reprovado"
  };
  const ehRascunho = !!est.rascunho && aprov.status==="pendente";
  const badge = ehRascunho
    ? '<span class="aprov-badge rascunho">🔒 Rascunho</span>'
    : '<span class="aprov-badge '+aprov.status+'">'+(badges[aprov.status]||"")+'</span>';
  let corpo = '';
  if(aprov.status==="pendente"){
    // Só libera Submeter/Aprovar quando a ficha está 100% preenchida (campos, status e fotos)
    const erroCompleto = validarItensPreenchidos();
    const completo = !erroCompleto;
    const aviso = completo ? '' : '<div class="aprov-aviso">⚠️ Para submeter/aprovar, complete a ficha: '+escapeHtml(erroCompleto)+'</div>';
    if(podeAprovar()){
      // Gestor/Admin pode aprovar diretamente (aprovar exige 100%; reprovar sempre liberado)
      corpo = aviso + '<div class="aprov-acoes">'
        +(completo
            ? '<button type="button" class="btn-aprovar" onclick="iniciarAprovacao(\'aprovar\')">✅ Aprovar ficha</button>'
            : '<button type="button" class="btn-aprovar" disabled title="Complete 100% da ficha para aprovar">✅ Aprovar ficha</button>')
        +'<button type="button" class="btn-reprovar" onclick="iniciarAprovacao(\'reprovar\')">❌ Reprovar ficha</button>'
        +'</div>';
    } else if(podeEditar()){
      // Opção de rascunho: enquanto marcado, a ficha fica visível só para o criador
      const draftBox = '<label class="rascunho-toggle"><input type="checkbox" '+(ehRascunho?'checked':'')+' onclick="toggleRascunho()"> 🔒 Manter como rascunho (não exibir para o gestor)</label>'
        +(ehRascunho ? '<div class="aprov-aviso rascunho">🔒 Esta ficha é um <b>rascunho</b> — somente você a vê. Desmarque acima (ou submeta) para enviá-la ao gestor.</div>' : '');
      corpo = aviso + draftBox + '<div class="aprov-acoes">'
        +(completo
            ? '<button type="button" class="btn-submeter" onclick="iniciarSubmissao()">📋 Submeter para Aprovação</button>'
            : '<button type="button" class="btn-submeter" disabled title="Complete 100% da ficha para submeter">📋 Submeter para Aprovação</button>')
        +'</div>';
    }
  } else if(aprov.status==="submetido"){
    const bannerSub = '<div class="banner-bloqueado" style="background:#e3f2fd;color:#1565c0;border-color:#1976d2;">📋 Submetido por '
      +escapeHtml(aprov.por||"")+(aprov.data?' em '+escapeHtml(aprov.data):'')
      +(podeAprovar()?'' : ' — aguardando aprovação do gestor')+'</div>';
    if(podeAprovar()){
      corpo = bannerSub
        +'<div class="aprov-acoes">'
        +'<button type="button" class="btn-aprovar" onclick="iniciarAprovacao(\'aprovar\')">✅ Aprovar ficha</button>'
        +'<button type="button" class="btn-reprovar" onclick="iniciarAprovacao(\'reprovar\')">❌ Reprovar ficha</button>'
        +'<button type="button" class="secundario" onclick="devolverEdicao()">↩ Devolver para edição</button>'
        +'</div>';
    } else {
      corpo = bannerSub;
    }
  } else {
    const bannerCls = aprov.status==="aprovado"?"banner-bloqueado":"banner-bloqueado banner-reprovado";
    const bannerTxt = aprov.status==="aprovado"
      ? "🔒 Ficha aprovada e bloqueada para edição"
      : "🔒 Ficha reprovada e bloqueada para edição";
    corpo = '<div class="'+bannerCls+'">'+bannerTxt+'</div>'
      +'<div class="aprov-registro">'
      +'<b>'+(aprov.status==="aprovado"?"Aprovado":"Reprovado")+' por:</b> '+escapeHtml(aprov.por)
      +' &nbsp;|&nbsp; <b>Data:</b> '+escapeHtml(aprov.data)
      +(aprov.obs?'<br><b>Obs.:</b> '+escapeHtml(aprov.obs):'')
      +'</div>'
      +(podeAprovar()?'<div class="aprov-acoes"><button type="button" class="secundario" onclick="reabrirAprovacao()">↩ Reabrir aprovação (requer senha admin)</button></div>':'');
  }
  return '<div class="aprov-section">'
    +'<div class="aprov-header"><strong>Status de Aprovação</strong>'+badge+'</div>'
    +'<div class="aprov-body">'+corpo+'</div>'
    +'</div>';
}

function iniciarAprovacao(acao){
  if(!podeAprovar()){ alert("⚠️ Apenas Administradores e Gestores podem aprovar/reprovar fichas."); return; }
  // Ao reprovar, não exige fotos (a ficha está sendo rejeitada)
  const erro = validarItensPreenchidos(acao==="reprovar");
  if(erro){ alert("⚠️ "+erro); return; }
  const label = acao==="aprovar" ? "Aprovar" : "Reprovar";
  abrirModal(
    label+" ficha",
    '<p style="font-size:13px;margin:0 0 12px;">Confirma a '+(acao==="aprovar"?"aprovação":"reprovação")+' desta ficha como <b>'+escapeHtml(sessao.nome)+'</b>?</p>'
    +'<label>Observação (opcional):</label><input type="text" id="aprov-obs" placeholder="">',
    '<button type="button" class="secundario" onclick="fecharModalForce()">Cancelar</button>'
    +'<button type="button" class="'+(acao==="aprovar"?"btn-aprovar":"btn-reprovar")+'" onclick="confirmarAprovacao(\''+acao+'\')">'
    +(acao==="aprovar"?"✅ Confirmar Aprovação":"❌ Confirmar Reprovação")+'</button>'
  );
  setTimeout(function(){ var el=document.getElementById("aprov-obs"); if(el) el.focus(); },100);
}

function confirmarAprovacao(acao){
  if(!podeAprovar()){ fecharModalForce(); alert("Acesso negado."); return; }
  const obs = (document.getElementById("aprov-obs")||{}).value||"";
  const est = estadoAtual(); if(!est) return;
  if(!est.aprovacao) est.aprovacao = {};
  est.aprovacao.status = acao==="aprovar" ? "aprovado" : "reprovado";
  est.aprovacao.por = sessao.nome;
  const _hoje = new Date(); est.aprovacao.data = _hoje.toLocaleDateString("pt-BR");
  const _hojeISO = _hoje.toISOString().slice(0,10);

  if(acao==="aprovar"){ est.aprovadoPor = sessao.nome; est.aprovadoData = paraBR(_hojeISO); }
  const fichaId = modoAtual==="servico"?servicoAtual:materialAtual;
  registrarHistorico(fichaId, acao==="aprovar"?"aprovação":"reprovação", obs.trim()||"");
  registrarLog(acao==="aprovar"?"aprovacao":"reprovacao", {fichaId:fichaId, obra:obraAtual});
  salvarDB();
  fecharModalForce();
  renderAtual();
}

function htmlFotosLocais(est, servico){
  const localGroups = est.locais.map(function(nomLocal, li){
    const items = servico.itens.map(function(it, ri){
      const foto = est.fotosItens && est.fotosItens[ri] && est.fotosItens[ri][li];
      if(!foto) return null;
      return {label:(ri+1)+'. '+it.item, foto:foto};
    }).filter(Boolean);
    if(!items.length) return null;
    return {nome:nomLocal, items:items};
  }).filter(Boolean);

  const ncGroup = (est.nc||[]).map(function(nc, ni){
    const foto = est.fotosNc && est.fotosNc[ni];
    if(!foto) return null;
    return {label:(ni+1)+'. '+(nc.problema||'NC '+(ni+1)), foto:foto};
  }).filter(Boolean);

  if(!localGroups.length && !ncGroup.length) return '';

  let html = '<div class="fotos-locais-section"><div class="fotos-titulo">Registro Fotográfico por Local</div>';
  localGroups.forEach(function(g){
    html += '<div class="fotos-local-group"><div class="fotos-local-nome">'+escapeHtml(g.nome)+'</div><div class="fotos-grid-local">';
    g.items.forEach(function(item){
      html += '<div class="foto-local-item"><div class="foto-label">'+escapeHtml(item.label)+'</div><img src="'+item.foto+'" alt="'+escapeHtml(item.label)+'"></div>';
    });
    html += '</div></div>';
  });
  if(ncGroup.length){
    html += '<div class="fotos-local-group"><div class="fotos-local-nome">Não Conformidades</div><div class="fotos-grid-local">';
    ncGroup.forEach(function(item){
      html += '<div class="foto-local-item"><div class="foto-label">'+escapeHtml(item.label)+'</div><img src="'+item.foto+'" alt="'+escapeHtml(item.label)+'"></div>';
    });
    html += '</div></div>';
  }
  html += '</div>';
  return html;
}

      +'<button type="button" class="foto-rm" onclick="'+fnRm+'('+i+')" title="Remover">×</button>'

      +'<input type="text" placeholder="Legenda..." value="'+escapeHtml(f.legenda||'')+'" onchange="'+fnLeg+'('+i+',this.value)">'
      +'</div>';
  }).join("");
  return '<div class="fotos-section">'
    +'<div class="fotos-titulo">Registro Fotográfico</div>'
    +'<div class="fotos-grid">'+items+'</div>'
    +'<div class="fotos-add nc-actions"><button class="secundario" onclick="abrirSeletorFotos()">📷 Adicionar Fotos</button></div>'
    +'</div>';
}

document.getElementById("fotoInput").addEventListener("change", function(e){
  const files = Array.from(e.target.files);

  files.forEach(function(file){
    const reader = new FileReader();
    reader.onload = function(ev){
      comprimirImagem(ev.target.result, function(base64){
        processarFotoNova(base64, function(val){
          const est = estadoAtual();
          if(!est) return;
          if(!est.fotos) est.fotos = [];
          est.fotos.push({base64:val, legenda:""});
          salvarDB(); renderAtual();
        });
      });
    };
    reader.readAsDataURL(file);
  });
});

function comprimirImagem(src, cb){
  const img = new Image();
  img.onload = function(){
    const MAX = 900;
    let w = img.width, h = img.height;
    if(w > MAX || h > MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
    const c = document.createElement("canvas");
    c.width=w; c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    cb(c.toDataURL("image/jpeg", 0.72));
  };
  img.src = src;
}

// ===== IMPORTAÇÃO DE NF (PDF) =====
function importarNF(){
  if(!materialAtual){ alert("Selecione um material antes de importar a NF."); return; }
  document.getElementById("nfFileInput").click();
}

document.getElementById("nfFileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;
  e.target.value = "";
  const reader = new FileReader();
  reader.onload = function(ev){
    const typedarray = new Uint8Array(ev.target.result);
    // Configurar worker do PDF.js
    if(typeof pdfjsLib !== "undefined"){
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }
    pdfjsLib.getDocument({data: typedarray}).promise.then(function(pdf){
      const promises = [];
      for(let i = 1; i <= pdf.numPages; i++){
        promises.push(
          pdf.getPage(i).then(function(pg){
            return pg.getTextContent();
          }).then(function(tc){
            return tc.items.map(function(it){ return it.str; }).join(" ");
          })
        );
      }
      return Promise.all(promises);
    }).then(function(pages){
      preencherCamposNF(pages.join("\n"));
    }).catch(function(err){
      alert("Erro ao ler o PDF: " + err.message);
    });
  };
  reader.readAsArrayBuffer(file);
});

function preencherCamposNF(txt){
  const est = getEstadoMaterial(materialAtual);
  const preenchidos = [];

  // NF Número
  const nfM = txt.match(/N[ÚU]MERO\s+([\d\.]+)/i) ||
               txt.match(/NF[- ]?[Ee]?\s*[Nn][°º]?\.?\s*([\d\.]+)/i) ||
               txt.match(/NOTA\s+FISCAL\s*[Nn][°º]?\.?\s*([\d\.]+)/i);
  if(nfM){ est.nf = nfM[1].replace(/\./g,""); preenchidos.push("NF Nº"); }

  // Fornecedor (Razão Social do emitente)
  const fornM = txt.match(/RAZ[ÃA]O\s*SOCIAL\s+([A-ZÀ-Ü][A-ZÀ-Ü0-9\s\.\,\-&\/]+?)(?:\s{3,}|CNPJ|ENDERE)/i) ||
                txt.match(/^([A-ZÀ-Ü][A-ZÀ-Ü0-9\s\.\,\-&]{6,70}?)\s{2,}/m);
  if(fornM){ est.fornecedor = fornM[1].trim(); preenchidos.push("Fornecedor"); }

  // Data de Emissão / Entrega
  const dataM = txt.match(/(?:DATA\s+DE\s+EMISS[ÃA]O|EMISS[ÃA]O)\s+(\d{2}\/\d{2}\/\d{4})/i) ||
                txt.match(/(\d{2}\/\d{2}\/\d{4})/);
  if(dataM){ est.dataEntrega = dataM[1]; preenchidos.push("Data de Entrega"); }

  // Pedido de Compra
  const pedM = txt.match(/PEDIDO\s+(?:DE\s+COMPRA\s+)?[Nn°º]?\.?\s*([\d\-]+)/i) ||
               txt.match(/(?:O\.?\s*C\.?|P\.?\s*O\.?)\s*[Nn°º]?\.?\s*([\d\-]+)/i);
  if(pedM){ est.pedido = pedM[1]; preenchidos.push("Pedido"); }

  // Descrição do produto (primeira ocorrência após cabeçalho dos itens)
  const descM = txt.match(/DESCRI[ÇC][ÃA]O\s+(?:DO\s+PRODUTO[^\n]*\n?\s*)([A-Za-zÀ-ü][^\n]{4,100}?)(?:\s{3,}|\n)/i);
  if(descM){ est.descricao = descM[1].trim(); preenchidos.push("Descrição"); }

  // Quantidade
  const qtdeM = txt.match(/QUANTIDADE\s+([\d\.,]+)/i) ||
                txt.match(/QTDE?\.\s*([\d\.,]+)/i);
  if(qtdeM){ est.qtde = qtdeM[1]; preenchidos.push("Qtde"); }

  salvarDB();
  renderFichaMaterial();

  if(preenchidos.length > 0){
    alert("✅ Campos preenchidos: " + preenchidos.join(", ") + ".\n\nRevise os dados e ajuste se necessário.");
  } else {
    alert("⚠️ Não foi possível extrair dados desta NF. O layout pode diferir do padrão DANFE.\nPreencha os campos manualmente.");
  }
}

window.addEventListener("beforeprint", function(){
  // Converter inputs em spans para exibir texto completo
  document.querySelectorAll("#main input[type=text], #main input[type=date]").forEach(function(inp){
    var span = document.createElement("span");
    span.className = "print-val";
    span.textContent = inp.type==="date" ? paraBR(inp.value) : inp.value;
    inp.parentNode.insertBefore(span, inp.nextSibling);
    inp.classList.add("print-hidden");
  });
  // Zerar coluna do botão "remover" nas tabelas NC e recebimento
  document.querySelectorAll(".tbl-nc, .tbl-receb").forEach(function(tbl){
    var lastCol = tbl.querySelector("colgroup col:last-child");
    if(lastCol){ lastCol._pw = lastCol.style.width; lastCol.style.width = "0"; }
    tbl.querySelectorAll("tr > td:last-child, tr > th:last-child").forEach(function(el){
      el._pd = el.style.display; el._pp = el.style.padding; el._pb = el.style.border;
      el.style.display = "none"; el.style.padding = "0"; el.style.border = "none";
    });
  });
  // Escalar largura para caber na página (sem limitar altura — doc pode ter múltiplas páginas)
  var ficha = document.querySelector("#main .ficha-doc");
  if(ficha){
    ficha.style.zoom = "";
    var fw = ficha.scrollWidth;
    var maxW = 1060; // A4 landscape ~285mm a 96dpi
    var scaleW = fw > maxW ? maxW / fw : 1;
    if(scaleW < 0.99){
      ficha.style.zoom = scaleW;
      ficha._printZoom = true;
    }
  }
});
window.addEventListener("afterprint", function(){
  document.querySelectorAll(".print-val").forEach(function(el){ el.remove(); });
  document.querySelectorAll(".print-hidden").forEach(function(el){ el.classList.remove("print-hidden"); });
  // Restaurar coluna do remover
  document.querySelectorAll(".tbl-nc, .tbl-receb").forEach(function(tbl){
    var lastCol = tbl.querySelector("colgroup col:last-child");
    if(lastCol && lastCol._pw !== undefined){ lastCol.style.width = lastCol._pw; delete lastCol._pw; }
    tbl.querySelectorAll("tr > td:last-child, tr > th:last-child").forEach(function(el){
      if(el._pd !== undefined){ el.style.display = el._pd; el.style.padding = el._pp; el.style.border = el._pb; delete el._pd; delete el._pp; delete el._pb; }
    });
  });
  // Restaurar zoom
  var ficha = document.querySelector("#main .ficha-doc");
  if(ficha && ficha._printZoom){ ficha.style.zoom = ""; ficha._printZoom = false; }
});

document.getElementById("logoFileInput").addEventListener("change", function(e){
  var file = e.target.files[0]; if(!file) return;
  e.target.value = "";
  var reader = new FileReader();
  reader.onload = function(ev){
    // Comprimir via canvas para manter tamanho razoável no JSONBin
    var img = new Image();
    img.onload = function(){
      var canvas = document.createElement("canvas");
      var maxW = 300, maxH = 150;
      var ratio = Math.min(maxW/img.width, maxH/img.height, 1);
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      DB.logoBase64 = canvas.toDataURL("image/png");
      salvarDB();
      fecharModalForce();
      renderAtual();
      alert("✅ Logo salvo! Ele aparecerá em todas as fichas a partir de agora.");
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});
