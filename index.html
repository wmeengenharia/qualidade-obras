function htmlFotosLocais(est, servico){
  const localGroups = est.locais.map(function(nomLocal, li){
    const items = servico.itens.map(function(it, ri){
      const foto = est.fotosItens && est.fotosItens[ri] && est.fotosItens[ri][li];
      if(!foto) return null;
      return {label:(ri+1)+'. '+it.item, foto:foto};
    }).filter(Boolean);
    if(!items.length) return null;
    return {nome:nomLocal, items:items};
  }).filter(Boolean);

  const ncGroup = (est.nc||[]).map(function(nc, ni){
    const foto = est.fotosNc && est.fotosNc[ni];
    if(!foto) return null;
    return {label:(ni+1)+'. '+(nc.problema||'NC '+(ni+1)), foto:foto};
  }).filter(Boolean);

  if(!localGroups.length && !ncGroup.length) return '';

  let html = '<div class="fotos-locais-section"><div class="fotos-titulo">Registro Fotográfico por Local</div>';
  localGroups.forEach(function(g){
    html += '<div class="fotos-local-group"><div class="fotos-local-nome">'+escapeHtml(g.nome)+'</div><div class="fotos-grid-local">';
    g.items.forEach(function(item){
      html += '<div class="foto-local-item"><div class="foto-label">'+escapeHtml(item.label)+'</div><img src="'+item.foto+'" alt="'+escapeHtml(item.label)+'"></div>';
    });
    html += '</div></div>';
  });
  if(ncGroup.length){
    html += '<div class="fotos-local-group"><div class="fotos-local-nome">Não Conformidades</div><div class="fotos-grid-local">';
    ncGroup.forEach(function(item){
      html += '<div class="foto-local-item"><div class="foto-label">'+escapeHtml(item.label)+'</div><img src="'+item.foto+'" alt="'+escapeHtml(item.label)+'"></div>';
    });
    html += '</div></div>';
  }
  html += '</div>';
  return html;
}

function comprimirImagem(src, cb){
  const img = new Image();
  img.onload = function(){
    const MAX = 900;
    let w = img.width, h = img.height;
    if(w > MAX || h > MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
    const c = document.createElement("canvas");
    c.width=w; c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    cb(c.toDataURL("image/jpeg", 0.72));
  };
  img.src = src;
}

// ===== IMPORTAÇÃO DE NF (PDF) =====
function importarNF(){
  if(!materialAtual){ alert("Selecione um material antes de importar a NF."); return; }
  document.getElementById("nfFileInput").click();
}

document.getElementById("nfFileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;
  e.target.value = "";
  const reader = new FileReader();
  reader.onload = function(ev){
    const typedarray = new Uint8Array(ev.target.result);
    // Configurar worker do PDF.js
    if(typeof pdfjsLib !== "undefined"){
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }
    pdfjsLib.getDocument({data: typedarray}).promise.then(function(pdf){
      const promises = [];
      for(let i = 1; i <= pdf.numPages; i++){
        promises.push(
          pdf.getPage(i).then(function(pg){
            return pg.getTextContent();
          }).then(function(tc){
            return tc.items.map(function(it){ return it.str; }).join(" ");
          })
        );
      }
      return Promise.all(promises);
    }).then(function(pages){
      preencherCamposNF(pages.join("\n"));
    }).catch(function(err){
      alert("Erro ao ler o PDF: " + err.message);
    });
  };
  reader.readAsArrayBuffer(file);
});

function preencherCamposNF(txt){
  const est = getEstadoMaterial(materialAtual);
  const preenchidos = [];

  // NF Número
  const nfM = txt.match(/N[ÚU]MERO\s+([\d\.]+)/i) ||
               txt.match(/NF[- ]?[Ee]?\s*[Nn][°º]?\.?\s*([\d\.]+)/i) ||
               txt.match(/NOTA\s+FISCAL\s*[Nn][°º]?\.?\s*([\d\.]+)/i);
  if(nfM){ est.nf = nfM[1].replace(/\./g,""); preenchidos.push("NF Nº"); }

  // Fornecedor (Razão Social do emitente)
  const fornM = txt.match(/RAZ[ÃA]O\s*SOCIAL\s+([A-ZÀ-Ü][A-ZÀ-Ü0-9\s\.\,\-&\/]+?)(?:\s{3,}|CNPJ|ENDERE)/i) ||
                txt.match(/^([A-ZÀ-Ü][A-ZÀ-Ü0-9\s\.\,\-&]{6,70}?)\s{2,}/m);
  if(fornM){ est.fornecedor = fornM[1].trim(); preenchidos.push("Fornecedor"); }

  // Data de Emissão / Entrega
  const dataM = txt.match(/(?:DATA\s+DE\s+EMISS[ÃA]O|EMISS[ÃA]O)\s+(\d{2}\/\d{2}\/\d{4})/i) ||
                txt.match(/(\d{2}\/\d{2}\/\d{4})/);
  if(dataM){ est.dataEntrega = dataM[1]; preenchidos.push("Data de Entrega"); }

  // Pedido de Compra
  const pedM = txt.match(/PEDIDO\s+(?:DE\s+COMPRA\s+)?[Nn°º]?\.?\s*([\d\-]+)/i) ||
               txt.match(/(?:O\.?\s*C\.?|P\.?\s*O\.?)\s*[Nn°º]?\.?\s*([\d\-]+)/i);
  if(pedM){ est.pedido = pedM[1]; preenchidos.push("Pedido"); }

  // Descrição do produto (primeira ocorrência após cabeçalho dos itens)
  const descM = txt.match(/DESCRI[ÇC][ÃA]O\s+(?:DO\s+PRODUTO[^\n]*\n?\s*)([A-Za-zÀ-ü][^\n]{4,100}?)(?:\s{3,}|\n)/i);
  if(descM){ est.descricao = descM[1].trim(); preenchidos.push("Descrição"); }

  // Quantidade
  const qtdeM = txt.match(/QUANTIDADE\s+([\d\.,]+)/i) ||
                txt.match(/QTDE?\.\s*([\d\.,]+)/i);
  if(qtdeM){ est.qtde = qtdeM[1]; preenchidos.push("Qtde"); }

  salvarDB();
  renderFichaMaterial();

  if(preenchidos.length > 0){
    alert("✅ Campos preenchidos: " + preenchidos.join(", ") + ".\n\nRevise os dados e ajuste se necessário.");
  } else {
    alert("⚠️ Não foi possível extrair dados desta NF. O layout pode diferir do padrão DANFE.\nPreencha os campos manualmente.");
  }
}

window.addEventListener("beforeprint", function(){
  // Converter inputs em spans para exibir texto completo
  document.querySelectorAll("#main input[type=text], #main input[type=date]").forEach(function(inp){
    var span = document.createElement("span");
    span.className = "print-val";
    span.textContent = inp.type==="date" ? paraBR(inp.value) : inp.value;
    inp.parentNode.insertBefore(span, inp.nextSibling);
    inp.classList.add("print-hidden");
  });
  // Zerar coluna do botão "remover" nas tabelas NC e recebimento
  document.querySelectorAll(".tbl-nc, .tbl-receb").forEach(function(tbl){
    var lastCol = tbl.querySelector("colgroup col:last-child");
    if(lastCol){ lastCol._pw = lastCol.style.width; lastCol.style.width = "0"; }
    tbl.querySelectorAll("tr > td:last-child, tr > th:last-child").forEach(function(el){
      el._pd = el.style.display; el._pp = el.style.padding; el._pb = el.style.border;
      el.style.display = "none"; el.style.padding = "0"; el.style.border = "none";
    });
  });
  // Escalar largura para caber na página (sem limitar altura — doc pode ter múltiplas páginas)
  var ficha = document.querySelector("#main .ficha-doc");
  if(ficha){
    ficha.style.zoom = "";
    var fw = ficha.scrollWidth;
    var maxW = 1060; // A4 landscape ~285mm a 96dpi
    var scaleW = fw > maxW ? maxW / fw : 1;
    if(scaleW < 0.99){
      ficha.style.zoom = scaleW;
      ficha._printZoom = true;
    }
  }
});
window.addEventListener("afterprint", function(){
  document.querySelectorAll(".print-val").forEach(function(el){ el.remove(); });
  document.querySelectorAll(".print-hidden").forEach(function(el){ el.classList.remove("print-hidden"); });
  // Restaurar coluna do remover
  document.querySelectorAll(".tbl-nc, .tbl-receb").forEach(function(tbl){
    var lastCol = tbl.querySelector("colgroup col:last-child");
    if(lastCol && lastCol._pw !== undefined){ lastCol.style.width = lastCol._pw; delete lastCol._pw; }
    tbl.querySelectorAll("tr > td:last-child, tr > th:last-child").forEach(function(el){
      if(el._pd !== undefined){ el.style.display = el._pd; el.style.padding = el._pp; el.style.border = el._pb; delete el._pd; delete el._pp; delete el._pb; }
    });
  });
  // Restaurar zoom
  var ficha = document.querySelector("#main .ficha-doc");
  if(ficha && ficha._printZoom){ ficha.style.zoom = ""; ficha._printZoom = false; }
});
